<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars - 3000+ СТРОК</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .app {
            max-width: 500px;
            width: 100%;
            background: #14142e;
            border-radius: 30px;
            padding: 20px;
            border: 1px solid #f5c84255;
            box-shadow: 0 0 60px #f5c84222;
        }
        
        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #f5c842;
            font-size: 28px;
            font-weight: 800;
        }
        
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        
        /* ============================================================
           МЕНЮ
           ============================================================ */
        .menu {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .menu button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            background: #1a1a3a;
            color: #777799;
            transition: .3s;
            min-width: 50px;
        }
        
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 30px #f5c84255;
        }
        
        .menu button:hover {
            transform: scale(1.05);
        }
        
        /* ============================================================
           КОНТЕНТ
           ============================================================ */
        #content {
            background: #1a1a3a;
            border-radius: 20px;
            padding: 16px;
            min-height: 450px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            max-height: 600px;
        }
        
        /* ============================================================
           АВТОРИЗАЦИЯ
           ============================================================ */
        .auth-box {
            text-align: center;
            padding: 20px 0;
        }
        
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 15px;
            outline: none;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .auth-box input:focus {
            border-color: #f5c842;
        }
        
        .auth-box .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .auth-box .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
        }
        
        .auth-box .btn-group .login-btn {
            background: #f5c842;
            color: #0b0b1a;
        }
        
        .auth-box .btn-group .register-btn {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        
        .auth-box .error {
            color: #d43f3f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        
        .auth-box .success {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        
        /* ============================================================
           БОЙ
           ============================================================ */
        .battle-screen {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .battle-status {
            text-align: center;
            color: #aaaacc;
            font-size: 16px;
            padding: 8px;
            background: #0f0f2a;
            border-radius: 12px;
        }
        
        .battle-status .my-turn {
            color: #f5c842;
            font-weight: 700;
            animation: pulse 1s ease-in-out infinite;
        }
        
        .battle-status .opp-turn {
            color: #ff6b6b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px;
            background: #0f0f2a;
            border-radius: 16px;
            border: 2px solid #555577;
            min-height: 150px;
        }
        
        .player-card {
            text-align: center;
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #555577;
            transition: .3s;
        }
        
        .player-card.active {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84244;
        }
        
        .player-card .name {
            color: #eee;
            font-weight: 700;
            font-size: 14px;
        }
        
        .player-card .hp-text {
            color: #ff6b6b;
            font-size: 13px;
            font-weight: 700;
        }
        
        .player-card .hp-bar {
            background: #1a1a3a;
            border-radius: 10px;
            height: 8px;
            margin-top: 4px;
            overflow: hidden;
        }
        
        .player-card .hp-bar .fill {
            height: 100%;
            border-radius: 10px;
            transition: width .5s;
        }
        
        .player-card .hp-bar .fill.green {
            background: #51cf66;
        }
        
        .player-card .hp-bar .fill.yellow {
            background: #f5c842;
        }
        
        .player-card .hp-bar .fill.red {
            background: #d43f3f;
        }
        
        .player-card .brawler-icon {
            font-size: 36px;
            display: block;
            margin: 4px 0;
        }
        
        .player-card .power {
            color: #f5c842;
            font-size: 11px;
            font-weight: 700;
        }
        
        .battle-vs {
            color: #f5c842;
            font-size: 24px;
            font-weight: 800;
        }
        
        .battle-actions {
            display: flex;
            gap: 10px;
        }
        
        .battle-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
            color: #fff;
        }
        
        .battle-actions button:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .battle-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .battle-actions .btn-attack {
            background: #d43f3f;
        }
        
        .battle-actions .btn-attack:hover:not(:disabled) {
            box-shadow: 0 0 30px #d43f3f66;
        }
        
        .battle-actions .btn-defend {
            background: #4fc3f7;
            color: #0b0b1a;
        }
        
        .battle-actions .btn-defend:hover:not(:disabled) {
            box-shadow: 0 0 30px #4fc3f766;
        }
        
        .battle-actions .btn-ability {
            background: #9b59b6;
        }
        
        .battle-actions .btn-ability:hover:not(:disabled) {
            box-shadow: 0 0 30px #9b59b666;
        }
        
        .battle-log {
            background: #0f0f2a;
            border-radius: 12px;
            padding: 10px 14px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 13px;
            color: #ccccee;
        }
        
        .battle-log .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
        }
        
        .battle-log .log-entry.damage {
            color: #ff6b6b;
        }
        
        .battle-log .log-entry.crit {
            color: #ffd700;
        }
        
        .battle-log .log-entry.heal {
            color: #51cf66;
        }
        
        .battle-log .log-entry.win {
            color: #f5c842;
            font-weight: 700;
        }
        
        .battle-log .log-entry.shield {
            color: #4fc3f7;
        }
        
        /* ============================================================
           ПОИСК
           ============================================================ */
        .search-screen {
            text-align: center;
            padding: 30px 20px;
        }
        
        .search-screen .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .search-screen h3 {
            color: #f5c842;
            font-size: 22px;
        }
        
        .search-screen p {
            color: #8888aa;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .search-screen .cancel-btn {
            margin-top: 16px;
            background: #555;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
        }
        
        .search-screen .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        
        /* ============================================================
           РЕЗУЛЬТАТ
           ============================================================ */
        .result-screen {
            text-align: center;
            padding: 30px 20px;
        }
        
        .result-screen .winner {
            font-size: 36px;
            font-weight: 800;
            color: #f5c842;
        }
        
        .result-screen .trophies {
            font-size: 20px;
            color: #2ecc71;
            margin-top: 8px;
        }
        
        .result-screen .back-btn {
            margin-top: 16px;
            background: #f5c842;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
        }
        
        .result-screen .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        
        /* ============================================================
           ВЫБОР БОЙЦА
           ============================================================ */
        .select-screen .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 10px 0;
        }
        
        .select-screen .brawler-card {
            background: #0f0f2a;
            padding: 10px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            color: #eee;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            font-size: 13px;
        }
        
        .select-screen .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.08);
        }
        
        .select-screen .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 30px #f5c84244;
            transform: scale(1.05);
        }
        
        .select-screen .find-btn {
            width: 100%;
            padding: 14px;
            background: #f5c842;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: #0b0b1a;
            cursor: pointer;
            transition: .3s;
            margin-top: 10px;
        }
        
        .select-screen .find-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        
        .select-screen .find-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* ============================================================
           БОЙЦЫ
           ============================================================ */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 14px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: .3s;
        }
        
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        
        .brawler-detail {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            text-align: center;
        }
        
        .brawler-detail .name {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
        }
        
        .brawler-detail .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }
        
        .brawler-detail .stat-box {
            background: #1a1a3a;
            border-radius: 16px;
            padding: 10px;
            border: 1px solid #555577;
        }
        
        .brawler-detail .stat-box .label {
            font-size: 11px;
            color: #8888aa;
        }
        
        .brawler-detail .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
        }
        
        .brawler-detail .stat-box .value.damage {
            color: #ff6b6b;
        }
        
        .brawler-detail .stat-box .value.hp {
            color: #51cf66;
        }
        
        .brawler-detail .back-btn {
            background: #555577;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            margin-top: 12px;
        }
        
        .brawler-detail .upgrade-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .brawler-detail .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* ============================================================
           МАГАЗИН
           ============================================================ */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #555577;
            display: flex;
            gap: 14px;
            align-items: center;
        }
        
        .shop-item .info {
            flex: 1;
        }
        
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 15px;
        }
        
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
        }
        
        .shop-item .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .voucher-code {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #f5c84244;
            margin-top: 8px;
        }
        
        .voucher-code .code {
            color: #f5c842;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        .voucher-code .copy-btn {
            background: #555577;
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        
        /* ============================================================
           ПРОФИЛЬ
           ============================================================ */
        .profile-card {
            text-align: center;
            padding: 20px;
        }
        
        .profile-card .avatar {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
        }
        
        .profile-card .nick {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }
        
        .profile-card .stat-item {
            text-align: center;
        }
        
        .profile-card .stat-item .value {
            font-size: 24px;
            font-weight: 800;
            color: #f5c842;
        }
        
        .profile-card .stat-item .label {
            font-size: 11px;
            color: #8888aa;
        }
        
        .profile-card .stat-item .value.gems {
            color: #4fc3f7;
        }
        
        .profile-card .stat-item .value.coins {
            color: #ffd54f;
        }
        
        .profile-card .stat-item .value.trophies {
            color: #f5c842;
        }
        
        .profile-card .logout-btn {
            margin-top: 16px;
            background: #d43f3f;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
        }
        
        /* ============================================================
           ЧАТ
           ============================================================ */
        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
        }
        
        .chat-message {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 8px 14px;
            border-left: 3px solid #f5c842;
        }
        
        .chat-message.own {
            border-left-color: #4fc3f7;
        }
        
        .chat-message .msg-name {
            font-weight: 700;
            color: #f5c842;
            font-size: 13px;
        }
        
        .chat-message.own .msg-name {
            color: #4fc3f7;
        }
        
        .chat-message .msg-text {
            color: #ccccee;
            font-size: 14px;
        }
        
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        
        .chat-input-row input {
            flex: 1;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input-row input:focus {
            border-color: #f5c842;
        }
        
        .chat-input-row button {
            background: #f5c842;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
        }
        
        /* ============================================================
           АДМИНКА
           ============================================================ */
        .admin-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .admin-tabs button {
            flex: 1;
            padding: 8px 6px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            background: #1a1a3a;
            color: #777799;
            transition: .3s;
        }
        
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
        }
        
        .admin-tabs button:hover {
            transform: scale(1.03);
        }
        
        .form-card {
            background: #0f0f2a;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
            margin-bottom: 10px;
        }
        
        .form-card input,
        .form-card textarea,
        .form-card select {
            width: 100%;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 8px 14px;
            color: #eee;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
        }
        
        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            border-color: #f5c842;
        }
        
        .form-card .submit-btn {
            width: 100%;
            background: #f5c842;
            border: none;
            padding: 10px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 14px;
            transition: .3s;
        }
        
        .form-card .submit-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        
        .shop-item-admin {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 10px 14px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        
        .shop-item-admin .info {
            flex: 1;
        }
        
        .shop-item-admin .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 14px;
        }
        
        .shop-item-admin .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        
        .shop-item-admin .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .list-admin {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .leaderboard-card {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #555577;
            margin-bottom: 6px;
        }
        
        .leaderboard-card .rank {
            font-size: 18px;
            font-weight: 800;
            color: #8888aa;
            min-width: 28px;
        }
        
        .leaderboard-card .rank.gold {
            color: #ffd700;
        }

<body>

    <!-- ============================================================
    ВСПЛЫВАЮЩЕЕ СООБЩЕНИЕ
    ============================================================ -->
    <div class="server-notification" id="serverNotification">
        <button class="close-notify" onclick="closeNotification()">✕</button>
        <span id="notificationText">Сообщение</span>
    </div>

    <!-- ============================================================
    ОСНОВНОЕ ПРИЛОЖЕНИЕ
    ============================================================ -->
    <div class="app">
        <div class="header">
            <h1>⚡ BRAWL</h1>
            <span>v.10.0</span>
        </div>

        <div class="menu">
            <button class="active" data-tab="battle">⚔️ Бой</button>
            <button data-tab="brawlers">🦸 Бойцы</button>
            <button data-tab="shop">🛍️ Магазин</button>
            <button data-tab="chat">💬 Чат</button>
            <button data-tab="profile">👤 Профиль</button>
            <button data-tab="admin">⚙️ Админка</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        // ============================================================
        //  FIREBASE КОНФИГУРАЦИЯ
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
            authDomain: "brawl-stars-panel.firebaseapp.com",
            databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
            projectId: "brawl-stars-panel",
            storageBucket: "brawl-stars-panel.firebasestorage.app",
            messagingSenderId: "458936707927",
            appId: "1:458936707927:web:2abf0144fc135277ee6c12"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (e) {
            console.warn('Firebase уже инициализирован:', e);
        }
        const db = firebase.database();

        // ============================================================
        //  ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let userId = null;
        let loggedIn = false;
        let profile = {
            name: '',
            gems: 50,
            coins: 100,
            brawlers: [{ name: 'Шелли', level: 1 }],
            trophies: 0,
            banned: false
        };

        let currentTab = 'battle';
        let selectedBrawler = null;
        let selectedBrawlerDetail = null;
        let battleState = 'select';
        let battleId = null;
        let battleData = null;
        let searchRef = null;
        let botTimer = null;
        let moveListener = null;
        let battleListener = null;
        let botInterval = null;
        let chatListener = null;
        let adminSub = 'players';

        // ============================================================
        //  ВСЕ БОЙЦЫ
        // ============================================================
        const ALL_BRAWLERS = [
            { name: 'Шелли', icon: '🔫', minDamage: 100, maxDamage: 180, minHp: 400, maxHp: 700 },
            { name: 'Кольт', icon: '🔫', minDamage: 110, maxDamage: 200, minHp: 350, maxHp: 600 },
            { name: 'Булл', icon: '🐂', minDamage: 80, maxDamage: 150, minHp: 550, maxHp: 900 },
            { name: 'Джесси', icon: '⚡', minDamage: 90, maxDamage: 170, minHp: 380, maxHp: 650 },
            { name: 'Брок', icon: '🚀', minDamage: 130, maxDamage: 220, minHp: 300, maxHp: 550 },
            { name: 'Спайк', icon: '🌵', minDamage: 105, maxDamage: 190, minHp: 360, maxHp: 630 },
            { name: 'Леон', icon: '🦎', minDamage: 100, maxDamage: 185, minHp: 340, maxHp: 620 },
            { name: 'Динамайк', icon: '💣', minDamage: 120, maxDamage: 210, minHp: 320, maxHp: 580 }
        ];

        let shopItems = [];
        let brawlers = [];
        let vouchers = [];

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getStats(name, level) {
            const b = ALL_BRAWLERS.find(x => x.name === name);
            if (!b) return { damage: 100, hp: 400 };
            const p = (level - 1) / 9;
            return {
                damage: Math.round(b.minDamage + (b.maxDamage - b.minDamage) * p),
                hp: Math.round(b.minHp + (b.maxHp - b.minHp) * p)
            };
        }

        function getUpgradeCost(level) {
            return {
                coins: level * 10,
                gems: Math.floor(level / 2) + 1
            };
        }

        // ============================================================
        //  АВТОРИЗАЦИЯ
        // ============================================================
        function checkSession() {
            const saved = localStorage.getItem('brawl_userId');
            if (saved) {
                userId = saved;
                loggedIn = true;
                loadProfile();
                loadData();
                render();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            loggedIn = false;
            document.getElementById('content').innerHTML = `
                <div class="auth-box">
                    <h2 style="color:#f5c842;margin-bottom:12px;">⚡ Вход</h2>
                    <input type="text" id="authUser" placeholder="Имя" />
                    <input type="password" id="authPass" placeholder="Пароль" />
                    <div class="error" id="authError"></div>
                    <div class="success" id="authSuccess"></div>
                    <div class="btn-group">
                        <button class="login-btn" onclick="login()">🔑 Войти</button>
                        <button class="register-btn" onclick="register()">📝 Регистрация</button>
                    </div>
                </div>
            `;
        }

        window.register = function() {
            const name = document.getElementById('authUser').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            const err = document.getElementById('authError');
            const ok = document.getElementById('authSuccess');
            err.style.display = 'none';
            ok.style.display = 'none';

            if (!name || !pass) {
                err.textContent = '❌ Заполните всё!';
                err.style.display = 'block';
                return;
            }
            if (name.length < 3) {
                err.textContent = '❌ Имя минимум 3 символа!';
                err.style.display = 'block';
                return;
            }
            if (pass.length < 4) {
                err.textContent = '❌ Пароль минимум 4 символа!';
                err.style.display = 'block';
                return;
            }

            db.ref('users').orderByChild('name').equalTo(name).once('value').then(snap => {
                if (snap.exists()) {
                    err.textContent = '❌ Имя занято!';
                    err.style.display = 'block';
                    return;
                }
                const uid = 'u_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
                const data = {
                    name: name,
                    password: pass,
                    gems: 50,
                    coins: 100,
                    brawlers: [{ name: 'Шелли', level: 1 }],
                    trophies: 0,
                    banned: false
                };
                db.ref('users/' + uid).set(data);
                db.ref('names/' + name).set(uid);
                ok.textContent = '✅ Аккаунт создан!';
                ok.style.display = 'block';
                userId = uid;
                loggedIn = true;
                localStorage.setItem('brawl_userId', uid);
                profile = data;
                setTimeout(() => {
                    document.querySelector('.auth-box').innerHTML = '';
                    render();
                }, 500);
            });
        };

        window.login = function() {
            const name = document.getElementById('authUser').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            const err = document.getElementById('authError');
            const ok = document.getElementById('authSuccess');
            err.style.display = 'none';
            ok.style.display = 'none';

            if (!name || !pass) {
                err.textContent = '❌ Заполните всё!';
                err.style.display = 'block';
                return;
            }

            db.ref('names/' + name).once('value').then(snap => {
                const uid = snap.val();
                if (!uid) {
                    err.textContent = '❌ Пользователь не найден!';
                    err.style.display = 'block';
                    return;
                }
                db.ref('users/' + uid).once('value').then(snap2 => {
                    const data = snap2.val();
                    if (!data || data.password !== pass) {
                        err.textContent = '❌ Неверный пароль!';
                        err.style.display = 'block';
                        return;
                    }
                    if (data.banned) {
                        err.textContent = '⛔ Вы забанены!';
                        err.style.display = 'block';
                        return;
                    }
                    ok.textContent = '✅ Вход выполнен!';
                    ok.style.display = 'block';
                    userId = uid;
                    loggedIn = true;
                    localStorage.setItem('brawl_userId', uid);
                    profile = data;
                    setTimeout(() => render(), 300);
                });
            });
        };

        window.logout = function() {
            if (confirm('Выйти?')) {
                localStorage.removeItem('brawl_userId');
                userId = null;
                loggedIn = false;
                render();
            }
        };

        function loadProfile() {
            if (!userId) return;
            db.ref('users/' + userId).once('value').then(snap => {
                if (snap.exists()) {
                    profile = snap.val();
                    render();
                }
            });
        }

        function saveProfile() {
            if (!userId) return;
            db.ref('users/' + userId).update(profile);
        }

        function loadData() {
            db.ref('data').on('value', snap => {
                const d = snap.val();
                if (d) {
                    brawlers = d.brawlers || [];
                    shopItems = d.shopItems || [];
                    vouchers = d.vouchers || [];
                }
                render();
            });
        }

        function syncData() {
            db.ref('data').set({ brawlers, shopItems, vouchers });
        }

        // ============================================================
        //  БОЙ - ОСНОВНАЯ ЛОГИКА
        // ============================================================
        window.selectBrawler = function(name) {
            selectedBrawler = name;
            render();
        };

        window.findBattle = function() {
            if (!selectedBrawler) {
                alert('Выбери бойца!');
                return;
            }
            if (!profile.brawlers.some(b => b.name === selectedBrawler)) {
                alert('Нет такого бойца!');
                return;
            }
            if (profile.banned) {
                alert('⛔ Ты забанен!');
                return;
            }

            battleState = 'searching';
            render();

            const searchData = {
                playerId: userId,
                name: profile.name || 'Игрок',
                brawler: selectedBrawler,
                level: profile.brawlers.find(b => b.name === selectedBrawler)?.level || 1,
                time: Date.now()
            };

            searchRef = db.ref('search').push(searchData);

            const listener = db.ref('search');
            listener.on('value', snap => {
                const data = snap.val();
                if (!data) return;
                const keys = Object.keys(data);
                const other = keys.find(k => data[k].playerId !== userId);
                if (other) {
                    const opp = data[other];
                    db.ref('search/' + other).remove();
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    listener.off();
                    if (botTimer) clearTimeout(botTimer);
                    startBattle(opp);
                }
            });

            botTimer = setTimeout(() => {
                if (battleState === 'searching') {
                    const bots = ['🤖 Гром', '🤖 Вспышка', '🤖 Тень', '🤖 Молния', '🤖 Звезда'];
                    const brawls = ['Шелли', 'Кольт', 'Булл', 'Джесси', 'Брок'];
                    const botData = {
                        playerId: 'bot_' + Math.random().toString(36).substring(2, 6),
                        name: bots[Math.floor(Math.random() * bots.length)],
                        brawler: brawls[Math.floor(Math.random() * brawls.length)],
                        level: Math.floor(Math.random() * 5) + 1,
                        isBot: true
                    };
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    listener.off();
                    startBattle(botData);
                }
            }, 5000);
        };

        window.cancelSearch = function() {
            if (searchRef) db.ref('search/' + searchRef.key).remove();
            db.ref('search').off();
            if (botTimer) clearTimeout(botTimer);
            battleState = 'select';
            render();
        };

        // ============================================================
        //  ЗАПУСК БОЯ
        // ============================================================
        function startBattle(opp) {
            const myLevel = profile.brawlers.find(b => b.name === selectedBrawler)?.level || 1;
            const myStats = getStats(selectedBrawler, myLevel);
            const oppStats = getStats(opp.brawler, opp.level || 1);

            battleId = 'b_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);

            battleData = {
                p1: userId,
                p1Name: profile.name || 'Игрок',
                p1Brawler: selectedBrawler,
                p1HP: myStats.hp,
                p1MaxHP: myStats.hp,
                p1Dmg: myStats.damage,
                p1Level: myLevel,
                p1CD: 0,
                p1Shield: false,
                p2: opp.playerId,
                p2Name: opp.name || 'Противник',
                p2Brawler: opp.brawler,
                p2HP: oppStats.hp,
                p2MaxHP: oppStats.hp,
                p2Dmg: oppStats.damage,
                p2Level: opp.level || 1,
                p2CD: 0,
                p2Shield: false,
                turn: 'p1',
                done: false,
                winner: null,
                log: ['⚔️ БОЙ НАЧАЛСЯ!'],
                isBot: opp.isBot || false,
                startTime: Date.now()
            };

            db.ref('battles/' + battleId).set(battleData);
            battleState = 'fighting';

            battleListener = db.ref('battles/' + battleId);
            battleListener.on('value', snap => {
                const data = snap.val();
                if (data) {
                    battleData = data;
                    if (battleData.done) endBattle();
                    render();
                }
            });

            moveListener = db.ref('battles/' + battleId + '/moves');
            moveListener.on('child_added', snap => {
                const move = snap.val();
                if (move.playerId === userId) return;
                if (battleData && !battleData.done) {
                    processMove(move);
                }
            });

            if (opp.isBot) startBot();
            render();
        }

        // ============================================================
        //  БОТ
        // ============================================================
        function startBot() {
            if (botInterval) clearInterval(botInterval);
            botInterval = setInterval(() => {
                if (!battleData || battleData.done) {
                    clearInterval(botInterval);
                    botInterval = null;
                    return;
                }
                const isBotTurn = (battleData.turn === 'p1' && battleData.p1.startsWith('bot_')) ||
                    (battleData.turn === 'p2' && battleData.p2.startsWith('bot_'));
                if (!isBotTurn) return;

                const isP1 = battleData.turn === 'p1';
                const hp = isP1 ? battleData.p1HP : battleData.p2HP;
                const maxHp = isP1 ? battleData.p1MaxHP : battleData.p2MaxHP;
                const cd = isP1 ? battleData.p1CD : battleData.p2CD;
                const hpP = hp / maxHp;

                let action;
                if (hpP < 0.2) action = 'defend';
                else if (cd <= 0 && Math.random() < 0.3) action = 'ability';
                else action = Math.random() < 0.7 ? 'attack' : 'defend';

                db.ref('battles/' + battleId + '/moves').push({
                    action: action,
                    playerId: battleData.turn === 'p1' ? battleData.p1 : battleData.p2,
                    time: Date.now()
                });
            }, 1500);
        }

        // ============================================================
        //  ОБРАБОТКА ХОДА
        // ============================================================
        function processMove(move) {
            if (!battleData || battleData.done) return;

            const isP1 = battleData.turn === 'p1';
            const isPlayerTurn = isP1 ? battleData.p1 === move.playerId : battleData.p2 === move.playerId;
            if (!isPlayerTurn) return;

            if (battleData.p1CD > 0) battleData.p1CD--;
            if (battleData.p2CD > 0) battleData.p2CD--;

            const atk = isP1 ? 'p1' : 'p2';
            const def = isP1 ? 'p2' : 'p1';
            const atkName = isP1 ? battleData.p1Name : battleData.p2Name;
            const defName = isP1 ? battleData.p2Name : battleData.p1Name;
            const atkDmg = isP1 ? battleData.p1Dmg : battleData.p2Dmg;
            let dmg = 0,
                crit = false;

            if (move.action === 'attack') {
                const v = 0.8 + Math.random() * 0.4;
                crit = Math.random() < 0.25;
                dmg = Math.round(atkDmg * v * (crit ? 1.5 : 1));

                const hasShield = isP1 ? battleData.p2Shield : battleData.p1Shield;
                if (hasShield) {
                    dmg = Math.round(dmg * 0.5);
                    if (isP1) battleData.p2Shield = false;
                    else battleData.p1Shield = false;
                    battleData.log.push(`🛡️ ${defName} ЗАБЛОКИРОВАЛ часть урона!`);
                }

                battleData.log.push(`💥 ${atkName} нанёс ${dmg} урона ${defName}${crit ? ' 💥 КРИТ!' : ''}`);

                if (isP1) battleData.p2HP = Math.max(0, battleData.p2HP - dmg);
                else battleData.p1HP = Math.max(0, battleData.p1HP - dmg);

            } else if (move.action === 'defend') {
                const heal = Math.round((isP1 ? battleData.p1MaxHP : battleData.p2MaxHP) * 0.2);
                if (isP1) {
                    battleData.p1HP = Math.min(battleData.p1MaxHP, battleData.p1HP + heal);
                    battleData.p1Shield = true;
                } else {
                    battleData.p2HP = Math.min(battleData.p2MaxHP, battleData.p2HP + heal);
                    battleData.p2Shield = true;
                }
                battleData.log.push(`🛡️ ${atkName} восстановил ${heal} HP и поставил ЩИТ!`);

            } else if (move.action === 'ability') {
                const cd = isP1 ? battleData.p1CD : battleData.p2CD;
                if (cd > 0) {
                    battleData.log.push(`⏳ ${atkName} — способность на перезарядке!`);
                } else {
                    if (isP1) battleData.p1CD = 2;
                    else battleData.p2CD = 2;

                    const v = 0.9 + Math.random() * 0.2;
                    crit = Math.random() < 0.3;
                    dmg = Math.round(atkDmg * 2.5 * v * (crit ? 1.5 : 1));

                    const hasShield = isP1 ? battleData.p2Shield : battleData.p1Shield;
                    if (hasShield) {
                        dmg = Math.round(dmg * 0.5);
                        if (isP1) battleData.p2Shield = false;
                        else battleData.p1Shield = false;
                        battleData.log.push(`🛡️ ${defName} ЗАБЛОКИРОВАЛ часть урона!`);
                    }

                    battleData.log.push(`⚡ ${atkName} нанёс СУПЕР-УДАР (${dmg}) ${defName}${crit ? ' 💥 КРИТ!' : ''}`);

                    if (isP1) battleData.p2HP = Math.max(0, battleData.p2HP - dmg);
                    else battleData.p1HP = Math.max(0, battleData.p1HP - dmg);
                }
            }

            if (battleData.p1HP <= 0 || battleData.p2HP <= 0) {
                battleData.done = true;
                battleData.winner = battleData.p1HP > 0 ? 'p1' : 'p2';
                const wName = battleData.winner === 'p1' ? battleData.p1Name : battleData.p2Name;
                battleData.log.push(`🏆 ${wName} ПОБЕДИЛ!`);

                const isWin = (battleData.winner === 'p1' && battleData.p1 === userId) ||
                    (battleData.winner === 'p2' && battleData.p2 === userId);
                if (isWin) {
                    profile.trophies = (profile.trophies || 0) + 15;
                    saveProfile();
                    setTimeout(() => alert('🏆 ПОБЕДА! +15 кубков!'), 300);
                } else {
                    setTimeout(() => alert('💀 Поражение... Попробуй снова!'), 300);
                }

                db.ref('battles/' + battleId).set(battleData);
                if (botInterval) { clearInterval(botInterval);
                    botInterval = null; }
                render();
                return;
            }

            battleData.turn = isP1 ? 'p2' : 'p1';
            db.ref('battles/' + battleId).set(battleData);
            render();
        }

            battleState = 'result';

            if (moveListener) { moveListener.off();
                moveListener = null; }
            if (botInterval) { clearInterval(botInterval);
                botInterval = null; }
            render();
        }

        window.makeMove = function(action) {
            if (!battleData || battleData.done) return;

            const isMyTurn = (battleData.turn === 'p1' && battleData.p1 === userId) ||
                (battleData.turn === 'p2' && battleData.p2 === userId);

            if (!isMyTurn) {
                alert('⏳ Сейчас не твой ход!');
                return;
            }

            if (action === 'ability') {
                const cd = battleData.turn === 'p1' ? battleData.p1CD : battleData.p2CD;
                if (cd > 0) {
                    alert(`⏳ Перезарядка: ${cd} хода`);
                    return;
                }
            }

            document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = true);

            db.ref('battles/' + battleId + '/moves').push({
                action: action,
                playerId: userId,
                time: Date.now()
            }).then(() => {
                setTimeout(() => {
                    document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = false);
                }, 500);
            });

        window.upgradeBrawler = function(name) {
            const b = profile.brawlers.find(x => x.name === name);
            if (!b) return alert('Нет такого бойца!');
            if (b.level >= 10) return alert('Максимальный уровень!');
            const cost = getUpgradeCost(b.level);
            if (profile.coins < cost.coins) return alert(`❌ Нужно ${cost.coins} 🪙`);
            if (profile.gems < cost.gems) return alert(`❌ Нужно ${cost.gems} 💎`);
            profile.coins -= cost.coins;

            b.level += 1;
            saveProfile();
            render();

        window.buyItem = function(name) {
            const item = shopItems.find(i => i.name === name);

                if (profile.brawlers.some(b => b.name === item.brawlerName)) {
                    return alert(`У вас уже есть ${item.brawlerName}!`);
                }
                if (profile.gems < item.cost) return alert(`❌ Нужно ${item.cost} 💎`);
                profile.gems -= item.cost;
                profile.brawlers.push({ name: item.brawlerName, level: 1 });
                saveProfile();
                render();

            const type = document.getElementById('voucherType').value;

            const brawler = document.getElementById('voucherBrawler').value;
            if (type === 'gems' && amount <= 0) return alert('Введите количество!');
            if (type === 'brawler' && !brawler) return alert('Выберите бойца!');
            const code = 'VOUCHER_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            vouchers.push({ code, type, amount, brawler, used: false });
            syncData();
            renderShop();

        };

        window.activateVoucher = function() {
            const code = document.getElementById('voucherInput').value.trim().toUpperCase();
            const v = vouchers.find(x => x.code === code && !x.used);
            if (!v) return alert('❌ Неверный код!');
            if (v.type === 'gems') {
                profile.gems += v.amount;
                alert(`✅ +${v.amount} 💎`);
            } else if (v.type === 'brawler') {
                if (profile.brawlers.some(b => b.name === v.brawler)) {
                    return alert(`У вас уже есть ${v.brawler}!`);
                }
                profile.brawlers.push({ name: v.brawler, level: 1 });
                alert(`✅ Получен ${v.brawler}!`);

            v.used = true;
            syncData();
            saveProfile();

                if (!data) return;
                data.banned = !data.banned;
                db.ref('users/' + uid).set(data);
                renderAdmin();
            });

        window.adminDelete = function(uid) {
            if (!confirm('Удалить аккаунт?')) return;
            db.ref('users/' + uid).once('value').then(snap => {
                const data = snap.val();
                if (data && data.name) db.ref('names/' + data.name).remove();
                db.ref('users/' + uid).remove();
                renderAdmin();
            });
        };

        window.adminGive = function(uid) {
            const amount = parseInt(prompt('Сколько гемов выдать?', '50'));
            if (!amount || amount <= 0) return;
            db.ref('users/' + uid).once('value').then(snap => {
                const data = snap.val();
                if (!data) return;
                data.gems = (data.gems || 0) + amount;
                db.ref('users/' + uid).set(data);
                alert(`✅ Выдано ${amount} 💎`);
                renderAdmin();
            });

            const name = document.getElementById('givePlayerName').value.trim();
            const type = document.getElementById('giveResourceType').value;
            const amount = parseInt(document.getElementById('giveAmount').value) || 0;
            if (!name || amount <= 0) { alert('Введите имя и количество!'); return; }
            db.ref('names/' + name).once('value').then(snap => {
                const uid = snap.val();
                if (!uid) { alert('Игрок не найден!'); return; }
                db.ref('users/' + uid).once('value').then(snap2 => {
                    const data = snap2.val();
                    if (!data) return;
                    if (type === 'gems') data.gems = (data.gems || 0) + amount;
                    else data.coins = (data.coins || 0) + amount;
                    db.ref('users/' + uid).set(data);
                    alert(`✅ Выдано ${amount} ${type === 'gems' ? '💎' : '🪙'}`);

                            <div class="name">${b.name}</div>
                            <div class="stats-grid">
                                <div class="stat-box"><div class="label">⚔️ Урон</div><div class="value damage">${stats.damage}</div></div>
                                <div class="stat-box"><div class="label">❤️ HP</div><div class="value hp">${stats.hp}</div></div>
                                <div class="stat-box"><div class="label">📊 Мин. урон</div><div class="value power">${b.minDamage}</div></div>
                                <div class="stat-box"><div class="label">📈 Макс. урон</div><div class="value power">${b.maxDamage}</div></div>
                            </div>
                            <div style="color:#888;font-size:14px;">Уровень: ${level}/10</div>
                            ${owned ? `
                                <div style="margin-top:8px;color:#aaa;font-size:12px;">
                                    Следующий уровень: 🪙${cost.coins} + 💎${cost.gems}
                                </div>
                                <button class="upgrade-btn" onclick="upgradeBrawler('${b.name}')" ${level >= 10 ? 'disabled' : ''}>
                                    ${level >= 10 ? '⭐ МАКСИМАЛЬНЫЙ УРОВЕНЬ' : '⬆ ПОВЫСИТЬ УРОВЕНЬ'}
                                </button>
                            ` : '<div style="color:#888;margin-top:8px;">🔒 Купите в магазине</div>'}
                            <button class="back-btn" onclick="closeBrawlerDetail()">⬅️ Назад</button>
                        </div>
                    `;
                }
            } else {
                html += `<div class="brawler-list">`;
                ALL_BRAWLERS.forEach(b => {
                    const owned = profile.brawlers.find(x => x.name === b.name);
                    html += `
                        <div class="brawler-item" onclick="openBrawlerDetail('${b.name}')">
                            ${b.icon} ${b.name}
                            <span style="margin-left:auto;font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;">
                                ${owned ? '⚡'+owned.level : '🔒'}
                            </span>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="brawlers"]').classList.add('active');
        }

        // ============================================================
        //  RENDER - МАГАЗИН
        // ============================================================
        function renderShop() {
            let html = `
                <div class="form-card" style="margin-bottom:10px;">
                    <h3 style="color:#f5c842;margin-bottom:8px;">🎟️ Активировать ваучер</h3>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="voucherInput" placeholder="Введите код" style="flex:1;margin-bottom:0;" />
                        <button class="submit-btn" onclick="activateVoucher()" style="width:auto;padding:8px 20px;">Активировать</button>
                    </div>
                </div>
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:8px;">🛒 Магазин</h3>
                    <div class="shop-grid">
            `;
            if (!shopItems.length) {
                html += `<div style="color:#888;padding:20px;text-align:center;">Магазин пуст</div>`;
            } else {
                shopItems.forEach(item => {
                    const owned = profile.brawlers.some(b => b.name === item.brawlerName);
                    html += `
                        <div class="shop-item">
                            <div style="font-size:32px;">${ALL_BRAWLERS.find(b => b.name === item.brawlerName)?.icon || '📦'}</div>
                            <div class="info">
                                <div class="name">${item.brawlerName || item.name} ${owned ? '✅' : ''}</div>
                                <div class="desc">💎 ${item.cost || 0}</div>
                            </div>
                            <button class="buy-btn" onclick="buyItem('${item.name}')" ${owned ? 'disabled' : ''}>
                                ${owned ? '✅' : 'Купить'}
                            </button>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="shop"]').classList.add('active');
        }

        // ============================================================
        //  RENDER - ЧАТ
        // ============================================================
        function renderChat() {
            content.innerHTML = `
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div style="color:#888;text-align:center;padding:20px;">Загрузка...</div>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Введите сообщение..." maxlength="200" />
                        <button onclick="sendMessage()">📤</button>
                    </div>
                </div>
            `;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="chat"]').classList.add('active');
            loadChat();
        }

        // ============================================================
        //  RENDER - БОЙ
        // ============================================================
        function renderBattle() {
            let html = '';

            if (battleState === 'select') {
                const owned = profile.brawlers || [];
                html += `
                    <div class="select-screen">
                        <h3 style="color:#f5c842;margin-bottom:8px;">🔥 Выбери бойца</h3>
                        <div class="brawler-grid">
                            ${owned.map(b => {
                                const icon = ALL_BRAWLERS.find(x => x.name === b.name)?.icon || '⚡';
                                return `<div class="brawler-card ${selectedBrawler === b.name ? 'selected' : ''}" onclick="selectBrawler('${b.name}')">${icon} ${b.name} (${b.level || 1}⚡)</div>`;
                            }).join('')}
                            ${owned.length === 0 ? '<div style="color:#888;padding:10px;">Купи бойца в магазине</div>' : ''}
                        </div>
                        <button class="find-btn" onclick="findBattle()" ${!selectedBrawler ? 'disabled' : ''}>🔍 НАЙТИ БОЙ</button>
                        <div style="text-align:center;color:#555;font-size:12px;margin-top:8px;">👥 Если никто не найдётся — бой с ботом</div>
                    </div>
                `;
            } else if (battleState === 'searching') {
                html += `
                    <div class="search-screen">
                        <div class="spinner"></div>
                        <h3>🔍 Поиск противника...</h3>
                        <p>Ищем игрока для боя</p>
                        <button class="cancel-btn" onclick="cancelSearch()">❌ Отмена</button>
                    </div>
                `;
            } else if (battleState === 'fighting' && battleData) {
                const isMyTurn = (battleData.turn === 'p1' && battleData.p1 === userId) ||
                    (battleData.turn === 'p2' && battleData.p2 === userId);

                const isP1 = battleData.p1 === userId;
                const myName = isP1 ? battleData.p1Name : battleData.p2Name;
                const oppName = isP1 ? battleData.p2Name : battleData.p1Name;
                const myHP = isP1 ? battleData.p1HP : battleData.p2HP;
                const myMax = isP1 ? battleData.p1MaxHP : battleData.p2MaxHP;
                const oppHP = isP1 ? battleData.p2HP : battleData.p1HP;
                const oppMax = isP1 ? battleData.p2MaxHP : battleData.p1MaxHP;
                const myLevel = isP1 ? battleData.p1Level : battleData.p2Level;
                const oppLevel = isP1 ? battleData.p2Level : battleData.p1Level;
                const myCD = isP1 ? battleData.p1CD : battleData.p2CD;
                const myShield = isP1 ? battleData.p1Shield : battleData.p2Shield;
                const isBot = battleData.isBot || false;

                const myIcon = ALL_BRAWLERS.find(x => x.name === (isP1 ? battleData.p1Brawler : battleData.p2Brawler))
                ?.icon || '⚡';
                const oppIcon = ALL_BRAWLERS.find(x => x.name === (isP1 ? battleData.p2Brawler : battleData.p1Brawler))
                ?.icon || '👤';

                const myP = Math.round((myHP / myMax) * 100);
                const oppP = Math.round((oppHP / oppMax) * 100);
                const myCl = myP > 50 ? 'green' : myP > 25 ? 'yellow' : 'red';
                const oppCl = oppP > 50 ? 'green' : oppP > 25 ? 'yellow' : 'red';

                let logHtml = '';
                if (battleData.log && battleData.log.length) {
                    logHtml = battleData.log.slice(-6).map(log => {
                        let cls = '';
                        if (log.includes('💥')) cls = 'damage';
                        if (log.includes('КРИТ')) cls = 'crit';
                        if (log.includes('восстановил')) cls = 'heal';
                        if (log.includes('ПОБЕДИЛ')) cls = 'win';
                        if (log.includes('СУПЕР')) cls = 'crit';
                        if (log.includes('ЗАБЛОКИРОВАЛ')) cls = 'shield';
                        if (log.includes('⏳')) cls = 'heal';
                        return `<div class="log-entry ${cls}">${log}</div>`;
                    }).join('');
                }

                html += `
                    <div class="battle-screen">
                        <div class="battle-status">
                            ${isMyTurn ? '🔥 <span class="my-turn">ТВОЙ ХОД!</span>' : '⏳ <span class="opp-turn">Ход противника...</span>'}
                            ${isBot ? ' 🤖 Бот' : ''}
                            ${myShield ? ' 🛡️ ЩИТ' : ''}
                            ${myCD > 0 ? ` ⏳ ${myCD}` : ' ⚡ Готов'}
                        </div>

                        <div class="battle-arena">
                            <div class="player-card ${isMyTurn ? 'active' : ''}">
                                <span class="brawler-icon">${myIcon}</span>
                                <div class="name">${myName} ${isP1 ? '(Ты)' : ''}</div>
                                <div class="power">⚡ Уровень ${myLevel}</div>
                                <div class="hp-text">❤️ ${myHP}/${myMax}</div>
                                <div class="hp-bar"><div class="fill ${myCl}" style="width:${myP}%;"></div></div>
                            </div>

                            <div class="battle-vs">⚔️</div>

                            <div class="player-card ${!isMyTurn ? 'active' : ''}">
                                <span class="brawler-icon">${oppIcon}</span>
                                <div class="name">${oppName} ${isBot ? '🤖' : ''}</div>
                                <div class="power">⚡ Уровень ${oppLevel}</div>
                                <div class="hp-text">❤️ ${oppHP}/${oppMax}</div>
                                <div class="hp-bar"><div class="fill ${oppCl}" style="width:${oppP}%;"></div></div>
                            </div>
                        </div>

                        <div class="battle-actions">
                            <button class="btn-attack" onclick="makeMove('attack')" ${!isMyTurn ? 'disabled' : ''}>⚔️ Атака</button>
                            <button class="btn-defend" onclick="makeMove('defend')" ${!isMyTurn ? 'disabled' : ''}>🛡️ Защита</button>
                            <button class="btn-ability ${myCD <= 0 && isMyTurn ? 'ability-ready' : ''}" onclick="makeMove('ability')" ${!isMyTurn || myCD > 0 ? 'disabled' : ''}>
                                ⚡ Удар ${myCD > 0 ? `(${myCD})` : ''}
                            </button>
                        </div>

                        <div class="battle-log">${logHtml}</div>
                    </div>
                `;
            } else if (battleState === 'result' && battleData) {
                const isWin = (battleData.winner === 'p1' && battleData.p1 === userId) ||
                    (battleData.winner === 'p2' && battleData.p2 === userId);

                html += `
                    <div class="result-screen">
                        <div class="winner">${isWin ? '🎉 ПОБЕДА!' : '💀 ПОРАЖЕНИЕ'}</div>
                        ${isWin ? '<div class="trophies">🏆 +15 кубков!</div>' : '<div style="color:#888;margin-top:8px;">Попробуй снова!</div>'}
                        <div style="color:#aaa;font-size:14px;margin-top:8px;">
                            ${battleData.p1Name} (⚡${battleData.p1Level}) vs ${battleData.p2Name} (⚡${battleData.p2Level})
                        </div>
                        <button class="back-btn" onclick="resetBattle()">⬅️ Назад</button>
                    </div>
                `;
            }

            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="battle"]').classList.add('active');

            const logEl = document.querySelector('.battle-log');
            if (logEl) logEl.scrollTop = logEl.scrollHeight;
        }

        // ============================================================
        //  МЕНЮ
        // ============================================================
        menuBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;
                if (tab !== 'battle' && battleState !== 'select') {
                    if (confirm('Выйти из боя?')) resetBattle();
                    else return;
                }
                if (tab !== 'brawlers') selectedBrawlerDetail = null;
                currentTab = tab;
                render();
            });
        });

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        listenNotifications();
        checkSession();
        render();
    </script>
</body>
</html>
