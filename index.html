<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* ===== ВСЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #14142e;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width: 600px) {
            .app {
                max-width: 500px;
                height: 95vh;
                border-radius: 40px;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
                padding: 20px 18px;
            }
        }
        @media (max-width: 430px) {
            .app {
                padding: 12px 10px;
                height: 100vh;
                max-height: 860px;
            }
            .header h1 {
                font-size: 22px;
            }
            .menu button {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-badge {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 16px 12px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @media (max-width: 430px) {
            #content {
                padding: 12px 10px;
                border-radius: 18px;
            }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 12px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 6px 4px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 10px;
            gap: 2px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ===== ОНБОРДИНГ ===== */
        .onboarding-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        .onboarding-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .onboarding-box h2 {
            color: #f5c842;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .onboarding-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .onboarding-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: 0.3s ease;
        }
        .onboarding-box input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .onboarding-box button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #f5c842;
            color: #0b0b1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .onboarding-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== БАН ===== */
        .banned-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: fadeIn 0.5s ease;
        }
        .banned-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #d43f3f;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        .banned-box .ban-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
        }
        .banned-box h2 {
            color: #d43f3f;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .banned-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .banned-box .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .banned-box .btn-group button {
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .banned-box .btn-group .new-account {
            background: #f5c842;
            color: #0b0b1a;
        }
        .banned-box .btn-group .new-account:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .banned-box .btn-group .appeal {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .banned-box .btn-group .appeal:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }

        /* ===== БОЙЦЫ ===== */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 14px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .brawler-item img {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            animation: scaleIn 0.3s ease;
            margin-top: 8px;
            text-align: center;
        }
        .brawler-detail .avatar {
            font-size: 80px;
            display: block;
            margin-bottom: 4px;
        }
        .brawler-detail .avatar img {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail .name {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
        }
        .brawler-detail .rarity {
            font-size: 14px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 18px;
            border-radius: 40px;
            display: inline-block;
            margin: 4px 0 12px;
        }
        .brawler-detail .desc {
            color: #ccccee;
            font-size: 15px;
            margin-bottom: 16px;
        }
        .brawler-detail .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .brawler-detail .stat-box {
            background: #1a1a3a;
            border-radius: 16px;
            padding: 10px 8px;
            border: 1px solid #555577;
        }
        .brawler-detail .stat-box .label {
            font-size: 11px;
            color: #8888aa;
        }
        .brawler-detail .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
        }
        .brawler-detail .stat-box .value.damage {
            color: #ff6b6b;
        }
        .brawler-detail .stat-box .value.hp {
            color: #51cf66;
        }
        .brawler-detail .stat-box .value.power {
            color: #f5c842;
        }
        .brawler-detail .status-badge {
            font-size: 14px;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 700;
        }
        .brawler-detail .status-badge.owned {
            background: #2ecc71;
            color: #0b0b1a;
        }
        .brawler-detail .status-badge.locked {
            background: #d43f3f;
            color: #fff;
        }
        .brawler-detail .back-btn {
            background: #555577;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .brawler-detail .back-btn:hover {
            transform: scale(1.05);
            background: #777799;
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #555577;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84211;
        }
        .shop-item img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 15px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        .shop-item .info .reward {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 13px;
            flex-shrink: 0;
        }
        .shop-item .buy-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            text-align: center;
        }
        .profile-card .avatar {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .profile-card .name-input {
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 8px 14px;
            color: #eee;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            outline: none;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 12px;
            transition: 0.3s ease;
        }
        .profile-card .name-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
        }
        .profile-card .stat-item {
            text-align: center;
        }
        .profile-card .stat-item .value {
            font-size: 24px;
            font-weight: 800;
            color: #f5c842;
        }
        .profile-card .stat-item .label {
            font-size: 11px;
            color: #8888aa;
            margin-top: 2px;
        }
        .profile-card .stat-item .value.gems {
            color: #4fc3f7;
        }
        .profile-card .stat-item .value.coins {
            color: #ffd54f;
        }
        .profile-card .save-btn {
            background: #f5c842;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            margin-top: 12px;
        }
        .profile-card .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== АДМИНКА ===== */
        .admin-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
            flex-wrap: wrap;
        }
        .admin-tabs button {
            flex: 1;
            min-width: 40px;
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 11px;
            padding: 6px 8px;
            border-radius: 40px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
            transform: scale(1.03);
        }
        .admin-tabs button:hover:not(.active-tab) {
            color: #fff;
        }
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }
        .form-card {
            background: #0f0f2a;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
        }
        .form-card input,
        .form-card textarea,
        .form-card select {
            width: 100%;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 8px 14px;
            color: #eee;
            font-size: 13px;
            outline: none;
            transition: 0.3s ease;
            margin-bottom: 8px;
        }
        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            border-color: #f5c842;
            box-shadow: 0 0 20px #f5c84222;
            transform: scale(1.01);
        }
        .form-card textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 50px;
        }
        .form-card .file-label {
            display: block;
            background: #1a1a3a;
            border: 1px dashed #f5c84288;
            border-radius: 40px;
            padding: 8px 14px;
            color: #aaaacc;
            cursor: pointer;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .form-card .file-label:hover {
            border-color: #f5c842;
            background: #f5c84211;
            transform: scale(1.01);
        }
        .form-card .file-label input {
            display: none;
        }
        .form-card .submit-btn {
            width: 100%;
            background: #f5c842;
            border: none;
            padding: 10px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s ease;
        }
        .form-card .submit-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .shop-item-admin {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 10px 14px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
        }
        .shop-item-admin:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .shop-item-admin img {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            object-fit: cover;
        }
        .shop-item-admin .info {
            flex: 1;
        }
        .shop-item-admin .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 14px;
        }
        .shop-item-admin .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        .shop-item-admin .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            transition: 0.3s ease;
        }
        .shop-item-admin .del-btn:hover {
            transform: scale(1.15);
            background: #ff2f2f;
        }
        .list-admin {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
            margin-top: 4px;
        }
        .leaderboard-card {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            border-left: 4px solid #555577;
        }
        .leaderboard-card:hover {
            transform: scale(1.01);
        }
        .leaderboard-card .rank {
            font-size: 18px;
            font-weight: 800;
            color: #8888aa;
            min-width: 28px;
            text-align: center;
        }
        .leaderboard-card .rank.gold {
            color: #ffd700;
        }
        .leaderboard-card .rank.silver {
            color: #c0c0c0;
        }
        .leaderboard-card .rank.bronze {
            color: #cd7f32;
        }
        .leaderboard-card .info {
            flex: 1;
        }
        .leaderboard-card .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 14px;
        }
        .leaderboard-card .info .stats {
            color: #8888aa;
            font-size: 11px;
        }
        .leaderboard-card .gems {
            color: #4fc3f7;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== ВАУЧЕРЫ ===== */
        .voucher-code {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f5c84244;
            margin-top: 8px;
        }
        .voucher-code .code {
            color: #f5c842;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
        }
        .voucher-code .copy-btn {
            background: #555577;
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s ease;
        }
        .voucher-code .copy-btn:hover {

<body>
<div class="app">
    <div class="header">
        <h1>⚡ BRAWL</h1>
        <span>v.171-11</span>
        <div class="offline-badge" id="connectionBadge">☁️</div>
    </div>

    <div id="content"></div>

    <div class="menu">
        <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
        <button data-tab="shop">🛍️ Магазин</button>
        <button data-tab="battle">⚡ Бой</button>
        <button data-tab="profile">👤 Профиль</button>
        <button data-tab="chat">💬 Чат</button>
        <button data-tab="admin">⚙️ Админка</button>
    </div>
</div>

<!-- ===== ОНБОРДИНГ ===== -->
<div class="onboarding-overlay" id="onboardingOverlay">
    <div class="onboarding-box">
        <h2>👋 Добро пожаловать!</h2>
        <p>Введите ваше имя, чтобы начать игру</p>
        <input type="text" id="onboardingName" placeholder="Ваше имя" maxlength="20" />
        <button onclick="finishOnboarding()">Начать игру 🚀</button>
    </div>
</div>

<!-- ===== БАН ===== -->
<div class="banned-overlay" id="bannedOverlay">
    <div class="banned-box">
        <span class="ban-icon">🚫</span>
        <h2>Вы забанены!</h2>
        <p>Ваш аккаунт был заблокирован администратором.</p>
        <div class="btn-group">
            <button class="new-account" onclick="createNewAccount()">🔄 Создать новый аккаунт</button>
            <button class="appeal" onclick="appealBan()">📩 Подать заявку на разбан</button>
        </div>
    </div>
</div>

<!-- ===== ПАРОЛЬ ===== -->
<div class="password-overlay" id="passwordOverlay">
    <div class="password-box">
        <h2>🔒 Админ-панель</h2>
        <p>Введите пароль для доступа</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль" />
        <button onclick="checkPassword()">Войти</button>
        <div class="error" id="passwordError">❌ Неверный пароль</div>
    </div>
</div>

<script>
    // ============================================================
    //  ПАРОЛЬ
    // ============================================================
    const ADMIN_PASSWORD = 'admin123';
    let isAdmin = false;

    function checkPassword() {
        const input = document.getElementById('passwordInput');
        const error = document.getElementById('passwordError');
        if (input.value === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('passwordOverlay').style.display = 'none';
            renderAdmin();
        } else {
            error.style.display = 'block';
            input.value = '';
            input.focus();
            setTimeout(() => { error.style.display = 'none'; }, 3000);
        }
    }
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { checkPassword(); }
    });

    // ============================================================
    //  FIREBASE КОНФИГ
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
        authDomain: "brawl-stars-panel.firebaseapp.com",
        databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
        projectId: "brawl-stars-panel",
        storageBucket: "brawl-stars-panel.firebasestorage.app",
        messagingSenderId: "458936707927",
        appId: "1:458936707927:web:2abf0144fc135277ee6c12"
    };

    try { firebase.initializeApp(firebaseConfig); } catch (e) { console.warn('Firebase уже инициализирован:', e); }
    const db = firebase.database();

    // ============================================================
    //  ДАННЫЕ
    // ============================================================
    let brawlers = [];
    let shopItems = [];
    let vouchers = [];
    let serverRunning = true;
    let currentMainTab = 'brawlers';
    let adminSubTab = 'shop';
    let battleState = 'select';
    let selectedBrawler = null;
    let opponent = null;
    let searchTimer = null;
    let searchCancelled = false;
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар'];
    let isSyncing = false;
    let selectedBrawlerForDetail = null;

    // ============================================================
    //  СОХРАНЕНИЕ ИГРОКА
    // ============================================================
    let playerId = localStorage.getItem('brawl_playerId');
    if (!playerId) {
        playerId = 'player_' + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('brawl_playerId', playerId);
    }

    let profile = { name: '', gems: 0, coins: 0, brawlers: [], banned: false };

    // ============================================================
    //  LOCALSTORAGE
    // ============================================================
    function loadLocalData() {
        try {
            const raw = localStorage.getItem('brawlData_firebase');
            if (raw) {
                const data = JSON.parse(raw);
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                vouchers = data.vouchers || [];
                serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                profile = data.profile || { name: '', gems: 0, coins: 0, brawlers: [], banned: false };
                return true;
            }
        } catch (e) {}
        return false;
    }

    function saveLocalData() {
        const data = { brawlers, shopItems, vouchers, serverRunning, profile };
        localStorage.setItem('brawlData_firebase', JSON.stringify(data));
    }

    if (!loadLocalData()) {
        brawlers = [
            { name: 'Шелли', desc: 'Дробовик, пробивает стены', rarity: 'Редкий', image: '', damage: 120, hp: 400, minPower: 1, maxPower: 10 },
            { name: 'Кольт', desc: 'Двойные револьверы', rarity: 'Редкий', image: '', damage: 80, hp: 300, minPower: 1, maxPower: 10 }
        ];
        shopItems = [
            { name: 'Ящик x10', desc: '10 ящиков с наградами', image: '', reward: 'Ящики', category: 'resources', resourceType: 'gems', amount: 80, free: false },
            { name: 'Скин Дракон', desc: 'Эксклюзивный скин для Кольта', image: '', reward: 'Скин', category: 'brawler', brawlerName: 'Кольт', cost: 149, free: false }
        ];
        vouchers = [];
        serverRunning = true;
        profile = { name: '', gems: 0, coins: 0, brawlers: [], banned: false };
        saveLocalData();
    }

    // ============================================================
    //  ОНБОРДИНГ
    // ============================================================
    function showOnboarding() {
        if (!profile.name) {
            document.getElementById('onboardingOverlay').style.display = 'flex';
        }
    }

    window.finishOnboarding = function() {
        const input = document.getElementById('onboardingName');
        const name = input.value.trim();
        if (!name) {
            input.style.borderColor = '#d43f3f';
            input.placeholder = '⚠️ Введите имя!';
            return;
        }
        profile.name = name;
        if (!profile.brawlers || profile.brawlers.length === 0) {
            profile.brawlers = ['Шелли'];
            profile.gems = 50;
            profile.coins = 100;
        }
        saveLocalData();
        syncToFirebase();
        document.getElementById('onboardingOverlay').style.display = 'none';
        render();
    };

    document.getElementById('onboardingName').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { finishOnboarding(); }
    });

    // ============================================================
    //  БАН
    // ============================================================
    function checkBan() {
        if (profile.banned) {
            document.getElementById('bannedOverlay').style.display = 'flex';
            return true;
        }
        document.getElementById('bannedOverlay').style.display = 'none';
        return false;
    }

    window.createNewAccount = function() {
        playerId = 'player_' + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('brawl_playerId', playerId);
        profile = { name: '', gems: 0, coins: 0, brawlers: [], banned: false };
        saveLocalData();
        syncToFirebase();
        document.getElementById('bannedOverlay').style.display = 'none';
        showOnboarding();
        render();
    };

    window.appealBan = function() {
        alert('📩 Ваша заявка на разбан отправлена! Администратор рассмотрит её в ближайшее время.');
    };

    // ============================================================
    //  FIREBASE
    // ============================================================
    function syncToFirebase() {
        if (isSyncing) return;
        isSyncing = true;
        const data = { brawlers, shopItems, vouchers, serverRunning, profile };
        db.ref('data').set(data)
            .then(() => {
                db.ref('players/' + playerId).set(profile);
                console.log('✅ Данные отправлены в Firebase');
                updateCloudUI(true);
                isSyncing = false;
            })
            .catch(error => {
                console.error('❌ Ошибка отправки:', error);
                updateCloudUI(false);
                isSyncing = false;
            });
    }

    function loadFromFirebase() {
        db.ref('data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const localData = JSON.parse(localStorage.getItem('brawlData_firebase') || '{}');
                if (JSON.stringify(localData) !== JSON.stringify(data)) {
                    brawlers = data.brawlers || [];
                    shopItems = data.shopItems || [];
                    vouchers = data.vouchers || [];
                    serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                    db.ref('players/' + playerId).once('value').then((snap) => {
                        const playerData = snap.val();
                        if (playerData) {
                            profile = playerData;
                        }
                        if (!profile.name && !profile.banned) {
                            showOnboarding();
                        }
                        if (profile.banned) {
                            document.getElementById('bannedOverlay').style.display = 'flex';
                        } else {
                            document.getElementById('bannedOverlay').style.display = 'none';
                        }
                        saveLocalData();
                        render();
                        console.log('📥 Данные загружены из Firebase');
                    });
                }
                updateCloudUI(true);
            }
        }, (error) => {
            console.error('❌ Ошибка загрузки из Firebase:', error);
            updateCloudUI(false);
        });
    }

    function updateCloudUI(connected) {
        const badge = document.getElementById('connectionBadge');
        if (connected) {
            badge.className = 'online-badge';
            badge.textContent = '🟢 ☁️';
        } else {
            badge.className = 'offline-badge';
            badge.textContent = '🔴 ☁️';
        }
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    function autoSync() { saveLocalData(); syncToFirebase(); }

    // ============================================================
    //  ПОКУПКА
    // ============================================================
    window.buyItem = function(name) {
        if (checkBan()) return;
        const item = shopItems.find(i => i.name === name);
        if (!item) return alert('Товар не найден!');
        const isFree = item.free === true;

        if (item.category === 'brawler') {
            if (profile.brawlers && profile.brawlers.includes(item.brawlerName)) {
                return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
            }
            if (!isFree && profile.gems < item.cost) {
                return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
            }
            if (!isFree) { profile.gems -= item.cost; }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push(item.brawlerName);
            alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            autoSync();
            render();
        } else if (item.category === 'resources') {
            if (item.resourceType === 'gems') {
                profile.gems += item.amount;

            } else if (item.resourceType === 'coins') {
                profile.coins += item.amount;
                alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            }
            autoSync();
            render();

            alert(`✅ Вы купили: ${name}!`);
        }

    // ============================================================
    //  ВАУЧЕРЫ
    // ============================================================
    window.generateVoucher = function() {
        const rewardType = document.getElementById('voucherRewardType').value;
        const amount = parseInt(document.getElementById('voucherAmount').value) || 0;
        const brawlerName = document.getElementById('voucherBrawler').value;

        if (rewardType === 'gems' && amount <= 0) return alert('Введите количество гемов!');
        if (rewardType === 'coins' && amount <= 0) return alert('Введите количество монет!');
        if (rewardType === 'brawler' && !brawlerName) return alert('Выберите бойца!');

        const code = 'VOUCHER_' + Math.random().toString(36).substring(2, 8).toUpperCase();
        const voucher = {
            code,
            rewardType,
            amount,
            brawlerName,
            used: false,
            usedBy: null,
            createdAt: Date.now()
        };
        vouchers.push(voucher);
        autoSync();
        renderAdmin();
        alert(`✅ Ваучер создан!\nКод: ${code}\nНаграда: ${rewardType === 'gems' ? '💎 '+amount : rewardType === 'coins' ? '🪙 '+amount : '👤 '+brawlerName}`);
        const container = document.getElementById('voucherResult');
        if (container) {
            container.innerHTML = `
                <div class="voucher-code">
                    <span class="code">${code}</span>
                    <button class="copy-btn" onclick="copyVoucher('${code}')">📋 Копировать</button>
                </div>
            `;
        }
    };

    window.copyVoucher = function(code) {
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Код скопирован!');
        }).catch(() => {
            prompt('Скопируйте код вручную:', code);
        });
    };

    window.activateVoucher = function() {
        const codeInput = document.getElementById('voucherActivateInput');
        const code = codeInput.value.trim().toUpperCase();
        if (!code) return alert('Введите код ваучера!');

        const voucher = vouchers.find(v => v.code === code);
        if (!voucher) return alert('❌ Неверный код!');
        if (voucher.used) return alert('❌ Этот ваучер уже использован!');

        voucher.used = true;
        voucher.usedBy = playerId;

        if (voucher.rewardType === 'gems') {
            profile.gems += voucher.amount;
            alert(`✅ Вы получили ${voucher.amount} 💎 Гемов!`);
        } else if (voucher.rewardType === 'coins') {
            profile.coins += voucher.amount;
            alert(`✅ Вы получили ${voucher.amount} 🪙 Монет!`);
        } else if (voucher.rewardType === 'brawler') {
            if (profile.brawlers && profile.brawlers.includes(voucher.brawlerName)) {
                alert(`⚠️ У вас уже есть боец ${voucher.brawlerName}!`);
                return;
            }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push(voucher.brawlerName);
            alert(`✅ Вы получили бойца ${voucher.brawlerName}!`);
        }

        autoSync();
        render();
        codeInput.value = '';
        alert('🎉 Ваучер успешно активирован!');
    };

    // ============================================================
    //  АДМИНКА: ИГРОКИ
    // ============================================================
    let playersList = [];

    function loadPlayersList() {
        db.ref('players').once('value').then((snapshot) => {
            const players = snapshot.val();
            if (players) {
                playersList = Object.keys(players).map(key => ({
                    id: key,
                    ...players[key]
                }));
                playersList.sort((a, b) => (a.name || 'Аноним').localeCompare(b.name || 'Аноним'));
                updatePlayerSelects();
            }
        });
    }

    function updatePlayerSelects() {
        const selects = ['adminPlayerSelect', 'banPlayerSelect', 'unbanPlayerSelect'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const currentVal = el.value;
                el.innerHTML = '<option value="">-- Выберите игрока --</option>';
                playersList.forEach(p => {
                    const label = `${p.name || 'Аноним'} (${p.id})`;
                    el.innerHTML += `<option value="${p.id}">${label}</option>`;
                });
                if (currentVal) el.value = currentVal;
            }
        });
    }

    window.adminGiveResources = function() {
        const select = document.getElementById('adminPlayerSelect');
        const playerId = select.value;
        const resourceType = document.getElementById('adminResourceType').value;
        const amount = parseInt(document.getElementById('adminResourceAmount').value) || 0;

        if (!playerId) return alert('Выберите игрока!');
        if (amount <= 0) return alert('Введите количество!');

        db.ref('players/' + playerId).once('value').then((snap) => {
            const player = snap.val();
            if (!player) return alert('❌ Игрок не найден!');

            if (resourceType === 'gems') {
                player.gems = (player.gems || 0) + amount;
            } else if (resourceType === 'coins') {
                player.coins = (player.coins || 0) + amount;
            }

            db.ref('players/' + playerId).set(player);
            alert(`✅ Выдано ${amount} ${resourceType === 'gems' ? '💎 гемов' : '🪙 монет'} игроку ${player.name || playerId}`);
            document.getElementById('adminResourceAmount').value = '';
            loadPlayersList();
        });
    };

    window.adminBanPlayer = function() {
        const select = document.getElementById('banPlayerSelect');
        const playerId = select.value;
        if (!playerId) return alert('Выберите игрока!');

        db.ref('players/' + playerId).once('value').then((snap) => {
            const player = snap.val();
            if (!player) return alert('❌ Игрок не найден!');

            if (confirm(`Забанить игрока ${player.name || playerId}?`)) {
                player.banned = true;
                db.ref('players/' + playerId).set(player);
                alert(`✅ Игрок ${player.name || playerId} забанен!`);
                loadPlayersList();
            }
        });
    };

    window.adminUnbanPlayer = function() {
        const select = document.getElementById('unbanPlayerSelect');
        const playerId = select.value;
        if (!playerId) return alert('Выберите игрока!');

        db.ref('players/' + playerId).once('value').then((snap) => {
            const player = snap.val();
            if (!player) return alert('❌ Игрок не найден!');

            if (confirm(`Разбанить игрока ${player.name || playerId}?`)) {
                player.banned = false;
                db.ref('players/' + playerId).set(player);
                alert(`✅ Игрок ${player.name || playerId} разбанен!`);
                loadPlayersList();
            }
        });
    };

    // ============================================================
    //  ЧАТ
    // ============================================================
    window.sendMessage = function() {
        if (checkBan()) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const msg = {
            playerId: playerId,
            name: profile.name || 'Аноним',
            text: text,
            timestamp: Date.now()
        };

        db.ref('chat').push(msg);
        input.value = '';
    };

    document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { sendMessage(); }
    });

    function loadChat() {
        db.ref('chat').orderByChild('timestamp').limitToLast(100).on('value', (snapshot) => {
            const messages = snapshot.val();
            const container = document.getElementById('chatMessages');
            if (!container) return;

            if (!messages) {
                container.innerHTML = `
                    <div class="chat-empty">
                        <span>💬</span>
                        Сообщений пока нет<br>
                        <span style="font-size:12px;color:#555577;">Будь первым!</span>
                    </div>
                `;
                return;
            }

            let html = '';
            const msgs = Object.values(messages).reverse();
            msgs.forEach(msg => {
                const isOwn = msg.playerId === playerId;
                const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                html += `
                    <div class="chat-message ${isOwn ? 'own' : ''}">
                        <div class="msg-header">
                            <span class="msg-name">${msg.name || 'Аноним'}</span>
                            <span class="msg-time">${time}</span>
                        </div>
                        <div class="msg-text">${msg.text}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

        const tab = currentMainTab;
        const cloudHtml = `
            <div class="cloud-panel">

        if (tab === 'admin' && isAdmin) {

        if (tab === 'admin' && !isAdmin) {

    window.startSearch = function() {
        if (!selectedBrawler) return;
        battleState = 'searching';
        searchCancelled = false;
        render();
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!searchCancelled && battleState === 'searching') {
                opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                battleState = 'result';
                render();
            }
        }, 5000);
        if (Math.random() < 0.3) {
            setTimeout(() => {
                if (!searchCancelled && battleState === 'searching') {
                    clearTimeout(searchTimer);
                    opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                    battleState = 'result';
                    render();
                }
            }, 1000 + Math.random() * 2500);
        }
    };
    window.cancelSearch = function() { searchCancelled = true; clearTimeout(searchTimer); battleState = 'select'; render(); };
    window.resetBattle = function() { clearTimeout(searchTimer); battleState = 'select'; selectedBrawler = null; opponent = null; render(); };

                    <div id="brawlerFields" class="category-fields">
                        <div class="hint">Выберите бойца и укажите стоимость в гемах</div>
                        <select id="brawlerSelect">${brawlers.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}${brawlers.length === 0 ? '<option value="">Нет бойцов</option>' : ''}</select>
                        <input type="number" id="brawlerCost" placeholder="Стоимость (гемы)" value="149">
                    </div>
                    <button class="submit-btn" onclick="addShopItem()">➕ Добавить</button>
                </div>
                <div class="list-admin">${shopItems.map((item, idx) => `
                    <div class="shop-item-admin">
                        ${item.image ? `<img src="${item.image}">` : `<div style="width:40px;height:40px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:20px;">📦</div>`}
                        <div class="info"><div class="name">${item.name} ${item.free ? '🎁' : ''}</div><div class="desc">${item.desc || ''}</div></div>
                        <button class="del-btn" onclick="deleteShopItem(${idx})">✕</button>
                    </div>
                `).join('')}</div>
            `;
        } else if (adminSubTab === 'brawlers') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:10px;">➕ Добавить бойца</h3>
                    <input type="text" id="bName" placeholder="Имя бойца">
                    <textarea id="bDesc" placeholder="Описание"></textarea>
                    <select id="bRarity"><option>Обычный</option><option selected>Редкий</option><option>Эпический</option><option>Мифический</option><option>Легендарный</option></select>
                    <label class="file-label">📷 Загрузить фото <input type="file" id="bImage" accept="image/*"></label>
                    <div class="form-row" style="display:flex;gap:8px;"><input type="number" id="bDamage" placeholder="Урон" value="100" style="flex:1;"><input type="number" id="bHp" placeholder="HP" value="400" style="flex:1;"></div>
                    <div class="form-row" style="display:flex;gap:8px;"><input type="number" id="bMinPower" placeholder="Мин. сила" value="1" style="flex:1;"><input type="number" id="bMaxPower" placeholder="Макс. сила" value="10" style="flex:1;"></div>
                    <button class="submit-btn" onclick="addBrawlerFull()">➕ Добавить</button>
                </div>
                <div class="list-admin">${brawlers.map((b, idx) => `
                    <div class="shop-item-admin">
                        ${b.image ? `<img src="${b.image}">` : `<div style="width:40px;height:40px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:20px;">⚡</div>`}
                        <div class="info"><div class="name">${b.name} <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 8px;border-radius:40px;">${b.rarity || 'Обычный'}</span></div><div class="desc">${b.desc || ''}</div></div>
                        <button class="del-btn" onclick="deleteBrawler(${idx})">✕</button>
                    </div>
                `).join('')}</div>
            `;
        } else if (adminSubTab === 'vouchers') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:10px;">🎟️ Создать ваучер</h3>
                    <select id="voucherRewardType" onchange="toggleVoucherFields()">
                        <option value="gems">💎 Гемы</option>
                        <option value="coins">🪙 Монеты</option>
                        <option value="brawler">👤 Боец</option>
                    </select>
                    <div id="voucherAmountField">
                        <input type="number" id="voucherAmount" placeholder="Количество" value="100">
                    </div>
                    <div id="voucherBrawlerField" style="display:none;">
                        <select id="voucherBrawler">${brawlers.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}${brawlers.length === 0 ? '<option value="">Нет бойцов</option>' : ''}</select>
                    </div>
                    <button class="submit-btn" onclick="generateVoucher()">🎟️ Сгенерировать ваучер</button>
                    <div id="voucherResult" style="margin-top:10px;"></div>
                </div>
                <div class="list-admin">
                    <h4 style="color:#aaa;margin-bottom:6px;">📋 Созданные ваучеры</h4>
                    ${vouchers.length === 0 ? '<div class="empty-state" style="padding:10px;font-size:14px;">Нет ваучеров</div>' : vouchers.map((v, idx) => `
                        <div class="shop-item-admin" style="border-left-color:${v.used ? '#d43f3f' : '#2ecc71'};">
                            <div style="width:40px;height:40px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:20px;">${v.used ? '❌' : '✅'}</div>
                            <div class="info">
                                <div class="name">${v.code}</div>
                                <div class="desc">${v.rewardType === 'gems' ? '💎 '+v.amount : v.rewardType === 'coins' ? '🪙 '+v.amount : '👤 '+v.brawlerName} ${v.used ? '• Использован' : '• Активен'}</div>
                            </div>
                            <button class="del-btn" onclick="deleteVoucher(${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (adminSubTab === 'players') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:10px;">💎 Выдать ресурсы</h3>
                    <select id="adminPlayerSelect">
                        <option value="">-- Загрузка игроков... --</option>
                    </select>
                    <select id="adminResourceType"><option value="gems">💎 Гемы</option><option value="coins">🪙 Монеты</option></select>
                    <input type="number" id="adminResourceAmount" placeholder="Количество" value="100">
                    <button class="submit-btn" onclick="adminGiveResources()">💰 Выдать</button>
                </div>
                <div class="form-card">
                    <h3 style="color:#d43f3f;margin-bottom:10px;">🚫 Бан игрока</h3>
                    <select id="banPlayerSelect">
                        <option value="">-- Загрузка игроков... --</option>
                    </select>
                    <button class="submit-btn" onclick="adminBanPlayer()" style="background:#d43f3f;color:#fff;">⛔ Забанить</button>
                </div>
                <div class="form-card">
                    <h3 style="color:#2ecc71;margin-bottom:10px;">✅ Разбан игрока</h3>
                    <select id="unbanPlayerSelect">
                        <option value="">-- Загрузка игроков... --</option>
                    </select>
                    <button class="submit-btn" onclick="adminUnbanPlayer()" style="background:#2ecc71;">🔓 Разбанить</button>
                </div>
            `;
        } else if (adminSubTab === 'leaderboard') {
            html += `<h3 style="color:#f5c842;margin-bottom:10px;">🏆 Лидерборд</h3><div id="leaderboardContainer"></div>`;
            db.ref('players').once('value').then((snapshot) => {
                const players = snapshot.val();
                if (players) {
                    const list = Object.values(players);
                    list.sort((a, b) => (b.gems || 0) - (a.gems || 0));
                    let boardHtml = '';
                    list.forEach((p, idx) => {
                        const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
                        const emoji = idx === 0 ? '👑' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`;
                        boardHtml += `
                            <div class="leaderboard-card">
                                <div class="rank ${rankClass}">${emoji}</div>
                                <div class="info"><div class="name">${p.name || 'Аноним'}</div><div class="stats">💎 ${p.gems || 0} • 🪙 ${p.coins || 0}</div></div>
                                <div class="gems">${p.gems || 0} 💎</div>
                            </div>
                        `;
                    });
                    document.getElementById('leaderboardContainer').innerHTML = boardHtml;
                } else {
                    document.getElementById('leaderboardContainer').innerHTML = `<div class="empty-state"><span>📭</span>Нет игроков</div>`;
                }
            });
        } else if (adminSubTab === 'settings') {
            html += `
                <div style="padding:10px 0;text-align:center;color:#aaa;">Управление сервером</div>
                ${serverRunning 
                    ? `<button class="server-btn stop" onclick="stopServer()"><span class="icon">⛔</span> ОСТАНОВИТЬ СЕРВЕР</button>`
                    : `<button class="server-btn start" onclick="startServer()"><span class="icon">🚀</span> ЗАПУСТИТЬ СЕРВЕР</button>`
                }
            `;
        }

        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="admin"]').classList.add('active');

        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                adminSubTab = this.dataset.sub;
                renderAdmin(cloudHtml);
            });
        });

        window.toggleCategoryFields = function() {
            const category = document.getElementById('shopCategory').value;
            document.getElementById('resourcesFields').className = 'category-fields' + (category === 'resources' ? ' visible' : '');
            document.getElementById('brawlerFields').className = 'category-fields' + (category === 'brawler' ? ' visible' : '');
        };
        setTimeout(window.toggleCategoryFields, 100);

        window.toggleVoucherFields = function() {
            const type = document.getElementById('voucherRewardType').value;
            document.getElementById('voucherAmountField').style.display = (type === 'gems' || type === 'coins') ? 'block' : 'none';
            document.getElementById('voucherBrawlerField').style.display = type === 'brawler' ? 'block' : 'none';
        };
        setTimeout(window.toggleVoucherFields, 100);

        setTimeout(updatePlayerSelects, 200);
    }

    // ============================================================
    //  АДМИН-ФУНКЦИИ
    // ============================================================
    window.addShopItem = function() {
        const name = document.getElementById('shopName').value.trim();
        const desc = document.getElementById('shopDesc').value.trim();
        const category = document.getElementById('shopCategory').value;
        const isFree = document.getElementById('shopFree').checked;
        const fileInput = document.getElementById('shopImage');
        if (!name) return alert('Введите название товара!');
        if (category === 'resources') {
            const resourceType = document.getElementById('resourceType').value;
            const amount = parseInt(document.getElementById('resourceAmount').value) || 0;
            if (amount <= 0) return alert('Введите количество ресурсов!');
            const reward = resourceType === 'gems' ? `${amount} 💎` : `${amount} 🪙`;
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    shopItems.push({ name, desc, image: e.target.result, reward, category, resourceType, amount, free: isFree });
                    autoSync(); render();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                shopItems.push({ name, desc, image: '', reward, category, resourceType, amount, free: isFree });
                autoSync(); render();
            }
        } else if (category === 'brawler') {
            const brawlerName = document.getElementById('brawlerSelect').value;
            const cost = parseInt(document.getElementById('brawlerCost').value) || 0;
            if (!brawlerName) return alert('Выберите бойца!');
            if (!isFree && cost <= 0) return alert('Введите стоимость в гемах!');
            const reward = `${brawlerName} (${isFree ? 'БЕСПЛАТНО' : cost + ' 💎'})`;
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    shopItems.push({ name, desc, image: e.target.result, reward, category, brawlerName, cost, free: isFree });
                    autoSync(); render();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                shopItems.push({ name, desc, image: '', reward, category, brawlerName, cost, free: isFree });
                autoSync(); render();
            }
        }
    };

    window.deleteShopItem = function(idx) { shopItems.splice(idx, 1); autoSync(); render(); };
    window.addBrawlerFull = function() {
        const name = document.getElementById('bName').value.trim();
        if (!name) return alert('Введите имя!');
        const desc = document.getElementById('bDesc').value.trim();
        const rarity = document.getElementById('bRarity').value;
        const damage = parseInt(document.getElementById('bDamage').value) || 0;
        const hp = parseInt(document.getElementById('bHp').value) || 0;
        const minPower = parseInt(document.getElementById('bMinPower').value) || 0;
        const maxPower = parseInt(document.getElementById('bMaxPower').value) || 0;
        const fileInput = document.getElementById('bImage');
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                brawlers.push({ name, desc, rarity, image: e.target.result, damage, hp, minPower, maxPower });
                autoSync(); render();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            brawlers.push({ name, desc, rarity, image: '', damage, hp, minPower, maxPower });
            autoSync(); render();
        }
    };
    window.deleteBrawler = function(idx) { brawlers.splice(idx, 1); autoSync(); render(); };

    window.deleteVoucher = function(idx) { vouchers.splice(idx, 1); autoSync(); renderAdmin(); };

    window.startServer = function() { serverRunning = true; autoSync(); render(); };
    window.stopServer = function() { serverRunning = false; autoSync(); render(); };

    // ============================================================
    //  МЕНЮ
    // ============================================================
    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if (tab === 'admin' && !isAdmin) {
                document.getElementById('passwordOverlay').style.display = 'flex';
                return;
            }
            if (currentMainTab !== 'battle' && battleState !== 'select') {
                clearTimeout(searchTimer);
                battleState = 'select';
                selectedBrawler = null;
                opponent = null;
            }
            if (tab !== 'brawlers') { selectedBrawlerForDetail = null; }
            currentMainTab = tab;
            render();
        });
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    loadFromFirebase();
    document.getElementById('passwordOverlay').style.display = 'none';

    setTimeout(() => {
        if (!profile.name && !profile.banned) {
            showOnboarding();
        }
        if (profile.banned) {
            document.getElementById('bannedOverlay').style.display = 'flex';
        }
        render();
    }, 500);
</script>
</body>
</html>
