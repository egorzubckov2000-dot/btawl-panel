<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        html,body{height:100%;width:100%;background:#0b0b1a;display:flex;justify-content:center;align-items:center;overflow:hidden}
        .app{width:100%;max-width:500px;height:100vh;max-height:900px;background:#14142e;padding:16px 14px;display:flex;flex-direction:column;position:relative}
        @media(min-width:600px){.app{max-width:500px;height:95vh;border-radius:40px;border:1px solid #f5c84255;box-shadow:0 0 60px #f5c84222;padding:20px 18px}}
        @media(max-width:430px){.app{padding:12px 10px;height:100vh;max-height:860px}.header h1{font-size:22px}.menu button{font-size:11px;padding:8px 4px}}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0}
        .header h1{color:#f5c842;font-size:26px;font-weight:800;letter-spacing:1px}
        .header span{background:#f5c842;color:#0b0b1a;padding:2px 14px;border-radius:40px;font-weight:700;font-size:12px}
        .online-badge{background:#2ecc71;color:#0b0b1a;padding:2px 12px;border-radius:40px;font-weight:700;font-size:10px;display:flex;align-items:center;gap:4px;animation:pulse-badge 2s ease-in-out infinite}
        .online-badge::before{content:'';width:6px;height:6px;background:#0b0b1a;border-radius:50%;display:inline-block;animation:pulse-dot 1.5s ease-in-out infinite}
        @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes pulse-badge{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
        .offline-badge{background:#d43f3f;color:#fff;padding:2px 12px;border-radius:40px;font-weight:700;font-size:10px}
        #content{flex:1;background:#1a1a3a;border-radius:24px;padding:16px 12px;border:1px solid #f5c84233;overflow-y:auto;display:flex;flex-direction:column;animation:fadeIn 0.4s ease}
        @media(max-width:430px){#content{padding:12px 10px;border-radius:18px}}
        .cloud-panel{background:#0f0f2a;border-radius:20px;padding:10px 14px;margin-bottom:10px;border:1px solid #f5c84244;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
        .cloud-panel .status{color:#aaaacc;font-size:12px}
        .cloud-panel .status .connected{color:#2ecc71;font-weight:700}
        .menu{display:flex;justify-content:space-around;background:#0f0f28;border-radius:60px;padding:6px 4px;border:1px solid #f5c84233;flex-shrink:0;margin-top:10px;gap:2px}
        .menu button{background:transparent;border:none;color:#777799;font-weight:700;font-size:13px;padding:8px 6px;border-radius:40px;cursor:pointer;flex:1;text-align:center;transition:0.3s ease}
        .menu button.active{background:#f5c842;color:#0b0b1a;box-shadow:0 0 24px #f5c84277;transform:scale(1.05)}
        .menu button:hover:not(.active){color:#fff;transform:scale(1.05)}
        .empty-state{color:#8888aa;text-align:center;padding:30px 0;font-size:18px;margin:auto 0}
        .empty-state span{display:block;font-size:52px;margin-bottom:12px;animation:bounce-icon 2s ease-in-out infinite}
        @keyframes bounce-icon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

        .auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;justify-content:center;align-items:center;z-index:2000;animation:fadeIn 0.5s ease}
        .auth-box{background:#1a1a3a;padding:30px 24px;border-radius:30px;border:2px solid #f5c842;text-align:center;max-width:340px;width:90%;animation:scaleIn 0.4s ease}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        .auth-box h2{color:#f5c842;font-size:24px;margin-bottom:4px}
        .auth-box p{color:#8888aa;font-size:14px;margin-bottom:16px}
        .auth-box input{width:100%;padding:10px 14px;border-radius:40px;border:1px solid #555577;background:#0f0f2a;color:#eee;font-size:15px;outline:none;text-align:center;transition:0.3s ease;margin-bottom:10px}
        .auth-box input:focus{border-color:#f5c842;box-shadow:0 0 30px #f5c84222}
        .auth-box .btn-group{display:flex;gap:10px;margin-top:8px}
        .auth-box .btn-group button{flex:1;padding:12px;border-radius:40px;border:none;font-weight:700;font-size:15px;cursor:pointer;transition:0.3s ease}
        .auth-box .btn-group .login-btn{background:#f5c842;color:#0b0b1a}
        .auth-box .btn-group .login-btn:hover{transform:scale(1.03);box-shadow:0 0 30px #f5c84255}
        .auth-box .btn-group .register-btn{background:transparent;color:#4fc3f7;border:2px solid #4fc3f7}
        .auth-box .btn-group .register-btn:hover{transform:scale(1.03);background:#4fc3f722}
        .auth-box .error{color:#d43f3f;font-size:13px;margin-top:8px;display:none;animation:shake 0.4s ease}
        .auth-box .success{color:#2ecc71;font-size:13px;margin-top:8px;display:none}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

        .banned-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:3000;animation:fadeIn 0.5s ease}
        .banned-box{background:#1a1a3a;padding:30px 24px;border-radius:30px;border:2px solid #d43f3f;text-align:center;max-width:340px;width:90%;animation:scaleIn 0.4s ease}
        .banned-box .ban-icon{font-size:64px;display:block;margin-bottom:8px}
        .banned-box h2{color:#d43f3f;font-size:24px;margin-bottom:8px}
        .banned-box p{color:#8888aa;font-size:14px;margin-bottom:16px}
        .banned-box .btn-group{display:flex;flex-direction:column;gap:10px}
        .banned-box .btn-group button{padding:12px;border-radius:40px;border:none;font-weight:700;font-size:16px;cursor:pointer;transition:0.3s ease}
        .banned-box .btn-group .new-account{background:#f5c842;color:#0b0b1a}
        .banned-box .btn-group .new-account:hover{transform:scale(1.03);box-shadow:0 0 30px #f5c84255}
        .banned-box .btn-group .appeal{background:transparent;color:#4fc3f7;border:2px solid #4fc3f7}
        .banned-box .btn-group .appeal:hover{transform:scale(1.03);background:#4fc3f722}

        .server-notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f5c842,#f5a623);color:#0b0b1a;padding:16px 24px;border-radius:16px;font-weight:700;font-size:16px;z-index:9999;box-shadow:0 0 60px rgba(245,200,66,0.5);max-width:90%;width:auto;text-align:center;animation:slideDown 0.5s ease;display:none;border:2px solid #fff}
        .server-notification .close-notify{position:absolute;top:-10px;right:-10px;background:#d43f3f;color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s ease;box-shadow:0 0 20px rgba(212,63,63,0.5)}
        .server-notification .close-notify:hover{transform:scale(1.15);background:#ff2f2f}
        .server-notification .notify-icon{font-size:24px;margin-right:10px}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-60px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        .pvp-container{display:flex;flex-direction:column;flex:1;gap:10px}
        .pvp-search{text-align:center;padding:30px 20px;background:#0f0f2a;border-radius:24px;border:2px solid #f5c84244;animation:pulse-search 1.5s ease-in-out infinite;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center}
        @keyframes pulse-search{0%,100%{border-color:#f5c84244}50%{border-color:#f5c842}}
        .pvp-search .spinner{display:inline-block;width:50px;height:50px;border:4px solid #555577;border-top:4px solid #f5c842;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .pvp-search h3{color:#f5c842;font-size:22px;margin-bottom:8px}
        .pvp-search p{color:#8888aa;font-size:14px}
        .pvp-search .cancel-btn{margin-top:16px;background:#555;border:none;padding:10px 30px;border-radius:40px;color:#fff;font-weight:700;cursor:pointer;transition:0.3s ease}
        .pvp-search .cancel-btn:hover{transform:scale(1.05);background:#777}

        .battle-field{display:flex;justify-content:space-between;align-items:center;gap:10px;flex:1;min-height:100px}
        .battle-player{background:#0f0f2a;border-radius:20px;padding:14px;text-align:center;flex:1;border:2px solid #555577;transition:0.3s ease}
        .battle-player.active{border-color:#f5c842;box-shadow:0 0 30px #f5c84244}
        .battle-player .name{color:#eee;font-weight:700;font-size:16px}
        .battle-player .hp{color:#ff6b6b;font-size:14px;font-weight:700}
        .battle-player .brawler-icon{font-size:48px;display:block;margin:4px 0}
        .battle-player .power{color:#f5c842;font-size:12px;font-weight:700}
        .battle-vs{color:#f5c842;font-size:24px;font-weight:800}
        .battle-actions{display:flex;gap:10px;justify-content:center;flex-shrink:0}
        .battle-actions button{padding:12px 24px;border-radius:40px;border:none;font-weight:700;font-size:16px;cursor:pointer;transition:0.3s ease;flex:1;max-width:150px}
        .battle-actions .attack{background:#d43f3f;color:#fff}
        .battle-actions .attack:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 30px #d43f3f66}
        .battle-actions .defend{background:#4fc3f7;color:#0b0b1a}
        .battle-actions .defend:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 30px #4fc3f766}
        .battle-actions .ability{background:#9b59b6;color:#fff}
        .battle-actions .ability:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 30px #9b59b666}
        .battle-actions button:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
        .battle-log{background:#0f0f2a;border-radius:16px;padding:10px 14px;min-height:60px;max-height:120px;overflow-y:auto;flex-shrink:0}
        .battle-log .log-entry{color:#ccccee;font-size:13px;padding:2px 0;border-bottom:1px solid #1a1a3a}
        .battle-log .log-entry.crit{color:#ffd700}
        .battle-log .log-entry.heal{color:#51cf66}
        .battle-log .log-entry.damage{color:#ff6b6b}
        .battle-log .log-entry.win{color:#f5c842;font-weight:700}
        .battle-log .log-entry.shield{color:#4fc3f7}
        .battle-status{text-align:center;color:#aaaacc;font-size:14px;padding:6px;background:#0f0f2a;border-radius:12px}
        .battle-status .waiting{color:#f5c842}
        .battle-status .fighting{color:#ff6b6b;animation:pulse-fight 1s ease-in-out infinite}
        @keyframes pulse-fight{0%,100%{opacity:1}50%{opacity:0.5}}
        .battle-result{text-align:center;padding:20px;background:#0f0f2a;border-radius:20px;border:2px solid #f5c842;animation:scaleIn 0.4s ease}
        .battle-result .winner{font-size:32px;font-weight:800;color:#f5c842}
        .battle-result .trophies{font-size:18px;color:#2ecc71;margin-top:4px}
        .battle-result .back-btn{background:#f5c842;border:none;padding:10px 30px;border-radius:60px;font-weight:700;color:#0b0b1a;cursor:pointer;transition:0.3s ease;margin-top:12px;font-size:14px}
        .battle-result .back-btn:hover{transform:scale(1.05);box-shadow:0 0 30px #f5c84255}

        .brawler-list{display:flex;flex-direction:column;gap:6px}
        .brawler-item{background:#0f0f2a;padding:10px 14px;border-radius:16px;border-left:4px solid #f5c842;color:#eee;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.3s ease}
        .brawler-item:hover{transform:scale(1.02);border-left-color:#f5c84288}
        .brawler-item img{width:32px;height:32px;border-radius:40px;object-fit:cover}
        .brawler-detail{background:#0f0f2a;border-radius:24px;padding:20px;border:1px solid #f5c84233;animation:scaleIn 0.3s ease;margin-top:8px;text-align:center}
        .brawler-detail .avatar{font-size:80px;display:block;margin-bottom:4px}
        .brawler-detail .avatar img{width:80px;height:80px;border-radius:40px;object-fit:cover}
        .brawler-detail .name{color:#f5c842;font-size:26px;font-weight:800}
        .brawler-detail .rarity{font-size:14px;color:#f5c842;background:#f5c84222;padding:2px 18px;border-radius:40px;display:inline-block;margin:4px 0 12px}
        .brawler-detail .desc{color:#ccccee;font-size:15px;margin-bottom:16px}
        .brawler-detail .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 16px}
        .brawler-detail .stat-box{background:#1a1a3a;border-radius:16px;padding:10px 8px;border:1px solid #555577}
        .brawler-detail .stat-box .label{font-size:11px;color:#8888aa}
        .brawler-detail .stat-box .value{font-size:18px;font-weight:700;color:#eee}
        .brawler-detail .stat-box .value.damage{color:#ff6b6b}
        .brawler-detail .stat-box .value.hp{color:#51cf66}
        .brawler-detail .stat-box .value.power{color:#f5c842}
        .brawler-detail .status-badge{font-size:14px;padding:6px 20px;border-radius:40px;display:inline-block;font-weight:700}
        .brawler-detail .status-badge.owned{background:#2ecc71;color:#0b0b1a}
        .brawler-detail .status-badge.locked{background:#d43f3f;color:#fff}
        .brawler-detail .power-display{margin-top:8px;padding:8px;background:#1a1a3a;border-radius:16px;border:1px solid #555577}
        .brawler-detail .power-display .level{color:#f5c842;font-weight:700}
        .brawler-detail .upgrade-btn{background:#f5c842;border:none;padding:8px 20px;border-radius:40px;font-weight:700;color:#0b0b1a;cursor:pointer;transition:0.3s ease;margin-top:8px;font-size:14px}
        .brawler-detail .upgrade-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 30px #f5c84255}
        .brawler-detail .upgrade-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
        .brawler-detail .back-btn{background:#555577;border:none;padding:8px 24px;border-radius:40px;font-weight:700;color:#fff;cursor:pointer;transition:0.3s ease;margin-top:12px;font-size:14px}
        .brawler-detail .back-btn:hover{transform:scale(1.05);background:#777799}

        .shop-grid{display:flex;flex-direction:column;gap:10px}
        .shop-item{background:#0f0f2a;border-radius:20px;padding:14px;border:1px solid #555577;display:flex;gap:14px;align-items:center;transition:0.3s ease}
        .shop-item:hover{transform:scale(1.02);border-color:#f5c842;box-shadow:0 0 30px #f5c84211}
        .shop-item img{width:50px;height:50px;border-radius:40px;object-fit:cover;background:#1a1a3a;border:2px solid #f5c84255}
        .shop-item .info{flex:1}
        .shop-item .info .name{color:#eee;font-weight:700;font-size:15px}
        .shop-item .info .desc{color:#8888aa;font-size:12px}
        .shop-item .info .reward{font-size:11px;color:#f5c842;background:#f5c84222;padding:2px 10px;border-radius:40px;display:inline-block;margin-top:4px}
        .shop-item .buy-btn{background:#f5c842;border:none;padding:6px 16px;border-radius:40px;font-weight:700;color:#0b0b1a;cursor:pointer;transition:0.3s ease;font-size:13px;flex-shrink:0}
        .shop-item .buy-btn:hover:not(:disabled){transform:scale(1.08);box-shadow:0 0 30px #f5c84255}
        .shop-item .buy-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}

        .profile-card{background:#0f0f2a;border-radius:24px;padding:20px;border:1px solid #f5c84233;text-align:center}
        .profile-card .avatar{font-size:64px;margin-bottom:8px;display:block}
        .profile-card .nick{color:#f5c842;font-size:20px;font-weight:700;margin-bottom:4px}
        .profile-card .stats{display:flex;justify-content:center;gap:24px;margin-top:12px;flex-wrap:wrap}
        .profile-card .stat-item{text-align:center}
        .profile-card .stat-item .value{font-size:24px;font-weight:800;color:#f5c842}
        .profile-card .stat-item .label{font-size:11px;color:#8888aa;margin-top:2px}
        .profile-card .stat-item .value.gems{color:#4fc3f7}
        .profile-card .stat-item .value.coins{color:#ffd54f}
        .profile-card .stat-item .value.trophies{color:#f5c842}
        .profile-card .logout-btn{background:#d43f3f;border:none;padding:8px 24px;border-radius:60px;font-weight:700;color:#fff;cursor:pointer;transition:0.3s ease;font-size:14px;margin-top:12px}
        .profile-card .logout-btn:hover{transform:scale(1.05);box-shadow:0 0 30px #d43f3f66}

        .admin-tabs{display:flex;gap:4px;margin-bottom:10px;flex-shrink:0;background:#0f0f28;padding:4px;border-radius:40px;flex-wrap:wrap}
        .admin-tabs button{flex:1;min-width:40px;background:transparent;border:none;color:#777799;font-weight:700;font-size:11px;padding:6px 8px;border-radius:40px;transition:0.3s ease;cursor:pointer}
        .admin-tabs button.active-tab{background:#f5c842;color:#0b0b1a;box-shadow:0 0 20px #f5c84255;transform:scale(1.03)}
        .admin-tabs button:hover:not(.active-tab){color:#fff}
        .admin-panel{display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto}
        .form-card{background:#0f0f2a;padding:14px;border-radius:20px;border:1px solid #f5c84233}
        .form-card input,.form-card textarea,.form-card select{width:100%;background:#1a1a3a;border:1px solid #555577;border-radius:40px;padding:8px 14px;color:#eee;font-size:13px;outline:none;transition:0.3s ease;margin-bottom:8px}
        .form-card input:focus,.form-card textarea:focus,.form-card select:focus{border-color:#f5c842;box-shadow:0 0 20px #f5c84222;transform:scale(1.01)}
        .form-card textarea{border-radius:20px;resize:vertical;min-height:50px}
        .form-card .file-label{display:block;background:#1a1a3a;border:1px dashed #f5c84288;border-radius:40px;padding:8px 14px;color:#aaaacc;cursor:pointer;text-align:center;transition:0.3s ease;margin-bottom:8px;font-size:13px}
        .form-card .file-label:hover{border-color:#f5c842;background:#f5c84211;transform:scale(1.01)}
        .form-card .file-label input{display:none}
        .form-card .submit-btn{width:100%;background:#f5c842;border:none;padding:10px;border-radius:60px;font-weight:700;color:#0b0b1a;cursor:pointer;font-size:14px;transition:0.3s ease}
        .form-card .submit-btn:hover{transform:scale(1.03);box-shadow:0 0 30px #f5c84255}
        .shop-item-admin{background:#0f0f2a;border-radius:16px;padding:10px 14px;border-left:4px solid #f5c842;display:flex;align-items:center;gap:10px;transition:0.3s ease}
        .shop-item-admin:hover{transform:scale(1.02);border-left-color:#f5c84288}
        .shop-item-admin img{width:40px;height:40px;border-radius:40px;object-fit:cover}
        .shop-item-admin .info{flex:1}
        .shop-item-admin .info .name{color:#eee;font-weight:700;font-size:14px}
        .shop-item-admin .info .desc{color:#8888aa;font-size:12px}
        .shop-item-admin .del-btn{background:#d43f3f;border:none;color:#fff;width:26px;height:26px;border-radius:40px;font-weight:700;cursor:pointer;font-size:14px;flex-shrink:0;transition:0.3s ease}
        .shop-item-admin .del-btn:hover{transform:scale(1.15);background:#ff2f2f}
        .list-admin{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;margin-top:4px}
        .leaderboard-card{background:#0f0f2a;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:0.3s ease;border-left:4px solid #555577}
        .leaderboard-card:hover{transform:scale(1.01)}
        .leaderboard-card .rank{font-size:18px;font-weight:800;color:#8888aa;min-width:28px;text-align:center}
        .leaderboard-card .rank.gold{color:#ffd700}
        .leaderboard-card .rank.silver{color:#c0c0c0}
        .leaderboard-card .rank.bronze{color:#cd7f32}
        .leaderboard-card .info{flex:1}
        .leaderboard-card .info .name{color:#eee;font-weight:700;font-size:14px}
        .leaderboard-card .info .stats{color:#8888aa;font-size:11px}
        .leaderboard-card .gems{color:#4fc3f7;font-weight:700;font-size:16px}
        .voucher-code{background:#0f0f2a;border-radius:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border:1px solid #f5c84244;margin-top:8px}
        .voucher-code .code{color:#f5c842;font-weight:700;font-size:16px;letter-spacing:2px}
        .voucher-code .copy-btn{background:#555577;border:none;color:#fff;padding:4px 12px;border-radius:40px;cursor:pointer;font-size:12px;transition:0.3s ease}
        .voucher-code .copy-btn:hover{background:#777799;transform:scale(1.05)}
        .server-btn{border:none;padding:14px;border-radius:60px;font-weight:800;font-size:16px;cursor:pointer;transition:0.3s ease;width:100%;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:10px}
        .server-btn:hover{transform:scale(1.03)}
        .server-btn:active{transform:scale(0.95)}

</div>

<script>
// ============================================================
//  FIREBASE КОНФИГ
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
    authDomain: "brawl-stars-panel.firebaseapp.com",
    databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
    projectId: "brawl-stars-panel",
    storageBucket: "brawl-stars-panel.firebasestorage.app",
    messagingSenderId: "458936707927",
    appId: "1:458936707927:web:2abf0144fc135277ee6c12"
};

try { firebase.initializeApp(firebaseConfig); } catch(e) { console.warn('Firebase уже инициализирован:', e); }
const db = firebase.database();

// ============================================================
//  ПАРОЛЬ АДМИНКИ
// ============================================================
const ADMIN_PASSWORD = 'admin123';
let isAdmin = localStorage.getItem('brawl_isAdmin') === 'true';

function closePasswordModal() { document.getElementById('passwordOverlay').style.display = 'none'; }

function checkPassword() {
    const input = document.getElementById('passwordInput');
    const error = document.getElementById('passwordError');
    if(input.value === ADMIN_PASSWORD) {
        isAdmin = true;
        localStorage.setItem('brawl_isAdmin', 'true');
        document.getElementById('passwordOverlay').style.display = 'none';
        renderAdmin();
    } else {
        error.style.display = 'block';
        input.value = '';
        input.focus();
        setTimeout(() => { error.style.display = 'none'; }, 3000);
    }
}

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if(e.key === 'Enter') { checkPassword(); }
});

// ============================================================
//  АВТОРИЗАЦИЯ ПО ИМЕНИ
// ============================================================
let currentUserId = null;
let isLoggedIn = false;
let profile = { name: '', gems: 50, coins: 100, brawlers: [{name:'Шелли',level:1}], trophies: 0, banned: false };

function checkSession() {
    const savedId = localStorage.getItem('brawl_userId');
    if(savedId) {
        currentUserId = savedId;
        isLoggedIn = true;
        document.getElementById('authOverlay').style.display = 'none';
        loadUserProfile();
        loadGameData();
        render();
    } else {
        document.getElementById('authOverlay').style.display = 'flex';
    }
}

function registerWithUsername() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value.trim();
    const errorEl = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if(!username || !password) {
        errorEl.textContent = '❌ Заполните все поля!';
        errorEl.style.display = 'block';
        return;
    }
    if(username.length < 3) {
        errorEl.textContent = '❌ Имя должно быть минимум 3 символа!';
        errorEl.style.display = 'block';
        return;
    }
    if(password.length < 4) {
        errorEl.textContent = '❌ Пароль должен быть минимум 4 символа!';
        errorEl.style.display = 'block';
        return;
    }

    db.ref('usernames/' + username).once('value').then((snap) => {
        if(snap.exists()) {
            errorEl.textContent = '❌ Это имя уже занято!';
            errorEl.style.display = 'block';
            return;
        }

        const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2,6);
        db.ref('usernames/' + username).set(userId);
        db.ref('passwords/' + userId).set(password);

        const newProfile = {
            name: username,
            gems: 50,
            coins: 100,
            brawlers: [{name:'Шелли',level:1}],
            trophies: 0,
            banned: false,
            createdAt: Date.now()
        };
        db.ref('players/' + userId).set(newProfile);

        successEl.textContent = '✅ Аккаунт создан! Вход выполнен.';
        successEl.style.display = 'block';

        currentUserId = userId;
        isLoggedIn = true;
        localStorage.setItem('brawl_userId', userId);
        profile = newProfile;
        saveLocalProfile();

        setTimeout(() => {
            document.getElementById('authOverlay').style.display = 'none';
            render();
        }, 1000);
    });
}

function loginWithUsername() {
    const username = document.getElementById('authUsername').value.trim();
    const password = document.getElementById('authPassword').value.trim();
    const errorEl = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if(!username || !password) {
        errorEl.textContent = '❌ Заполните все поля!';
        errorEl.style.display = 'block';
        return;
    }

    db.ref('usernames/' + username).once('value').then((snap) => {
        const uid = snap.val();
        if(!uid) {
            errorEl.textContent = '❌ Пользователь не найден!';
            errorEl.style.display = 'block';
            return;
        }

        db.ref('passwords/' + uid).once('value').then((passSnap) => {
            const savedPass = passSnap.val();
            if(savedPass !== password) {
                errorEl.textContent = '❌ Неверный пароль!';
                errorEl.style.display = 'block';
                return;
            }

            if(profile.banned) {
                errorEl.textContent = '⛔ Вы забанены!';
                errorEl.style.display = 'block';
                return;
            }

            currentUserId = uid;
            isLoggedIn = true;
            localStorage.setItem('brawl_userId', uid);

            successEl.textContent = '✅ Вход выполнен!';
            successEl.style.display = 'block';

            loadUserProfile();
            setTimeout(() => {
                document.getElementById('authOverlay').style.display = 'none';
                render();
            }, 500);
        });
    });
}

function logout() {
    if(confirm('Выйти из аккаунта?')) {
        localStorage.removeItem('brawl_userId');
        currentUserId = null;
        isLoggedIn = false;
        profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false };
        document.getElementById('authOverlay').style.display = 'flex';
        render();
    }
}

function loadUserProfile() {
    if(!currentUserId) return;
    db.ref('players/' + currentUserId).once('value').then((snap) => {
        const data = snap.val();
        if(data) {
            profile = data;
            saveLocalProfile();
            if(profile.banned) {
                document.getElementById('bannedOverlay').style.display = 'flex';
            } else {
                document.getElementById('bannedOverlay').style.display = 'none';
            }
        }
        render();
    });
}

function saveLocalProfile() { localStorage.setItem('brawl_profile', JSON.stringify(profile)); }

// ============================================================
//  ВСЕ БОЙЦЫ
// ============================================================
const ALL_BRAWLERS = [
    {name:'Шелли', icon:'🔫', minDamage:100, maxDamage:180, minHp:400, maxHp:700},
    {name:'Кольт', icon:'🔫', minDamage:110, maxDamage:200, minHp:350, maxHp:600},
    {name:'Булл', icon:'🐂', minDamage:80, maxDamage:150, minHp:550, maxHp:900},
    {name:'Джесси', icon:'⚡', minDamage:90, maxDamage:170, minHp:380, maxHp:650},
    {name:'Брок', icon:'🚀', minDamage:130, maxDamage:220, minHp:300, maxHp:550},
    {name:'Спайк', icon:'🌵', minDamage:105, maxDamage:190, minHp:360, maxHp:630},
    {name:'Леон', icon:'🦎', minDamage:100, maxDamage:185, minHp:340, maxHp:620},
    {name:'Динамайк', icon:'💣', minDamage:120, maxDamage:210, minHp:320, maxHp:580}
];

let brawlers = [];
let shopItems = [];
let vouchers = [];
let serverRunning = true;
let currentMainTab = 'brawlers';
let adminSubTab = 'settings';
let battleState = 'select';
let selectedBrawler = null;
let isSyncing = false;
let selectedBrawlerForDetail = null;
let battleData = null;
let battleId = null;
let searchRef = null;
let searchTimeout = null;
let botTimeout = null;
let moveListener = null;
let battleListener = null;
let botInterval = null;

let serverSettings = {
    closeTime: null,
    workMessage: 'Добро пожаловать в Brawl Stars!',
    maintenanceMessage: 'Технические работы. Зайдите позже.',
    isClosed: false
};

function getBrawlerStats(brawlerName, level) {
    const b = ALL_BRAWLERS.find(br => br.name === brawlerName);
    if(!b) return { damage: 100, hp: 400 };
    const progress = (level - 1) / 9;
    const damage = Math.round(b.minDamage + (b.maxDamage - b.minDamage) * progress);
    const hp = Math.round(b.minHp + (b.maxHp - b.minHp) * progress);
    return { damage, hp };
}

function getUpgradeCost(level) {
    return { coins: level * 10, gems: Math.floor(level / 2) + 1 };
}

function loadServerSettings() {
    db.ref('serverSettings').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            serverSettings = data;
            checkServerStatus();
            render();
        }
    });
}

function checkServerStatus() {
    if(serverSettings.isClosed) {
        serverRunning = false;
        return;
    }
    if(serverSettings.closeTime) {
        const closeDate = new Date(serverSettings.closeTime);
        const now = new Date();
        serverRunning = now < closeDate;
    } else {
        serverRunning = true;
    }
}

function saveServerSettings() { db.ref('serverSettings').set(serverSettings); }

function loadGameData() {
    db.ref('data').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            brawlers = data.brawlers || [];
            shopItems = data.shopItems || [];
            vouchers = data.vouchers || [];
            if(currentUserId) {
                db.ref('players/' + currentUserId).once('value').then((snap) => {
                    const p = snap.val();
                    if(p) {
                        profile = p;
                        saveLocalProfile();
                        if(profile.banned) {
                            document.getElementById('bannedOverlay').style.display = 'flex';
                        } else {
                            document.getElementById('bannedOverlay').style.display = 'none';
                        }
                    }
                    render();
                });
            }
            render();
        }
    });
}

function checkBan() {
    if(profile.banned) {
        document.getElementById('bannedOverlay').style.display = 'flex';
        return true;
    }
    document.getElementById('bannedOverlay').style.display = 'none';
    return false;
}

function createNewAccount() {
    document.getElementById('bannedOverlay').style.display = 'none';
    document.getElementById('authOverlay').style.display = 'flex';
    localStorage.removeItem('brawl_userId');
    currentUserId = null;
    isLoggedIn = false;
    profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false };
    render();
}

function appealBan() { alert('📩 Заявка на разбан отправлена!'); }

function syncToFirebase() {
    if(isSyncing || !currentUserId) return;
    isSyncing = true;
    const data = { brawlers, shopItems, vouchers };
    db.ref('data').set(data)
        .then(() => {
            if(currentUserId) db.ref('players/' + currentUserId).set(profile);
            updateCloudUI(true);
            isSyncing = false;
        })
        .catch(error => { updateCloudUI(false);
            isSyncing = false; });
}

function updateCloudUI(connected) {
    const badge = document.getElementById('connectionBadge');
    badge.className = connected ? 'online-badge' : 'offline-badge';
    badge.textContent = connected ? '🟢 ☁️' : '🔴 ☁️';
    const statusEl = document.getElementById('cloudStatus');
    if(statusEl) {
        statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
        statusEl.className = connected ? 'connected' : 'disconnected';
    }
}

function autoSync() {
    saveLocalProfile();
    syncToFirebase();
}

function upgradeBrawler(brawlerName) {
    if(checkBan() || !currentUserId) return;
    const brawler = brawlers.find(b => b.name === brawlerName);
    if(!brawler) return alert('Боец не найден!');
    if(!profile.brawlers) profile.brawlers = [];
    const playerBrawler = profile.brawlers.find(b => b.name === brawlerName);
    if(!playerBrawler) return alert('У вас нет этого бойца!');
    if(playerBrawler.level >= 10) return alert('⚠️ Максимальный уровень!');
    const cost = getUpgradeCost(playerBrawler.level);
    if(profile.coins < cost.coins) return alert(`❌ Нужно ${cost.coins} 🪙`);
    if(profile.gems < cost.gems) return alert(`❌ Нужно ${cost.gems} 💎`);
    profile.coins -= cost.coins;
    profile.gems -= cost.gems;
    playerBrawler.level += 1;
    autoSync();
    render();
    alert(`✅ ${brawlerName} → ${playerBrawler.level} ур.!`);
}

function selectBrawlerForBattle(name) {
    selectedBrawler = name;
    render();
}

function resetBattle() {
    if(searchRef) {
        db.ref('search/' + searchRef.key).remove();
        searchRef = null;
    }
    db.ref('search').off();
    if(searchTimeout) clearTimeout(searchTimeout);
    if(botTimeout) clearTimeout(botTimeout);
    if(battleId) {
        db.ref('battles/' + battleId).off();
        if(moveListener) {
            moveListener.off();
            moveListener = null;
        }
        if(battleListener) {
            battleListener.off();
            battleListener = null;
        }
    }
    if(botInterval) {
        clearInterval(botInterval);
        botInterval = null;
    }
    battleState = 'select';
    battleData = null;
    battleId = null;
    selectedBrawler = null;
    render();
}

function findBattle() {
    if(checkBan() || !currentUserId) return;
    if(!selectedBrawler) {
        alert('Выберите бойца!');
        return;
    }
    const hasBrawler = profile.brawlers && profile.brawlers.some(pb => pb.name === selectedBrawler);
    if(!hasBrawler) {
        alert('⚠️ У вас нет этого бойца!');
        return;
    }

    battleState = 'searching';
    render();

    const searchData = {
        playerId: currentUserId,
        name: profile.name || 'Игрок',
        brawler: selectedBrawler,
        brawlerLevel: profile.brawlers.find(pb => pb.name === selectedBrawler)?.level || 1,
        timestamp: Date.now(),
        status: 'searching'
    };

    searchRef = db.ref('search').push(searchData);

    const searchListener = db.ref('search');
    searchListener.on('value', function(snapshot) {
        const searches = snapshot.val();
        if(!searches) return;

        const other = Object.keys(searches).find(key => {
            const s = searches[key];
            return s.playerId !== currentUserId && s.status === 'searching';
        });

        if(other) {
            const opponent = searches[other];
            db.ref('search/' + other).remove();
            if(searchRef) db.ref('search/' + searchRef.key).remove();
            searchListener.off();
            if(botTimeout) clearTimeout(botTimeout);
            startBattle(opponent);
        }
    });

    botTimeout = setTimeout(() => {
        if(battleState === 'searching') {
            const botNames = ['🤖 Гром', '🤖 Вспышка', '🤖 Тень', '🤖 Молния', '🤖 Звезда', '🤖 Кошмар'];
            const botBrawlers = ['Шелли', 'Кольт', 'Булл', 'Джесси', 'Брок', 'Спайк'];
            const botData = {
                playerId: 'bot_' + Math.random().toString(36).substring(2,8),
                name: botNames[Math.floor(Math.random() * botNames.length)],
                brawler: botBrawlers[Math.floor(Math.random() * botBrawlers.length)],
                brawlerLevel: Math.floor(Math.random() * 5) + 1,
                isBot: true
            };
            if(searchRef) db.ref('search/' + searchRef.key).remove();
            searchListener.off();
            startBattle(botData);
        }
    }, 5000);
}

function cancelSearch() {
    if(searchRef) {
        db.ref('search/' + searchRef.key).remove();
        searchRef = null;
    }
    db.ref('search').off();
    if(searchTimeout) clearTimeout(searchTimeout);
    if(botTimeout) clearTimeout(botTimeout);
    battleState = 'select';
    render();
}

function startBattle(opponentData) {
    const myLevel = profile.brawlers.find(b => b.name === selectedBrawler)?.level || 1;
    const myStats = getBrawlerStats(selectedBrawler, myLevel);
    const oppStats = getBrawlerStats(opponentData.brawler, opponentData.brawlerLevel || 1);

    battleId = 'battle_' + Date.now() + '_' + Math.random().toString(36).substring(2,6);

    battleData = {
        id: battleId,
        player1Id: currentUserId,
        player1Name: profile.name || 'Игрок',
        player1Brawler: selectedBrawler,
        player1HP: myStats.hp,
        player1MaxHP: myStats.hp,
        player1Damage: myStats.damage,
        player1Power: myLevel,
        player1Cooldown: 0,
        player1Shield: false,
        player2Id: opponentData.playerId,
        player2Name: opponentData.name || 'Противник',
        player2Brawler: opponentData.brawler,
        player2HP: oppStats.hp,
        player2MaxHP: oppStats.hp,
        player2Damage: oppStats.damage,
        player2Power: opponentData.brawlerLevel || 1,
        player2Cooldown: 0,
        player2Shield: false,
        currentTurn: 'player1',
        finished: false,
        winner: null,
        log: ['⚔️ Бой начался!'],
        isBot: opponentData.isBot || false
    };

    db.ref('battles/' + battleId).set(battleData);
    battleState = 'fighting';

    battleListener = db.ref('battles/' + battleId);
    battleListener.on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            battleData = data;
            if(battleData.finished) {
                endBattle();
            }
            render();
        }
    });

    moveListener = db.ref('battles/' + battleId + '/moves');
    moveListener.on('child_added', (snapshot) => {
        const move = snapshot.val();
        if(move.playerId === currentUserId) return;
        if(battleData && !battleData.finished) {
            processMove(move);
        }
    });

    if(opponentData.isBot) {
        startBotAI();
    }

    render();
}

function startBotAI() {
    if(botInterval) clearInterval(botInterval);
    botInterval = setInterval(() => {
        if(!battleData || battleData.finished) {
            clearInterval(botInterval);
            botInterval = null;
            return;
        }

        const isBotTurn = (battleData.currentTurn === 'player1' && battleData.player1Id.startsWith('bot_')) ||
            (battleData.currentTurn === 'player2' && battleData.player2Id.startsWith('bot_'));

        if(!isBotTurn) return;

        const isPlayer1Bot = battleData.currentTurn === 'player1';
        const botHP = isPlayer1Bot ? battleData.player1HP : battleData.player2HP;
        const botMaxHP = isPlayer1Bot ? battleData.player1MaxHP : battleData.player2MaxHP;
        const botHPPercent = botHP / botMaxHP;
        const botCooldown = isPlayer1Bot ? battleData.player1Cooldown : battleData.player2Cooldown;

        let action;
        if(botHPPercent < 0.25) {
            action = 'defend';
        } else if(botCooldown <= 0 && Math.random() < 0.35) {
            action = 'ability';
        } else {
            action = Math.random() < 0.65 ? 'attack' : 'defend';
        }

        const move = {
            action: action,
            playerId: battleData.currentTurn === 'player1' ? battleData.player1Id : battleData.player2Id,
            timestamp: Date.now()
        };
        db.ref('battles/' + battleId + '/moves').push(move);
    }, 1200);
}

function processMove(move) {
    if(!battleData || battleData.finished) return;

    const isPlayer1 = battleData.currentTurn === 'player1';
    const isPlayerTurn = isPlayer1 ? battleData.player1Id === move.playerId : battleData.player2Id === move.playerId;
    if(!isPlayerTurn) return;

    if(battleData.player1Cooldown > 0) battleData.player1Cooldown--;
    if(battleData.player2Cooldown > 0) battleData.player2Cooldown--;

    const attackerName = isPlayer1 ? battleData.player1Name : battleData.player2Name;
    const defenderName = isPlayer1 ? battleData.player2Name : battleData.player1Name;
    let damage = 0;
    let isCrit = false;

    if(move.action === 'attack') {
        const baseDamage = isPlayer1 ? battleData.player1Damage : battleData.player2Damage;
        const variance = 0.8 + Math.random() * 0.4;
        isCrit = Math.random() < 0.25;
        damage = Math.round(baseDamage * variance * (isCrit ? 1.5 : 1));

        if(isPlayer1 ? battleData.player2Shield : battleData.player1Shield) {
            damage = Math.round(damage * 0.5);
            if(isPlayer1) battleData.player2Shield = false;
            else battleData.player1Shield = false;
            battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
        }

        battleData.log.push(`💥 ${attackerName} нанёс ${damage} урона ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

        if(isPlayer1) {
            battleData.player2HP = Math.max(0, battleData.player2HP - damage);
        } else {
            battleData.player1HP = Math.max(0, battleData.player1HP - damage);
        }

    } else if(move.action === 'defend') {
        const heal = Math.round((isPlayer1 ? battleData.player1MaxHP : battleData.player2MaxHP) * 0.2);
        if(isPlayer1) {
            battleData.player1HP = Math.min(battleData.player1MaxHP, battleData.player1HP + heal);
            battleData.player1Shield = true;
        } else {
            battleData.player2HP = Math.min(battleData.player2MaxHP, battleData.player2HP + heal);
            battleData.player2Shield = true;
        }
        battleData.log.push(`🛡️ ${attackerName} восстановил ${heal} HP и поставил щит!`);

    } else if(move.action === 'ability') {
        const cooldown = isPlayer1 ? battleData.player1Cooldown : battleData.player2Cooldown;
        if(cooldown > 0) {
            battleData.log.push(`⏳ ${attackerName} — способность на перезарядке!`);
        } else {
            if(isPlayer1) battleData.player1Cooldown = 2;
            else battleData.player2Cooldown = 2;

            const baseDamage = isPlayer1 ? battleData.player1Damage : battleData.player2Damage;
            const variance = 0.9 + Math.random() * 0.2;
            isCrit = Math.random() < 0.3;
            damage = Math.round(baseDamage * 2.5 * variance * (isCrit ? 1.5 : 1));

            if(isPlayer1 ? battleData.player2Shield : battleData.player1Shield) {
                damage = Math.round(damage * 0.5);
                if(isPlayer1) battleData.player2Shield = false;
                else battleData.player1Shield = false;
                battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
            }

            battleData.log.push(`⚡ ${attackerName} нанёс СУПЕР-УДАР (${damage}) ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

            if(isPlayer1) {
                battleData.player2HP = Math.max(0, battleData.player2HP - damage);
            } else {
                battleData.player1HP = Math.max(0, battleData.player1HP - damage);
            }
        }
    }

    if(battleData.player1HP <= 0 || battleData.player2HP <= 0) {
        battleData.finished = true;
        battleData.winner = battleData.player1HP > 0 ? 'player1' : 'player2';
        const winnerName = battleData.winner === 'player1' ? battleData.player1Name : battleData.player2Name;
        battleData.log.push(`🏆 ${winnerName} ПОБЕДИЛ!`);

        if((battleData.winner === 'player1' && battleData.player1Id === currentUserId) ||
            (battleData.winner === 'player2' && battleData.player2Id === currentUserId)) {
            profile.trophies = (profile.trophies || 0) + 15;
            autoSync();
            setTimeout(() => alert('🏆 ПОБЕДА! +15 кубков!'), 300);
        } else {
            setTimeout(() => alert('💀 Поражение... Попробуйте снова!'), 300);
        }

        db.ref('battles/' + battleId).set(battleData);
        if(botInterval) { clearInterval(botInterval);
            botInterval = null; }
        return;
    }

    battleData.currentTurn = isPlayer1 ? 'player2' : 'player1';
    db.ref('battles/' + battleId).set(battleData);
    render();
}

function endBattle() {
    battleState = 'result';
    if(battleListener) {
        battleListener.off();
        battleListener = null;
    }
    if(moveListener) {
        moveListener.off();
        moveListener = null;
    }
    if(botInterval) { clearInterval(botInterval);
        botInterval = null; }
    render();
}

// ===== ГЛАВНАЯ ФУНКЦИЯ ДЛЯ КНОПОК =====
function makeMove(action) {
    if(!battleData || battleData.finished) return;

    const isMyTurn = (battleData.currentTurn === 'player1' && battleData.player1Id === currentUserId) ||
        (battleData.currentTurn === 'player2' && battleData.player2Id === currentUserId);

    if(!isMyTurn) {
        alert('⏳ Сейчас не ваш ход!');
        return;
    }

    if(action === 'ability') {
        const cooldown = battleData.currentTurn === 'player1' ? battleData.player1Cooldown : battleData.player2Cooldown;
        if(cooldown > 0) {
            alert(`⏳ Перезарядка: ${cooldown} ходов`);
            return;
        }
    }

    document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = true);

    const move = { action, playerId: currentUserId, timestamp: Date.now() };
    db.ref('battles/' + battleId + '/moves').push(move).then(() => {
        setTimeout(() => {
            document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = false);
        }, 500);
    });
}

function buyItem(name) {
    if(checkBan() || !currentUserId) return;
    const item = shopItems.find(i => i.name === name);
    if(!item) return alert('Товар не найден!');
    const isFree = item.free === true;

    if(item.category === 'brawler') {
        if(profile.brawlers && profile.brawlers.some(pb => pb.name === item.brawlerName)) {
            return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
        }
        if(!isFree && profile.gems < item.cost) {
            return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
        }
        if(!isFree) { profile.gems -= item.cost; }
        if(!profile.brawlers) profile.brawlers = [];
        profile.brawlers.push({ name: item.brawlerName, level: 1 });
        alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
        autoSync();
        render();
    } else if(item.category === 'resources') {
        if(item.resourceType === 'gems') {
            profile.gems += item.amount;
            alert(`✅ Вы получили ${item.amount} 💎 Гемов${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
        } else if(item.resourceType === 'coins') {
            profile.coins += item.amount;
            alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
        }
        autoSync();
        render();
    } else {
        alert(`✅ Вы купили: ${name}!`);
    }
}

function generateVoucher() {
    const rewardType = document.getElementById('voucherRewardType').value;
    const amount = parseInt(document.getElementById('voucherAmount').value) || 0;
    const brawlerName = document.getElementById('voucherBrawler').value;
    const maxUses = parseInt(document.getElementById('voucherMaxUses').value) || 1;

    if(rewardType === 'gems' && amount <= 0) return alert('Введите количество гемов!');
    if(rewardType === 'coins' && amount <= 0) return alert('Введите количество монет!');
    if(rewardType === 'brawler' && !brawlerName) return alert('Выберите бойца!');
    if(maxUses < 1) return alert('Количество активаций должно быть минимум 1!');

    const code = 'VOUCHER_' + Math.random().toString(36).substring(2,8).toUpperCase();
    const voucher = { code, rewardType, amount, brawlerName, maxUses: maxUses, used: false, usedBy: [], createdAt: Date.now() };
    vouchers.push(voucher);
    autoSync();
    renderAdmin();
    alert(`✅ Ваучер создан!\nКод: ${code}\nНаграда: ${rewardType === 'gems' ? '💎 ' + amount : rewardType === 'coins' ? '🪙 ' + amount : '👤 ' + brawlerName}\nАктиваций: ${maxUses}`);
    const container = document.getElementById('voucherResult');
    if(container) {
        container.innerHTML = `<div class="voucher-code"><span class="code">${code}</span><button class="copy-btn" onclick="copyVoucher('${code}')">📋 Копировать</button></div>`;
    }
}

function copyVoucher(code) {
    navigator.clipboard.writeText(code).then(() => alert('✅ Код скопирован!')).catch(() => prompt('Скопируйте код вручную:', code));
}

function activateVoucher() {
    const codeInput = document.getElementById('voucherActivateInput');
    const code = codeInput.value.trim().toUpperCase();
    if(!code) return alert('Введите код ваучера!');

    const voucher = vouchers.find(v => v.code === code);
    if(!voucher) return alert('❌ Неверный код!');
    if(voucher.maxUses <= 0) return alert('❌ Этот ваучер уже использован!');
    if(voucher.usedBy && voucher.usedBy.includes(currentUserId)) return alert('⚠️ Вы уже активировали этот ваучер!');

    if(!voucher.usedBy) voucher.usedBy = [];
    voucher.usedBy.push(currentUserId);
    voucher.maxUses -= 1;
    if(voucher.maxUses <= 0) voucher.used = true;

    if(voucher.rewardType === 'gems') {
        profile.gems += voucher.amount;
        alert(`✅ Вы получили ${voucher.amount} 💎 Гемов!`);
    } else if(voucher.rewardType === 'coins') {
        profile.coins += voucher.amount;
        alert(`✅ Вы получили ${voucher.amount} 🪙 Монет!`);
    } else if(voucher.rewardType === 'brawler') {
        if(profile.brawlers && profile.brawlers.some(pb => pb.name === voucher.brawlerName)) {
            alert(`⚠️ У вас уже есть боец ${voucher.brawlerName}!`);
            return;
        }
        if(!profile.brawlers) profile.brawlers = [];
        profile.brawlers.push({ name: voucher.brawlerName, level: 1 });
        alert(`✅ Вы получили бойца ${voucher.brawlerName}!`);
    }

    autoSync();
    render();
    codeInput.value = '';
    alert(`🎉 Ваучер активирован! Осталось ${voucher.maxUses} активаций.`);
}

function sendMessage() {
    if(checkBan() || !currentUserId) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    db.ref('chat').push({ playerId: currentUserId, name: profile.name || 'Аноним', text: text, timestamp: Date.now() });
    input.value = '';
}

function loadChat() {
    db.ref('chat').orderByChild('timestamp').limitToLast(100).on('value', (snapshot) => {
        const messages = snapshot.val();
        const container = document.getElementById('chatMessages');
        if(!container) return;
        if(!messages) {
            container.innerHTML = `<div class="chat-empty"><span>💬</span>Сообщений пока нет<br><span style="font-size:12px;color:#555577;">Будь первым!</span></div>`;
            return;
        }
        let html = '';
        const msgs = Object.values(messages).reverse();
        msgs.forEach(msg => {
            const isOwn = msg.playerId === currentUserId;
            const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            html += `<div class="chat-message ${isOwn ? 'own' : ''}"><div class="msg-header"><span class="msg-name">${msg.name || 'Аноним'}</span><span class="msg-time">${time}</span></div><div class="msg-text">${msg.text}</div></div>`;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    });
}

let playersList = [];

function loadPlayersList() {
    db.ref('players').once('value').then((snapshot) => {
        const players = snapshot.val();
        if(players) {
            playersList = Object.keys(players).map(key => ({ id: key, ...players[key] }));
            playersList.sort((a, b) => (b.trophies || 0) - (a.trophies || 0));
            updatePlayerSelects();
        }
    });
}

function updatePlayerSelects() {
    const selects = ['adminPlayerSelect', 'banPlayerSelect', 'unbanPlayerSelect', 'adminTrophySelect', 'adminDeleteSelect'];
    selects.forEach(id => {
        const el = document.getElementById(id);
        if(el) {
            const currentVal = el.value;
            el.innerHTML = '<option value="">-- Выберите игрока --</option>';
            playersList.forEach(p => {
                el.innerHTML += `<option value="${p.id}">${p.name || 'Аноним'} (🏆 ${p.trophies || 0})</option>`;
            });
            if(currentVal) el.value = currentVal;
        }
    });
}

function adminBanPlayer() {
    const playerId = document.getElementById('banPlayerSelect').value;
    if(!playerId) return alert('Выберите игрока!');
    db.ref('players/' + playerId).once('value').then((snap) => {
        const player = snap.val();

function addShopItem() {
    const name = document.getElementById('shopName').value.trim();
    const desc = document.getElementById('shopDesc').value.trim();
    const category = document.getElementById('shopCategory').value;
    const isFree = document.getElementById('shopFree').checked;
    const fileInput = document.getElementById('shopImage');
    if(!name) return alert('Введите название товара!');
    if(category === 'resources') {
        const resourceType = document.getElementById('resourceType').value;
        const amount = parseInt(document.getElementById('resourceAmount').value) || 0;
        if(amount <= 0) return alert('Введите количество ресурсов!');
        const reward = resourceType === 'gems' ? `${amount} 💎` : `${amount} 🪙`;
        const processItem = (image) => {
            shopItems.push({ name, desc, image, reward, category, resourceType, amount, free: isFree });
            autoSync();
            render();
        };
        if(fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { processItem(e.target.result); };
            reader.readAsDataURL(fileInput.files[0]);
        } else { processItem(''); }
    } else if(category === 'brawler') {
        const brawlerName = document.getElementById('brawlerSelect').value;
        const cost = parseInt(document.getElementById('brawlerCost').value) || 0;
        if(!brawlerName) return alert('Выберите бойца!');
        if(!isFree && cost <= 0) return alert('Введите стоимость в гемах!');
        const reward = `${brawlerName} (${isFree ? 'БЕСПЛАТНО' : cost + ' 💎'})`;
        const processItem = (image) => {
            shopItems.push({ name, desc, image, reward, category, brawlerName, cost, free: isFree });
            autoSync();
            render();
        };
        if(fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) { processItem(e.target.result); };
            reader.readAsDataURL(fileInput.files[0]);
        } else { processItem(''); }
    }
}

function getTimeRemaining() {
    if(!serverSettings.closeTime) return null;
    const closeDate = new Date(serverSettings.closeTime);
    const now = new Date();
    const diff = closeDate - now;
    if(diff <= 0) return null;
    const hours = Math.floor(diff / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);
    return { hours, minutes, seconds };
}

function applyServerSettings() {
    const closeTime = document.getElementById('serverCloseTime').value;
    const workMessage = document.getElementById('serverWorkMessage').value.trim();
    const maintenanceMessage = document.getElementById('serverMaintenanceMessage').value.trim();
    serverSettings.closeTime = closeTime ? new Date(closeTime).toISOString() : null;
    serverSettings.workMessage = workMessage || 'Добро пожаловать в Brawl Stars!';
    serverSettings.maintenanceMessage = maintenanceMessage || 'Технические работы. Зайдите позже.';
    saveServerSettings();
    checkServerStatus();
    render();
    alert('✅ Настройки сохранены!');
}

function toggleServerManual() {
    serverSettings.isClosed = !serverSettings.isClosed;
    saveServerSettings();
    checkServerStatus();
    render();
}

function sendGlobalNotification() {
    const text = document.getElementById('notifyText').value.trim();
    const duration = parseInt(document.getElementById('notifyDuration').value) || 5;
    if(!text) { alert('Введите текст сообщения!'); return; }
    db.ref('serverNotifications').push({ text, duration, timestamp: Date.now(), sender: profile.name || 'Админ' });
    document.getElementById('notifyText').value = '';
    alert('✅ Сообщение отправлено всем игрокам!');
}

let notificationTimeout = null;

function listenForNotifications() {
    db.ref('serverNotifications').on('child_added', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            showNotification(data.text, data.duration || 5);
            db.ref('serverNotifications/' + snapshot.key).remove();
        }
    });
}

function showNotification(text, duration = 5) {
    const el = document.getElementById('serverNotification');
    const textEl = document.getElementById('notificationText');
    textEl.textContent = text;
    el.style.display = 'block';
    if(notificationTimeout) clearTimeout(notificationTimeout);
    notificationTimeout = setTimeout(() => {
        el.style.display = 'none';
    }, duration * 1000);
}

function closeNotification() {
    const el = document.getElementById('serverNotification');
    el.style.display = 'none';
    if(notificationTimeout) { clearTimeout(notificationTimeout);
        notificationTimeout = null; }
}

const content = document.getElementById('content');
const menuBtns = document.querySelectorAll('.menu button');

function render() {
    if(!isLoggedIn || !currentUserId) {
        document.getElementById('authOverlay').style.display = 'flex';
        content.innerHTML = `<div class="empty-state"><span>🔒</span>Авторизуйтесь для продолжения</div>`;
        menuBtns.forEach(b => b.classList.remove('active'));
        return;
    }

    if(profile.banned) {
        document.getElementById('bannedOverlay').style.display = 'flex';
        content.innerHTML = `<div class="empty-state"><span>🚫</span>Вы забанены</div>`;
        menuBtns.forEach(b => b.classList.remove('active'));
        const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === currentMainTab);
        if(activeBtn) activeBtn.classList.add('active');
        return;
    } else {
        document.getElementById('bannedOverlay').style.display = 'none';
    }

    const tab = currentMainTab;
    const cloudHtml = `<div class="cloud-panel"><div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div></div>`;

    }

        document.getElementById('passwordOverlay').style.display = 'flex';
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="brawlers"]').classList.add('active');
        currentMainTab = 'brawlers';
        return;
    }

    checkServerStatus();

    if(!serverRunning) {
        content.innerHTML = cloudHtml + `<div class="maintenance"><span>🔧</span><h2>${serverSettings.maintenanceMessage || 'Технические работы ведутся'}</h2><p>${serverSettings.closeTime ? 'Сервер будет доступен после ' + new Date(serverSettings.closeTime).toLocaleString() : 'Сервер временно недоступен'}</p></div>`;

        const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
        if(activeBtn) activeBtn.classList.add('active');
        return;
    }

    if(tab === 'battle') { renderBattle(cloudHtml); return; }

    if(tab === 'shop') { renderShop(cloudHtml); return; }

                    <div class="battle-player ${!isMyTurn ? 'active' : ''}">

                    </button>
                </div>

                <div class="battle-log">${logHtml}</div>
            </div>
        `;

    function toggleCategoryFields() {
        const category = document.getElementById('shopCategory');
        const resourcesFields = document.getElementById('resourcesFields');
        const brawlerFields = document.getElementById('brawlerFields');

        }
    }

        const type = document.getElementById('voucherRewardType');
        const amountField = document.getElementById('voucherAmountField');
        const brawlerField = document.getElementById('voucherBrawlerField');
        if(type && amountField && brawlerField) {
            amountField.style.display = (type.value === 'gems' || type.value === 'coins') ? 'block' : 'none';
            brawlerField.style.display = type.value === 'brawler' ? 'block' : 'none';
        }
    }

    setTimeout(() => {
        if(document.getElementById('shopCategory')) toggleCategoryFields();
        if(document.getElementById('voucherRewardType')) toggleVoucherFields();
    }, 100);

    setTimeout(updatePlayerSelects, 200);
}

// ============================================================
//  ПРИВЯЗКА КНОПОК
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loginBtn')?.addEventListener('click', loginWithUsername);
    document.getElementById('registerBtn')?.addEventListener('click', registerWithUsername);
    document.getElementById('checkPasswordBtn')?.addEventListener('click', checkPassword);
    document.getElementById('newAccountBtn')?.addEventListener('click', createNewAccount);
    document.getElementById('appealBtn')?.addEventListener('click', appealBan);

    document.getElementById('passwordInput')?.addEventListener('keydown', function(e) {
        if(e.key === 'Enter') { checkPassword(); }
    });

    document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
        if(e.key === 'Enter') { sendMessage(); }
    });

    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if(tab === 'admin' && !isAdmin) {
                document.getElementById('passwordOverlay').style.display = 'flex';
                return;
            }
            if(tab !== 'brawlers') { selectedBrawlerForDetail = null; }
            if(tab !== 'battle' && battleState !== 'select') {
                if(searchRef) {
                    db.ref('search/' + searchRef.key).remove();
                    searchRef = null;
                }
                db.ref('search').off();
                if(searchTimeout) clearTimeout(searchTimeout);
                if(botTimeout) clearTimeout(botTimeout);
                if(battleId) {
                    db.ref('battles/' + battleId).off();
                    if(moveListener) {
                        moveListener.off();
                        moveListener = null;
                    }
                    if(battleListener) {
                        battleListener.off();
                        battleListener = null;
                    }
                }
                if(botInterval) {
                    clearInterval(botInterval);
                    botInterval = null;
                }
                battleState = 'select';
                battleData = null;
                battleId = null;
                selectedBrawler = null;
            }
            currentMainTab = tab;
            render();
        });
    });
});

listenForNotifications();
checkSession();
render();
