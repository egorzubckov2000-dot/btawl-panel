<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: #14142e;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:500px) {
            .app {
                border-radius: 40px;
                height: 95vh;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-badge {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 18px 14px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 13px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .cloud-panel .status .disconnected {
            color: #d43f3f;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 8px 6px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 12px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
            position: relative;
        }
        .menu button::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #f5c842;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button.active::after {
            width: 0;
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
            animation: fadeIn 0.5s ease;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 16px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            transition: 0.3s ease;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .brawler-item img {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            object-fit: cover;
        }
        .admin-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
        }
        .admin-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 0;
            border-radius: 40px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
            transform: scale(1.03);
        }
        .admin-tabs button:hover:not(.active-tab) {
            color: #fff;
        }
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            animation: fadeIn 0.3s ease;
        }
        .form-card {
            background: #0f0f2a;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
            transition: 0.3s ease;
        }
        .form-card:hover {
            border-color: #f5c84288;
            box-shadow: 0 0 30px #f5c84211;
        }
        .form-card input,
        .form-card textarea,
        .form-card select {
            width: 100%;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            border-color: #f5c842;
            box-shadow: 0 0 20px #f5c84222;
            transform: scale(1.01);
        }
        .form-card textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 60px;
        }
        .form-card .file-label {
            display: block;
            background: #1a1a3a;
            border: 1px dashed #f5c84288;
            border-radius: 40px;
            padding: 10px 16px;
            color: #aaaacc;
            cursor: pointer;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .form-card .file-label:hover {
            border-color: #f5c842;
            background: #f5c84211;
            transform: scale(1.01);
        }
        .form-card .file-label input {
            display: none;
        }
        .form-card .submit-btn {
            width: 100%;
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }
        .form-card .submit-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .shop-item-admin {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            transition: 0.3s ease;
        }
        .shop-item-admin:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .shop-item-admin img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item-admin .info {
            flex: 1;
        }
        .shop-item-admin .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .shop-item-admin .info .desc {
            color: #8888aa;
            font-size: 13px;
        }
        .shop-item-admin .info .reward {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            display: inline-block;
        }
        .shop-item-admin .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            transition: 0.3s ease;
        }
        .shop-item-admin .del-btn:hover {
            transform: scale(1.15);
            background: #ff2f2f;
        }
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #555577;
            display: flex;
            gap: 16px;
            align-items: center;
            transition: 0.3s ease;
            animation: slideIn 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84211;
        }
        .shop-item img {
            width: 60px;
            height: 60px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 13px;
        }
        .shop-item .info .reward {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
        }
        .shop-item .buy-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }
        .maintenance {
            background: #2a1a1a;
            border: 2px solid #f5c84288;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin: auto 0;
            animation: pulse-maintenance 2s ease-in-out infinite;
        }
        @keyframes pulse-maintenance {
            0%,
            100% { border-color: #f5c84288; }
            50% { border-color: #f5c842; }
        }
        .maintenance span {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
            animation: spin-icon 4s linear infinite;
        }
        @keyframes spin-icon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .maintenance h2 {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        .maintenance p {
            color: #aaaacc;
            margin-top: 8px;
            font-size: 15px;
        }

        /* ===== ЗЕЛЁНАЯ КНОПКА ЗАПУСКА ===== */
        .start-btn {
            background: #2ecc71;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 0 30px #2ecc7166;
            width: 100%;
            max-width: 300px;
            margin: 12px auto 0;
        }
        .start-btn:hover {
            transform: scale(1.05);
            background: #3dff8a;
            box-shadow: 0 0 50px #2ecc71aa;
        }
        .start-btn:active {
            transform: scale(0.95);
        }

        /* ===== КРАСНАЯ КНОПКА ОСТАНОВКИ ===== */
        .stop-btn {
            background: #d43f3f;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .stop-btn:hover {
            transform: scale(1.03);
            background: #ff2f2f;
            box-shadow: 0 0 30px #d43f3f66;
        }

        /* ===== ОКНО ПАРОЛЯ ===== */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }
        .password-box {
            background: #1a1a3a;
            padding: 40px 30px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .password-box h2 {
            color: #f5c842;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .password-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .password-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: 0.3s ease;
        }
        .password-box input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .password-box button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            background: #f5c842;
            color: #0b0b1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .password-box button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .password-box .error {
            color: #d43f3f;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ===== БОЙ ===== */
        .brawl-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }
        .brawl-select .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }
        .brawl-select .brawler-card {
            background: #0f0f2a;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            color: #eee;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .brawl-select .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84222;
        }
        .brawl-select .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 30px #f5c84244;
            transform: scale(1.05);
        }
        .brawl-select .search-status {
            text-align: center;
            color: #aaaacc;
            padding: 20px 0;
        }
        .brawl-select .search-status .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .brawl-select .cancel-btn {
            background: #555;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
        }
        .brawl-select .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        .brawl-select .result-box {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2ecc71;
            margin: auto 0;
            animation: scaleIn 0.4s ease;
        }
        .brawl-select .result-box .vs {
            font-size: 28px;
            color: #f5c842;
            margin: 8px 0;
        }
        .brawl-select .result-box .player-name {
            font-size: 22px;
            font-weight: 700;
            color: #eee;
        }
        .brawl-select .result-box .found-tag {
            color: #2ecc71;
            font-size: 14px;
            background: #2ecc7122;
            padding: 2px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .brawl-select .back-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
            transition: 0.3s ease;
        }
        .brawl-select .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>⚡ BRAWL</h1>
        <span>v.171-11</span>
        <div class="offline-badge" id="connectionBadge">☁️</div>
    </div>

    <div id="content"></div>

    <div class="menu">
        <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
        <button data-tab="shop">🛍️ Магазин</button>
        <button data-tab="battle">⚡ Бой</button>
        <button data-tab="admin">⚙️ Админка</button>
    </div>
</div>

<!-- ===== ОКНО ПАРОЛЯ ===== -->
<div class="password-overlay" id="passwordOverlay">
    <div class="password-box">
        <h2>🔒 Админ-панель</h2>
        <p>Введите пароль для доступа</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль" />
        <button onclick="checkPassword()">Войти</button>
        <div class="error" id="passwordError">❌ Неверный пароль</div>
    </div>
</div>

<script>
    // ============================================================
    //  ПАРОЛЬ (ПО УМОЛЧАНИЮ: admin123)
    // ============================================================
    const ADMIN_PASSWORD = 'admin123';

    let isAdmin = false;

    function checkPassword() {
        const input = document.getElementById('passwordInput');
        const error = document.getElementById('passwordError');
        if (input.value === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('passwordOverlay').style.display = 'none';
            renderAdmin();
        } else {
            error.style.display = 'block';
            input.value = '';
            input.focus();
            setTimeout(() => { error.style.display = 'none'; }, 3000);
        }
    }

    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // ============================================================
    //  ВСТАВЬ СВОЙ КОНФИГ FIREBASE
    // ============================================================
   const firebaseConfig = {
  apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
  authDomain: "brawl-stars-panel.firebaseapp.com",
  databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
  projectId: "brawl-stars-panel",
  storageBucket: "brawl-stars-panel.firebasestorage.app",
  messagingSenderId: "458936707927",
  appId: "1:458936707927:web:2abf0144fc135277ee6c12"
};

    // ============================================================
    //  ИНИЦИАЛИЗАЦИЯ FIREBASE
    // ============================================================
    try {
        firebase.initializeApp(firebaseConfig);
    } catch (e) {
        console.warn('Firebase уже инициализирован:', e);
    }
    const db = firebase.database();

    // Данные
    let brawlers = [];
    let shopItems = [];
    let serverRunning = true;
    let currentMainTab = 'brawlers';
    let adminSubTab = 'shop';
    let battleState = 'select';
    let selectedBrawler = null;
    let opponent = null;
    let searchTimer = null;
    let searchCancelled = false;
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар'];
    let isSyncing = false;

    // ============================================================
    //  LOCALSTORAGE
    // ============================================================
    function loadLocalData() {
        try {
            const raw = localStorage.getItem('brawlData_firebase');
            if (raw) {
                const data = JSON.parse(raw);
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                return true;
            }
        } catch (e) {}
        return false;
    }

    function saveLocalData() {
        const data = { brawlers, shopItems, serverRunning };
        localStorage.setItem('brawlData_firebase', JSON.stringify(data));
    }

    if (!loadLocalData()) {
        brawlers = [
            { name: 'Шелли', desc: 'Дробовик', rarity: 'Редкий', image: '', damage: 120, hp: 400, minPower: 1, maxPower: 10 },
            { name: 'Кольт', desc: 'Двойные револьверы', rarity: 'Редкий', image: '', damage: 80, hp: 300, minPower: 1, maxPower: 10 }
        ];
        shopItems = [
            { name: 'Ящик x10', desc: '10 ящиков с наградами', image: '', reward: 'Ящики' },
            { name: 'Скин Дракон', desc: 'Эксклюзивный скин для Кольта', image: '', reward: 'Скин' }
        ];
        serverRunning = true;
        saveLocalData();
    }

    // ============================================================
    //  FIREBASE СИНХРОНИЗАЦИЯ
    // ============================================================
    function syncToFirebase() {
        if (isSyncing) return;
        isSyncing = true;
        const data = { brawlers, shopItems, serverRunning };
        db.ref('data').set(data)
            .then(() => {
                console.log('✅ Данные отправлены в Firebase');
                updateCloudUI(true);
                isSyncing = false;
            })
            .catch(error => {
                console.error('❌ Ошибка отправки:', error);
                updateCloudUI(false);
                isSyncing = false;
            });
    }

    function loadFromFirebase() {
        db.ref('data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const localData = JSON.parse(localStorage.getItem('brawlData_firebase') || '{}');
                if (JSON.stringify(localData) !== JSON.stringify(data)) {
                    brawlers = data.brawlers || [];
                    shopItems = data.shopItems || [];
                    serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                    saveLocalData();
                    render();
                    console.log('📥 Данные загружены из Firebase');
                }
                updateCloudUI(true);
            }
        }, (error) => {
            console.error('❌ Ошибка загрузки из Firebase:', error);
            updateCloudUI(false);
        });
    }

    function updateCloudUI(connected) {
        const badge = document.getElementById('connectionBadge');
        if (connected) {
            badge.className = 'online-badge';
            badge.textContent = '🟢 ☁️';
        } else {
            badge.className = 'offline-badge';
            badge.textContent = '🔴 ☁️';
        }
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    function autoSync() {
        saveLocalData();
        syncToFirebase();
    }

    // ============================================================
    //  UI
    // ============================================================
    const content = document.getElementById('content');
    const menuBtns = document.querySelectorAll('.menu button');

    function render() {
        const tab = currentMainTab;
        const cloudHtml = `
            <div class="cloud-panel">
                <div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div>
            </div>
        `;

        if (tab === 'admin' && isAdmin) {
            renderAdmin(cloudHtml);
            return;
        }

        if (tab === 'admin' && !isAdmin) {
            document.getElementById('passwordOverlay').style.display = 'flex';
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="brawlers"]').classList.add('active');
            currentMainTab = 'brawlers';
            return;
        }

        // Если сервер остановлен и это НЕ админка — показываем заглушку без кнопки
        if (!serverRunning) {
            let html = cloudHtml + `
                <div class="maintenance">
                    <span>🔧</span>
                    <h2>Технические работы ведутся</h2>
                    <p>Сервер временно недоступен</p>
                </div>
            `;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        }

        if (tab === 'battle') { renderBattle(cloudHtml); return; }
        if (tab === 'brawlers') { renderBrawlers(cloudHtml); return; }
        if (tab === 'shop') { renderShop(cloudHtml); return; }
    }

    function renderBrawlers(cloudHtml) {
        let html = cloudHtml;
        if (!brawlers.length) {
            html += `<div class="empty-state"><span>🦸</span>Нет бойцов</div>`;
        } else {
            html += `<div class="brawler-list">`;
            brawlers.forEach(b => {
                html += `
                    <div class="brawler-item">
                        ${b.image ? `<img src="${b.image}">` : '⚡'}
                        ${b.name}
                        <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;margin-left:auto;">${b.rarity || 'Обычный'}</span>
                    </div>
                `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="brawlers"]').classList.add('active');
    }

    function renderShop(cloudHtml) {
        let html = cloudHtml;
        if (!shopItems.length) {
            html += `<div class="empty-state"><span>🛒</span>Магазин пуст</div>`;
        } else {
            html += `<div class="shop-grid">`;
            shopItems.forEach(item => {
                html += `
                    <div class="shop-item">
                        ${item.image ? `<img src="${item.image}">` : `<div style="width:60px;height:60px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:28px;">📦</div>`}
                        <div class="info">
                            <div class="name">${item.name}</div>
                            <div class="desc">${item.desc || ''}</div>
                            <div class="reward">🎁 ${item.reward || 'Награда'}</div>
                        </div>
                        <button class="buy-btn" onclick="buyItem('${item.name}')">Купить</button>
                    </div>
                `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="shop"]').classList.add('active');
    }

    window.buyItem = function(name) {
        alert(`✅ Вы купили: ${name}! (симуляция покупки)`);
    };

    function renderBattle(cloudHtml) {
        let html = cloudHtml + `<div class="brawl-select">`;
        if (battleState === 'select') {
            html += `<h3 style="color:#f5c842;margin-bottom:8px;">Выбери бойца</h3><div class="brawler-grid">`;
            if (!brawlers.length) {
                html += `<div style="color:#888;padding:20px;">Нет бойцов</div>`;
            } else {
                brawlers.forEach(b => {
                    const sel = (selectedBrawler === b.name) ? 'selected' : '';
                    html += `<div class="brawler-card ${sel}" onclick="selectBrawler('${b.name}')">${b.name}</div>`;
                });
            }
            html += `</div>`;
            if (selectedBrawler) html += `<button class="back-btn" onclick="startSearch()">🔍 ИГРАТЬ</button>`;
        } else if (battleState === 'searching') {
            html += `
                <div class="search-status">
                    <div class="spinner"></div>
                    <h3 style="color:#f5c842;">Поиск...</h3>
                    <button class="cancel-btn" onclick="cancelSearch()">❌ Отмена</button>
                </div>
            `;
        } else if (battleState === 'result') {
            html += `
                <div class="result-box">
                    <div style="font-size:48px;">👤</div>
                    <div class="player-name">${opponent}</div>
                    <div class="vs">⚔️ VS ⚔️</div>
                    <div style="font-size:20px;color:#eee;">${selectedBrawler}</div>
                    <button class="back-btn" onclick="resetBattle()">⬅️ Назад</button>
                </div>
            `;
        }
        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="battle"]').classList.add('active');
    }

    function renderAdmin(cloudHtml) {
        let html = cloudHtml + `
            <div class="admin-tabs">
                <button class="${adminSubTab === 'shop' ? 'active-tab' : ''}" data-sub="shop">🛒 Магазин</button>
                <button class="${adminSubTab === 'brawlers' ? 'active-tab' : ''}" data-sub="brawlers">🦸 Бойцы</button>
                <button class="${adminSubTab === 'settings' ? 'active-tab' : ''}" data-sub="settings">⚙️ Настройки</button>
            </div>
            <div class="admin-panel">
        `;

        if (adminSubTab === 'shop') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:12px;">➕ Добавить товар</h3>
                    <input type="text" id="shopName" placeholder="Название товара">
                    <textarea id="shopDesc" placeholder="Описание товара"></textarea>
                    <label class="file-label">
                        📷 Загрузить картинку
                        <input type="file" id="shopImage" accept="image/*">
                    </label>
                    <input type="text" id="shopReward" placeholder="Что выдаёт (скин, монеты, ящик, боец)">
                    <button class="submit-btn" onclick="addShopItem()">➕ Добавить</button>
                </div>
                <div class="list-admin">
                    ${shopItems.map((item, idx) => `
                        <div class="shop-item-admin">
                            ${item.image ? `<img src="${item.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`}
                            <div class="info">
                                <div class="name">${item.name}</div>
                                <div class="desc">${item.desc || ''}</div>
                                <div class="reward">🎁 ${item.reward || 'Награда'}</div>
                            </div>
                            <button class="del-btn" onclick="deleteShopItem(${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (adminSubTab === 'brawlers') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:12px;">➕ Добавить бойца</h3>
                    <input type="text" id="bName" placeholder="Имя бойца">
                    <textarea id="bDesc" placeholder="Описание"></textarea>
                    <select id="bRarity">
                        <option>Обычный</option>
                        <option selected>Редкий</option>
                        <option>Эпический</option>
                        <option>Мифический</option>
                        <option>Легендарный</option>
                    </select>
                    <label class="file-label">
                        📷 Загрузить фото
                        <input type="file" id="bImage" accept="image/*">
                    </label>
                    <div class="form-row" style="display:flex;gap:10px;">
                        <input type="number" id="bDamage" placeholder="Урон" value="100" style="flex:1;">
                        <input type="number" id="bHp" placeholder="HP" value="400" style="flex:1;">
                    </div>
                    <div class="form-row" style="display:flex;gap:10px;">
                        <input type="number" id="bMinPower" placeholder="Мин. сила" value="1" style="flex:1;">
                        <input type="number" id="bMaxPower" placeholder="Макс. сила" value="10" style="flex:1;">
                    </div>
                    <button class="submit-btn" onclick="addBrawlerFull()">➕ Добавить</button>
                </div>
                <div class="list-admin">
                    ${brawlers.map((b, idx) => `
                        <div class="shop-item-admin">
                            ${b.image ? `<img src="${b.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">⚡</div>`}
                            <div class="info">
                                <div class="name">${b.name} <span class="reward" style="font-size:11px;">${b.rarity || 'Обычный'}</span></div>
                                <div class="desc">${b.desc || 'Нет описания'}</div>
                                <div class="stats" style="display:flex;gap:8px;font-size:12px;color:#aaaacc;">
                                    <span>⚔️ ${b.damage || 0}</span>
                                    <span>❤️ ${b.hp || 0}</span>
                                    <span>📊 ${b.minPower || 0}→${b.maxPower || 0}</span>
                                </div>
                            </div>
                            <button class="del-btn" onclick="deleteBrawler(${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (adminSubTab === 'settings') {
            html += `
                <div class="settings-panel">
                    <div style="color:#aaa;padding:12px 0;text-align:center;">Управление сервером</div>
                    ${serverRunning 
                        ? `<button class="stop-btn" onclick="stopServer()">⛔ ОСТАНОВИТЬ СЕРВЕР</button>`
                        : `<button class="start-btn" onclick="startServer()">🚀 ЗАПУСТИТЬ СЕРВЕР</button>`
                    }
                </div>
            `;
        }

        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="admin"]').classList.add('active');

        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                adminSubTab = this.dataset.sub;
                renderAdmin(cloudHtml);
            });
        });
    }

    // ============================================================
    //  ФУНКЦИИ
    // ============================================================
    window.selectBrawler = function(name) { selectedBrawler = name; render(); };
    window.startSearch = function() {
        if (!selectedBrawler) return;
        battleState = 'searching';
        searchCancelled = false;
        render();
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!searchCancelled && battleState === 'searching') {
                opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                battleState = 'result';
                render();
            }
        }, 5000);
        if (Math.random() < 0.3) {
            setTimeout(() => {
                if (!searchCancelled && battleState === 'searching') {
                    clearTimeout(searchTimer);
                    opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                    battleState = 'result';
                    render();
                }
            }, 1000 + Math.random() * 2500);
        }
    };
    window.cancelSearch = function() { searchCancelled = true; clearTimeout(searchTimer); battleState = 'select'; render(); };
    window.resetBattle = function() { clearTimeout(searchTimer); battleState = 'select'; selectedBrawler = null; opponent = null; render(); };

    // ===== АДМИНКА =====
    window.addShopItem = function() {
        const name = document.getElementById('shopName').value.trim();
        const desc = document.getElementById('shopDesc').value.trim();
        const reward = document.getElementById('shopReward').value.trim();
        const fileInput = document.getElementById('shopImage');

        if (!name) return alert('Введите название товара!');
        if (!reward) return alert('Укажите, что выдаёт товар!');

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                shopItems.push({ name, desc, image: e.target.result, reward });
                autoSync();
                render();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            shopItems.push({ name, desc, image: '', reward });
            autoSync();
            render();
        }
    };

    window.deleteShopItem = function(idx) {
        shopItems.splice(idx, 1);
        autoSync();
        render();
    };

    window.addBrawlerFull = function() {
        const name = document.getElementById('bName').value.trim();
        if (!name) return alert('Введите имя!');
        const desc = document.getElementById('bDesc').value.trim();
        const rarity = document.getElementById('bRarity').value;
        const damage = parseInt(document.getElementById('bDamage').value) || 0;
        const hp = parseInt(document.getElementById('bHp').value) || 0;
        const minPower = parseInt(document.getElementById('bMinPower').value) || 0;
        const maxPower = parseInt(document.getElementById('bMaxPower').value) || 0;
        const fileInput = document.getElementById('bImage');

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                brawlers.push({ name, desc, rarity, image: e.target.result, damage, hp, minPower, maxPower });
                autoSync();
                render();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            brawlers.push({ name, desc, rarity, image: '', damage, hp, minPower, maxPower });
            autoSync();
            render();
        }
    };

    window.deleteBrawler = function(idx) {
        brawlers.splice(idx, 1);
        autoSync();
        render();
    };

    window.startServer = function() { 
        serverRunning = true;
        autoSync();
        render(); 
    };
    
    window.stopServer = function() { 
        serverRunning = false;
        autoSync();
        render(); 
    };

    // ============================================================
    //  МЕНЮ
    // ============================================================
    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if (tab === 'admin' && !isAdmin) {
                document.getElementById('passwordOverlay').style.display = 'flex';
                return;
            }
            if (currentMainTab !== 'battle' && battleState !== 'select') {
                clearTimeout(searchTimer);
                battleState = 'select';
                selectedBrawler = null;
                opponent = null;
            }
            currentMainTab = tab;
            render();
        });
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    loadFromFirebase();
    document.getElementById('passwordOverlay').style.display = 'none';
    render();
</script>
</body>
</html>
