<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars — P2P синхронизация</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        /* ===== БАЗОВЫЙ СТИЛЬ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: #14142e;
            padding: 20px 16px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:500px) {
            .app {
                border-radius: 40px;
                height: 95vh;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 18px 14px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        /* ===== ПАНЕЛЬ PEERJS ===== */
        .peer-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #f5c84244;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .peer-panel .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .peer-panel input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #1a1a3a;
            color: #eee;
            font-size: 14px;
            outline: none;
            min-width: 100px;
        }
        .peer-panel input:focus {
            border-color: #f5c842;
        }
        .peer-panel button {
            background: #f5c842;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 12px;
            transition: 0.15s;
        }
        .peer-panel button:hover {
            transform: scale(1.03);
        }
        .peer-panel .status {
            color: #aaaacc;
            font-size: 13px;
            text-align: center;
        }
        .peer-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .peer-panel .status .disconnected {
            color: #d43f3f;
            font-weight: 700;
        }
        .peer-panel .peer-id {
            color: #f5c842;
            font-weight: 700;
            background: #f5c84222;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 12px;
        }
        /* ===== МЕНЮ ===== */
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 8px 6px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 12px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
        }
        .menu button:hover {
            color: #fff;
        }
        /* ===== ОСТАЛЬНЫЕ СТИЛИ (БОЙ, АДМИНКА И Т.Д.) ===== */
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
        }
        .admin-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
        }
        .admin-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 0;
            border-radius: 40px;
            transition: 0.2s;
            cursor: pointer;
        }
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
        }
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .brawler-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f0f2a;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
        }
        .brawler-form input,
        .brawler-form textarea,
        .brawler-form select {
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: 0.15s;
        }
        .brawler-form input:focus,
        .brawler-form textarea:focus,
        .brawler-form select:focus {
            border-color: #f5c842;
        }
        .brawler-form textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 60px;
        }
        .brawler-form .file-label {
            background: #1a1a3a;
            border: 1px dashed #f5c84288;
            border-radius: 40px;
            padding: 10px 16px;
            color: #aaaacc;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
        }
        .brawler-form .file-label:hover {
            border-color: #f5c842;
            background: #f5c84211;
        }
        .brawler-form .file-label input {
            display: none;
        }
        .brawler-form .form-row {
            display: flex;
            gap: 10px;
        }
        .brawler-form .form-row input {
            flex: 1;
        }
        .brawler-form .submit-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 16px;
            transition: 0.15s;
        }
        .brawler-form .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #f5c84255;
        }
        .brawler-card-full {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0;
                transform: translateY(-8px); }
            to { opacity: 1;
                transform: translateY(0); }
        }
        .brawler-card-full img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .brawler-card-full .info {
            flex: 1;
        }
        .brawler-card-full .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .brawler-card-full .info .rarity {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            display: inline-block;
        }
        .brawler-card-full .info .desc {
            color: #8888aa;
            font-size: 13px;
            margin-top: 2px;
        }
        .brawler-card-full .stats {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #aaaacc;
            flex-wrap: wrap;
        }
        .brawler-card-full .stats span {
            background: #1a1a3a;
            padding: 2px 10px;
            border-radius: 40px;
        }
        .brawler-card-full .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        .list-admin {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
            margin-top: 4px;
        }
        .add-row {
            display: flex;
            gap: 8px;
        }
        .add-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: none;
            background: #0f0f2a;
            color: #fff;
            outline: 1px solid #f5c84255;
            font-size: 14px;
        }
        .add-row button {
            background: #f5c842;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 14px;
        }
        .item {
            display: flex;
            align-items: center;
            background: #0f0f2a;
            padding: 8px 12px 8px 16px;
            border-radius: 40px;
            border-left: 4px solid #f5c842;
            gap: 8px;
        }
        .item .name {
            flex: 1;
            color: #eee;
            font-weight: 600;
            font-size: 15px;
            background: transparent;
            border: none;
            outline: none;
            padding: 4px 0;
        }
        .item .name:focus {
            border-bottom: 2px solid #f5c842;
        }
        .item .del {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        .stop-btn {
            background: #d43f3f;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px #d43f3f66;
            transition: 0.15s;
            margin-top: 8px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .stop-btn:hover {
            transform: scale(1.02);
            background: #ff2f2f;
        }
        .stop-btn:disabled {
            background: #555;
            box-shadow: none;
            transform: none;
        }
        .maintenance {
            background: #2a1a1a;
            border: 2px solid #f5c84288;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin: auto 0;
        }
        .maintenance span {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }
        .maintenance h2 {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        .maintenance p {
            color: #aaaacc;
            margin-top: 8px;
            font-size: 15px;
        }
        .maintenance .start-btn {
            margin-top: 20px;
            background: #2ecc71;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #0b0b1a;
            cursor: pointer;
            box-shadow: 0 0 30px #2ecc7166;
            transition: 0.15s;
        }
        .maintenance .start-btn:hover {
            transform: scale(1.03);
            background: #3dff8a;
        }
        .brawl-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }
        .brawl-select .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }
        .brawl-select .brawler-card {
            background: #0f0f2a;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            color: #eee;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .brawl-select .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.03);
        }
        .brawl-select .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 20px #f5c84244;
        }
        .brawl-select .search-status {
            text-align: center;
            color: #aaaacc;
            padding: 20px 0;
        }
        .brawl-select .search-status .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .brawl-select .cancel-btn {
            background: #555;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .brawl-select .result-box {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2ecc71;
            margin: auto 0;
        }
        .brawl-select .result-box .vs {
            font-size: 28px;
            color: #f5c842;
            margin: 8px 0;
        }
        .brawl-select .result-box .player-name {
            font-size: 22px;
            font-weight: 700;
            color: #eee;
        }
        .brawl-select .result-box .found-tag {
            color: #2ecc71;
            font-size: 14px;
            background: #2ecc7122;
            padding: 2px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .brawl-select .back-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>⚡ BRAWL</h1>
        <span>v.171-11</span>
        <div class="offline-badge" id="connectionBadge">P2P</div>
    </div>

    <div id="content"></div>

    <div class="menu">
        <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
        <button data-tab="shop">🛍️ Магазин</button>
        <button data-tab="battle">⚡ Бой</button>
        <button data-tab="admin">⚙️ Админка</button>
    </div>
</div>
<script>
    // ============================================================
    //  PEERJS — P2P СИНХРОНИЗАЦИЯ
    // ============================================================
    let peer = null;
    let connections = [];
    let myPeerId = '';
    let isHost = false;

    // Данные
    let brawlers = [];
    let shopItems = [];
    let serverRunning = true;
    let currentMainTab = 'brawlers';
    let adminSubTab = 'brawlers';
    let battleState = 'select';
    let selectedBrawler = null;
    let opponent = null;
    let searchTimer = null;
    let searchCancelled = false;
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар'];

    // ============================================================
    //  LOCALSTORAGE
    // ============================================================
    function loadLocalData() {
        try {
            const raw = localStorage.getItem('brawlData_peer');
            if (raw) {
                const data = JSON.parse(raw);
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                return true;
            }
        } catch (e) {}
        return false;
    }

    function saveLocalData() {
        const data = { brawlers, shopItems, serverRunning };
        localStorage.setItem('brawlData_peer', JSON.stringify(data));
    }

    if (!loadLocalData()) {
        brawlers = [
            { name: 'Шелли', desc: 'Дробовик, пробивает стены', rarity: 'Редкий', image: '', damage: 120, hp: 400, minPower: 1, maxPower: 10 },
            { name: 'Кольт', desc: 'Двойные револьверы', rarity: 'Редкий', image: '', damage: 80, hp: 300, minPower: 1, maxPower: 10 }
        ];
        shopItems = ['Ящик x10', 'Скин Дракон', 'Монеты 1000'];
        serverRunning = true;
        saveLocalData();
    }

    // ============================================================
    //  PEERJS ФУНКЦИИ
    // ============================================================
    function initPeer(roomId) {
        if (peer) {
            peer.destroy();
            connections = [];
        }

        peer = new Peer(roomId || undefined, {
            debug: 0,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', function(id) {
            myPeerId = id;
            isHost = !!roomId;
            document.getElementById('connectionBadge').className = 'online-badge';
            document.getElementById('connectionBadge').textContent = '🟢 P2P';
            updatePeerUI('🟢 Подключено', true);

            if (isHost) {
                console.log('Хост создан, ID:', id);
            }
            if (!isHost && roomId) {
                connectToPeer(roomId);
            }
        });

        peer.on('connection', function(conn) {
            connections.push(conn);
            setupConnection(conn);
            sendDataToConnection(conn, {
                type: 'fullSync',
                data: { brawlers, shopItems, serverRunning }
            });
            updatePeerUI(`🟢 Подключено (${connections.length} устройств)`, true);
        });

        peer.on('error', function(err) {
            console.error('Peer error:', err);
            if (err.type === 'peer-unavailable') {
                updatePeerUI('❌ Комната не найдена', false);
                document.getElementById('connectionBadge').className = 'offline-badge';
                document.getElementById('connectionBadge').textContent = '❌ Офлайн';
            }
        });
    }

    function connectToPeer(peerId) {
        const conn = peer.connect(peerId, { reliable: true });
        connections.push(conn);
        setupConnection(conn);
    }

    function setupConnection(conn) {
        conn.on('open', function() {
            console.log('Соединение с:', conn.peer);
            updatePeerUI(`🟢 Подключено (${connections.length} устройств)`, true);
            document.getElementById('connectionBadge').className = 'online-badge';
            document.getElementById('connectionBadge').textContent = '🟢 P2P';
        });

        conn.on('data', function(data) {
            handleIncomingData(data);
        });

        conn.on('close', function() {
            connections = connections.filter(c => c !== conn);
            updatePeerUI(`🟡 Подключено (${connections.length} устройств)`, connections.length > 0);
            if (connections.length === 0) {
                document.getElementById('connectionBadge').className = 'offline-badge';
                document.getElementById('connectionBadge').textContent = '❌ Офлайн';
            }
        });
    }

    function sendDataToAll(data) {
        connections.forEach(conn => {
            try { conn.send(data); } catch (e) {}
        });
    }

    function sendDataToConnection(conn, data) {
        try { conn.send(data); } catch (e) {}
    }

    function handleIncomingData(data) {
        if (data.type === 'fullSync') {
            brawlers = data.data.brawlers || [];
            shopItems = data.data.shopItems || [];
            serverRunning = data.data.serverRunning !== undefined ? data.data.serverRunning : true;
            saveLocalData();
            render();
        } else if (data.type === 'updateBrawlers') {
            brawlers = data.data;
            saveLocalData();
            render();
        } else if (data.type === 'updateShop') {
            shopItems = data.data;
            saveLocalData();
            render();
        } else if (data.type === 'updateServer') {
            serverRunning = data.data;
            saveLocalData();
            render();
        }
    }

    function broadcastUpdate(type, data) {
        if (connections.length > 0) {
            sendDataToAll({ type, data });
        }
    }

    function updatePeerUI(text, connected) {
        const statusEl = document.getElementById('peerStatus');
        if (statusEl) {
            statusEl.textContent = text;
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    // ============================================================
    //  UI
    // ============================================================
    const content = document.getElementById('content');
    const menuBtns = document.querySelectorAll('.menu button');

    function render() {
        const tab = currentMainTab;
        const peerHtml = `
            <div class="peer-panel">
                <div class="row">
                    <input type="text" id="roomInput" placeholder="Введите ID комнаты" value="${localStorage.getItem('peerRoom') || ''}">
                    <button onclick="connectToRoom()">🔗 Подключиться</button>
                </div>
                <div class="row" style="justify-content:center;gap:12px;">
                    <button onclick="createRoom()">🏠 Создать комнату</button>
                    <span class="peer-id">${myPeerId ? '🆔 '+myPeerId : 'Не подключён'}</span>
                </div>
                <div class="status">Статус: <span id="peerStatus" class="disconnected">🔴 Не подключено</span></div>
            </div>
        `;

        if (!serverRunning) {
            let html = peerHtml + `<div class="maintenance"><span>🔧</span><h2>Технические работы</h2><p>Сервер остановлен</p>`;
            if (tab === 'admin') html += `<button class="start-btn" onclick="startServer()">🚀 ЗАПУСТИТЬ</button>`;
            html += `</div>`;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        }

        if (tab === 'battle') { renderBattle(peerHtml); return; }
        if (tab === 'brawlers') { renderBrawlers(peerHtml); return; }
        if (tab === 'shop') { renderShop(peerHtml); return; }
        renderAdmin(peerHtml);
    }
