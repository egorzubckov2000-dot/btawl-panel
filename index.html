<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* ===== БАЗА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: #14142e;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:500px) {
            .app {
                border-radius: 40px;
                height: 95vh;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-badge {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 18px 14px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 13px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .cloud-panel .status .disconnected {
            color: #d43f3f;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 8px 6px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 12px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
            position: relative;
        }
        .menu button::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #f5c842;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button.active::after {
            width: 0;
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }

        /* ===== ПУСТЫЕ СОСТОЯНИЯ ===== */
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
            animation: fadeIn 0.5s ease;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ===== БОЙЦЫ ===== */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 16px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            transition: 0.3s ease;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .brawler-item img {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            object-fit: cover;
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #555577;
            display: flex;
            gap: 16px;
            align-items: center;
            transition: 0.3s ease;
            animation: slideIn 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84211;
        }
        .shop-item img {
            width: 60px;
            height: 60px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 13px;
        }
        .shop-item .info .reward {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
        }
        .shop-item .buy-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 24px 20px;
            border: 1px solid #f5c84233;
            text-align: center;
            animation: scaleIn 0.4s ease;
        }
        .profile-card .avatar {
            font-size: 72px;
            margin-bottom: 12px;
            display: block;
        }
        .profile-card .name-input {
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            outline: none;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 16px;
            transition: 0.3s ease;
        }
        .profile-card .name-input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 16px;
        }
        .profile-card .stat-item {
            text-align: center;
        }
        .profile-card .stat-item .value {
            font-size: 28px;
            font-weight: 800;
            color: #f5c842;
        }
        .profile-card .stat-item .label {
            font-size: 12px;
            color: #8888aa;
            margin-top: 4px;
        }
        .profile-card .stat-item .value.gems {
            color: #4fc3f7;
        }
        .profile-card .stat-item .value.coins {
            color: #ffd54f;
        }
        .profile-card .save-btn {
            background: #f5c842;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            margin-top: 16px;
        }
        .profile-card .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
        }
        .admin-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 0;
            border-radius: 40px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
            transform: scale(1.03);
        }
        .admin-tabs button:hover:not(.active-tab) {
            color: #fff;
        }
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            animation: fadeIn 0.3s ease;
        }
        .form-card {
            background: #0f0f2a;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
            transition: 0.3s ease;
        }
        .form-card:hover {
            border-color: #f5c84288;
            box-shadow: 0 0 30px #f5c84211;
        }
        .form-card input,
        .form-card textarea,
        .form-card select {
            width: 100%;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            border-color: #f5c842;
            box-shadow: 0 0 20px #f5c84222;
            transform: scale(1.01);
        }
        .form-card textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 60px;
        }
        .form-card .file-label {
            display: block;
            background: #1a1a3a;
            border: 1px dashed #f5c84288;
            border-radius: 40px;
            padding: 10px 16px;
            color: #aaaacc;
            cursor: pointer;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .form-card .file-label:hover {
            border-color: #f5c842;
            background: #f5c84211;
            transform: scale(1.01);
        }
        .form-card .file-label input {
            display: none;
        }
        .form-card .submit-btn {
            width: 100%;
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }
        .form-card .submit-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .shop-item-admin {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            transition: 0.3s ease;
        }
        .shop-item-admin:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .shop-item-admin img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item-admin .info {
            flex: 1;
        }
        .shop-item-admin .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .shop-item-admin .info .desc {
            color: #8888aa;
            font-size: 13px;
        }
        .shop-item-admin .info .reward {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            display: inline-block;
        }
        .shop-item-admin .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            transition: 0.3s ease;
        }
        .shop-item-admin .del-btn:hover {
            transform: scale(1.15);
            background: #ff2f2f;
        }

        /* ===== ЛИДЕРБОРД ===== */
        .leaderboard-card {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
            transition: 0.3s ease;
            border-left: 4px solid #555577;
        }
        .leaderboard-card:hover {
            transform: scale(1.01);
        }
        .leaderboard-card .rank {
            font-size: 20px;
            font-weight: 800;
            color: #8888aa;
            min-width: 30px;
            text-align: center;
        }
        .leaderboard-card .rank.gold {
            color: #ffd700;
        }
        .leaderboard-card .rank.silver {
            color: #c0c0c0;
        }
        .leaderboard-card .rank.bronze {
            color: #cd7f32;
        }
        .leaderboard-card .info {
            flex: 1;
        }
        .leaderboard-card .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .leaderboard-card .info .stats {
            color: #8888aa;
            font-size: 12px;
        }
        .leaderboard-card .gems {
            color: #4fc3f7;
            font-weight: 700;
            font-size: 18px;
        }

        /* ===== СТАТУС СЕРВЕРА ===== */
        .maintenance {
            background: #2a1a1a;
            border: 2px solid #f5c84288;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin: auto 0;
            animation: pulse-maintenance 2s ease-in-out infinite;
        }
        @keyframes pulse-maintenance {
            0%,
            100% { border-color: #f5c84288; }
            50% { border-color: #f5c842; }
        }
        .maintenance span {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
            animation: spin-icon 4s linear infinite;
        }
        @keyframes spin-icon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .maintenance h2 {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        .maintenance p {
            color: #aaaacc;
            margin-top: 8px;
            font-size: 15px;
        }

        /* ===== КНОПКИ СЕРВЕРА ===== */
        .server-btn {
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .server-btn:hover {
            transform: scale(1.03);
        }
        .server-btn:active {
            transform: scale(0.95);
        }
        .server-btn.stop {
            background: linear-gradient(135deg, #d43f3f, #b71c1c);
            color: #fff;
            box-shadow: 0 0 30px #d43f3f66;
        }
        .server-btn.stop:hover {
            box-shadow: 0 0 50px #d43f3faa;
            background: linear-gradient(135deg, #ff2f2f, #d43f3f);
        }
        .server-btn.start {
            background: linear-gradient(135deg, #2ecc71, #1a9c54);
            color: #0b0b1a;
            box-shadow: 0 0 30px #2ecc7166;
        }
        .server-btn.start:hover {
            box-shadow: 0 0 50px #2ecc71aa;
            background: linear-gradient(135deg, #3dff8a, #2ecc71);
        }
        .server-btn .icon {
            font-size: 24px;
        }

        /* ===== БОЙ ===== */
        .brawl-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }
        .brawl-select .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }
        .brawl-select .brawler-card {
            background: #0f0f2a;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            color: #eee;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .brawl-select .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84222;
        }
        .brawl-select .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 30px #f5c84244;
            transform: scale(1.05);
        }
        .brawl-select .search-status {
            text-align: center;
            color: #aaaacc;
            padding: 20px 0;
        }
        .brawl-select .search-status .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .brawl-select .cancel-btn {
            background: #555;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
        }
        .brawl-select .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        .brawl-select .result-box {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2ecc71;
            margin: auto 0;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .brawl-select .result-box .vs {
            font-size: 28px;
            color: #f5c842;
            margin: 8px 0;
        }
        .brawl-select .result-box .player-name {
            font-size: 22px;
            font-weight: 700;
            color: #eee;
        }
        .brawl-select .result-box .found-tag {
            color: #2ecc71;
            font-size: 14px;
            background: #2ecc7122;
            padding: 2px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .brawl-select .back-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
            transition: 0.3s ease;
        }
        .brawl-select .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== ПАРОЛЬ ===== */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.4s ease;
        }
        .password-box {
            background: #1a1a3a;
            padding: 40px 30px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        .password-box h2 {
            color: #f5c842;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .password-box input {

        .password-box button {

<body>
<div class="app">
    <div class="header">
        <h1>⚡ BRAWL</h1>
        <span>v.171-11</span>
        <div class="offline-badge" id="connectionBadge">☁️</div>
    </div>

    <div id="content"></div>

    <div class="menu">
        <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
        <button data-tab="shop">🛍️ Магазин</button>
        <button data-tab="battle">⚡ Бой</button>
        <button data-tab="profile">👤 Профиль</button>
        <button data-tab="admin">⚙️ Админка</button>
    </div>
</div>

<!-- ===== ОКНО ПАРОЛЯ ===== -->
<div class="password-overlay" id="passwordOverlay">
    <div class="password-box">
        <h2>🔒 Админ-панель</h2>
        <p>Введите пароль для доступа</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль" />
        <button onclick="checkPassword()">Войти</button>
        <div class="error" id="passwordError">❌ Неверный пароль</div>
    </div>
</div>

<script>
    // ============================================================
    //  ПАРОЛЬ (ПО УМОЛЧАНИЮ: admin123)
    // ============================================================
    const ADMIN_PASSWORD = 'admin123';

    let isAdmin = false;

    function checkPassword() {
        const input = document.getElementById('passwordInput');
        const error = document.getElementById('passwordError');
        if (input.value === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('passwordOverlay').style.display = 'none';
            renderAdmin();
        } else {
            error.style.display = 'block';
            input.value = '';
            input.focus();
            setTimeout(() => { error.style.display = 'none'; }, 3000);
        }
    }

    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });

    // ============================================================
    //  ТВОЙ FIREBASE КОНФИГ
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
        authDomain: "brawl-stars-panel.firebaseapp.com",
        databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
        projectId: "brawl-stars-panel",
        storageBucket: "brawl-stars-panel.firebasestorage.app",
        messagingSenderId: "458936707927",
        appId: "1:458936707927:web:2abf0144fc135277ee6c12"
    };

    // ============================================================
    //  ИНИЦИАЛИЗАЦИЯ FIREBASE
    // ============================================================
    try {
        firebase.initializeApp(firebaseConfig);
    } catch (e) {
        console.warn('Firebase уже инициализирован:', e);
    }
    const db = firebase.database();

    // Данные
    let brawlers = [];
    let shopItems = [];
    let serverRunning = true;
    let currentMainTab = 'brawlers';
    let adminSubTab = 'shop';
    let battleState = 'select';
    let selectedBrawler = null;
    let opponent = null;
    let searchTimer = null;
    let searchCancelled = false;
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар'];
    let isSyncing = false;

    // Уникальный ID игрока
    let playerId = localStorage.getItem('brawl_playerId');
    if (!playerId) {
        playerId = 'player_' + Math.random().toString(36).substring(2, 10);
        localStorage.setItem('brawl_playerId', playerId);
    }

    // Данные профиля
    let profile = {
        name: 'Игрок',
        gems: 0,
        coins: 0,
        brawlers: []
    };

    // ============================================================
    //  LOCALSTORAGE
    // ============================================================
    function loadLocalData() {
        try {
            const raw = localStorage.getItem('brawlData_firebase');
            if (raw) {
                const data = JSON.parse(raw);
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                profile = data.profile || { name: 'Игрок', gems: 0, coins: 0, brawlers: [] };
                return true;
            }
        } catch (e) {}
        return false;
    }

    function saveLocalData() {
        const data = { brawlers, shopItems, serverRunning, profile };
        localStorage.setItem('brawlData_firebase', JSON.stringify(data));
    }

    if (!loadLocalData()) {
        brawlers = [
            { name: 'Шелли', desc: 'Дробовик', rarity: 'Редкий', image: '', damage: 120, hp: 400, minPower: 1, maxPower: 10 },
            { name: 'Кольт', desc: 'Двойные револьверы', rarity: 'Редкий', image: '', damage: 80, hp: 300, minPower: 1, maxPower: 10 }
        ];
        shopItems = [
            { name: 'Ящик x10', desc: '10 ящиков с наградами', image: '', reward: 'Ящики', category: 'resources', resourceType: 'gems', amount: 80, free: false },
            { name: 'Скин Дракон', desc: 'Эксклюзивный скин для Кольта', image: '', reward: 'Скин', category: 'brawler', brawlerName: 'Кольт', cost: 149, free: false }
        ];
        serverRunning = true;
        profile = { name: 'Игрок', gems: 0, coins: 0, brawlers: [] };
        saveLocalData();
    }

    // ============================================================
    //  FIREBASE СИНХРОНИЗАЦИЯ
    // ============================================================
    function syncToFirebase() {
        if (isSyncing) return;
        isSyncing = true;
        const data = { brawlers, shopItems, serverRunning, profile };
        db.ref('data').set(data)
            .then(() => {
                db.ref('players/' + playerId).set(profile);
                console.log('✅ Данные отправлены в Firebase');
                updateCloudUI(true);
                isSyncing = false;
            })
            .catch(error => {
                console.error('❌ Ошибка отправки:', error);
                updateCloudUI(false);
                isSyncing = false;
            });
    }

    function loadFromFirebase() {
        db.ref('data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const localData = JSON.parse(localStorage.getItem('brawlData_firebase') || '{}');
                if (JSON.stringify(localData) !== JSON.stringify(data)) {
                    brawlers = data.brawlers || [];
                    shopItems = data.shopItems || [];
                    serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                    db.ref('players/' + playerId).once('value').then((snap) => {
                        const playerData = snap.val();
                        if (playerData) {
                            profile = playerData;
                        }
                        saveLocalData();
                        render();
                        console.log('📥 Данные загружены из Firebase');
                    });
                }
                updateCloudUI(true);
            }
        }, (error) => {
            console.error('❌ Ошибка загрузки из Firebase:', error);
            updateCloudUI(false);
        });
    }

    // ============================================================
    //  ПОКУПКА (С УЧЁТОМ БЕСПЛАТНОСТИ)
    // ============================================================
    window.buyItem = function(name) {
        const item = shopItems.find(i => i.name === name);
        if (!item) return alert('Товар не найден!');

        // Проверяем, бесплатный ли товар
        const isFree = item.free === true;

        if (item.category === 'brawler') {
            if (profile.brawlers && profile.brawlers.includes(item.brawlerName)) {
                return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
            }
            // Если НЕ бесплатно — проверяем гемы
            if (!isFree && profile.gems < item.cost) {
                return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
            }
            if (!isFree) {
                profile.gems -= item.cost;
            }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push(item.brawlerName);
            alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            autoSync();
            render();
        } else if (item.category === 'resources') {
            if (item.resourceType === 'gems') {
                profile.gems += item.amount;
                alert(`✅ Вы получили ${item.amount} 💎 Гемов${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            } else if (item.resourceType === 'coins') {
                profile.coins += item.amount;
                alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            }
            autoSync();
            render();
        } else {
            alert(`✅ Вы купили: ${name}!`);
        }
    };

    // ============================================================
    //  UI
    // ============================================================
    const content = document.getElementById('content');
    const menuBtns = document.querySelectorAll('.menu button');

    function render() {
        const tab = currentMainTab;
        const cloudHtml = `
            <div class="cloud-panel">
                <div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div>
            </div>
        `;

        if (tab === 'admin' && isAdmin) {
            renderAdmin(cloudHtml);
            return;
        }

        if (tab === 'admin' && !isAdmin) {
            document.getElementById('passwordOverlay').style.display = 'flex';
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="brawlers"]').classList.add('active');
            currentMainTab = 'brawlers';
            return;
        }

        if (!serverRunning) {
            let html = cloudHtml + `
                <div class="maintenance">
                    <span>🔧</span>
                    <h2>Технические работы ведутся</h2>
                    <p>Сервер временно недоступен</p>
                </div>
            `;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        }

        if (tab === 'battle') { renderBattle(cloudHtml); return; }
        if (tab === 'brawlers') { renderBrawlers(cloudHtml); return; }
        if (tab === 'shop') { renderShop(cloudHtml); return; }
        if (tab === 'profile') { renderProfile(cloudHtml); return; }
    }

    function renderBrawlers(cloudHtml) {
        let html = cloudHtml;
        if (!brawlers.length) {
            html += `<div class="empty-state"><span>🦸</span>Нет бойцов</div>`;
        } else {
            html += `<div class="brawler-list">`;
            brawlers.forEach(b => {
                const owned = profile.brawlers && profile.brawlers.includes(b.name) ? '✅' : '🔒';
                html += `
                    <div class="brawler-item">
                        ${b.image ? `<img src="${b.image}">` : '⚡'}
                        ${b.name}
                        <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;margin-left:auto;">${b.rarity || 'Обычный'} ${owned}</span>
                    </div>
                `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="brawlers"]').classList.add('active');
    }

    function renderShop(cloudHtml) {
        let html = cloudHtml;
        if (!shopItems.length) {
            html += `<div class="empty-state"><span>🛒</span>Магазин пуст</div>`;
        } else {
            html += `<div class="shop-grid">`;
            shopItems.forEach(item => {
                const isOwned = item.category === 'brawler' && profile.brawlers && profile.brawlers.includes(item.brawlerName);
                const isFree = item.free === true;
                const priceLabel = isFree ? '🎁 БЕСПЛАТНО' : (item.category === 'brawler' ? `💎 ${item.cost}` : '');
                html += `
                    <div class="shop-item">
                        ${item.image ? `<img src="${item.image}">` : `<div style="width:60px;height:60px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:28px;">📦</div>`}
                        <div class="info">
                            <div class="name">${item.name} ${isOwned ? '✅' : ''} ${isFree ? '🎁' : ''}</div>
                            <div class="desc">${item.desc || ''}</div>
                            <div class="reward">🎁 ${item.reward || 'Награда'}</div>
                            ${item.category === 'brawler' ? `<div style="font-size:11px;color:#4fc3f7;">👤 ${item.brawlerName} • ${priceLabel}</div>` : ''}
                            ${item.category === 'resources' ? `<div style="font-size:11px;color:#ffd54f;">📦 ${item.resourceType === 'gems' ? '💎' : '🪙'} ${item.amount} ${isFree ? '🎁 БЕСПЛАТНО' : ''}</div>` : ''}
                        </div>
                        <button class="buy-btn" onclick="buyItem('${item.name}')" ${isOwned ? 'disabled style="opacity:0.5;"' : ''}>
                            ${isOwned ? '✅' : (isFree ? '🎁 Получить' : 'Купить')}
                        </button>
                    </div>
                `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="shop"]').classList.add('active');
    }

    // ===== ПРОФИЛЬ =====
    function renderProfile(cloudHtml) {
        let html = cloudHtml + `
            <div class="profile-card">
                <span class="avatar">👤</span>
                <input class="name-input" id="profileName" value="${profile.name}" placeholder="Ваше имя" />
                <div class="stats">
                    <div class="stat-item">
                        <div class="value gems">${profile.gems}</div>
                        <div class="label">💎 Гемы</div>
                    </div>
                    <div class="stat-item">
                        <div class="value coins">${profile.coins}</div>
                        <div class="label">🪙 Монеты</div>
                    </div>
                </div>
                <button class="save-btn" onclick="saveProfile()">💾 Сохранить профиль</button>
            </div>
        `;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="profile"]').classList.add('active');
    }

    window.saveProfile = function() {
        const nameInput = document.getElementById('profileName');
        if (nameInput) {
            profile.name = nameInput.value.trim() || 'Игрок';
        }
        autoSync();
        renderProfile();
        alert('✅ Профиль сохранён!');
    };

    function renderBattle(cloudHtml) {
        let html = cloudHtml + `<div class="brawl-select">`;
        if (battleState === 'select') {
            html += `<h3 style="color:#f5c842;margin-bottom:8px;">Выбери бойца</h3><div class="brawler-grid">`;
            const ownedBrawlers = (profile.brawlers && profile.brawlers.length) ? 
                brawlers.filter(b => profile.brawlers.includes(b.name)) : 
                [];
            if (!ownedBrawlers.length) {
                html += `<div style="color:#888;padding:20px;">Купите бойца в магазине!</div>`;
            } else {
                ownedBrawlers.forEach(b => {
                    const sel = (selectedBrawler === b.name) ? 'selected' : '';
                    html += `<div class="brawler-card ${sel}" onclick="selectBrawler('${b.name}')">${b.name}</div>`;
                });
            }
            html += `</div>`;
            if (selectedBrawler) html += `<button class="back-btn" onclick="startSearch()">🔍 ИГРАТЬ</button>`;
        } else if (battleState === 'searching') {
            html += `
                <div class="search-status">
                    <div class="spinner"></div>
                    <h3 style="color:#f5c842;">Поиск...</h3>
                    <button class="cancel-btn" onclick="cancelSearch()">❌ Отмена</button>
                </div>
            `;
        } else if (battleState === 'result') {
            html += `
                <div class="result-box">
                    <div style="font-size:48px;">👤</div>
                    <div class="player-name">${opponent}</div>
                    <div class="vs">⚔️ VS ⚔️</div>
                    <div style="font-size:20px;color:#eee;">${selectedBrawler}</div>
                    <button class="back-btn" onclick="resetBattle()">⬅️ Назад</button>
                </div>
            `;
        }
        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="battle"]').classList.add('active');
    }

    // ===== АДМИНКА =====
    function renderAdmin(cloudHtml) {
        let html = cloudHtml + `
            <div class="admin-tabs">
                <button class="${adminSubTab === 'shop' ? 'active-tab' : ''}" data-sub="shop">🛒 Магазин</button>
                <button class="${adminSubTab === 'brawlers' ? 'active-tab' : ''}" data-sub="brawlers">🦸 Бойцы</button>
                <button class="${adminSubTab === 'leaderboard' ? 'active-tab' : ''}" data-sub="leaderboard">🏆 Лидерборд</button>
                <button class="${adminSubTab === 'settings' ? 'active-tab' : ''}" data-sub="settings">⚙️ Настройки</button>
            </div>
            <div class="admin-panel">
        `;

        if (adminSubTab === 'shop') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:12px;">➕ Добавить товар</h3>
                    <input type="text" id="shopName" placeholder="Название товара">
                    <textarea id="shopDesc" placeholder="Описание товара"></textarea>
                    <label class="file-label">
                        📷 Загрузить картинку
                        <input type="file" id="shopImage" accept="image/*">
                    </label>
                    <select id="shopCategory" onchange="toggleCategoryFields()">
                        <option value="resources">📦 Ресурсы</option>
                        <option value="brawler">👤 Персонаж</option>
                    </select>
                    
                    <div class="free-toggle">
                        <input type="checkbox" id="shopFree">
                        <label for="shopFree">🎁 Бесплатно</label>
                    </div>

                    <div id="resourcesFields" class="category-fields visible">
                        <div class="hint">Выберите тип ресурса и укажите количество</div>
                        <select id="resourceType">
                            <option value="gems">💎 Гемы</option>
                            <option value="coins">🪙 Монеты</option>
                        </select>
                        <input type="number" id="resourceAmount" placeholder="Количество" value="100">
                    </div>

                    <div id="brawlerFields" class="category-fields">
                        <div class="hint">Выберите бойца и укажите стоимость в гемах</div>
                        <select id="brawlerSelect">
                            ${brawlers.map(b => `<option value="${b.name}">${b.name}</option>`).join('')}
                            ${brawlers.length === 0 ? '<option value="">Нет бойцов</option>' : ''}
                        </select>
                        <input type="number" id="brawlerCost" placeholder="Стоимость (гемы)" value="149">
                    </div>

                    <button class="submit-btn" onclick="addShopItem()">➕ Добавить</button>
                </div>
                <div class="list-admin">
                    ${shopItems.map((item, idx) => `
                        <div class="shop-item-admin">
                            ${item.image ? `<img src="${item.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`}
                            <div class="info">
                                <div class="name">${item.name} ${item.free ? '🎁' : ''}</div>
                                <div class="desc">${item.desc || ''}</div>
                                <div class="reward">${item.category === 'brawler' ? '👤 Персонаж' : '📦 Ресурсы'}</div>
                            </div>
                            <button class="del-btn" onclick="deleteShopItem(${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (adminSubTab === 'brawlers') {
            html += `
                <div class="form-card">
                    <h3 style="color:#f5c842;margin-bottom:12px;">➕ Добавить бойца</h3>
                    <input type="text" id="bName" placeholder="Имя бойца">
                    <textarea id="bDesc" placeholder="Описание"></textarea>
                    <select id="bRarity">
                        <option>Обычный</option>
                        <option selected>Редкий</option>
                        <option>Эпический</option>
                        <option>Мифический</option>
                        <option>Легендарный</option>
                    </select>
                    <label class="file-label">
                        📷 Загрузить фото
                        <input type="file" id="bImage" accept="image/*">
                    </label>
                    <div class="form-row" style="display:flex;gap:10px;">
                        <input type="number" id="bDamage" placeholder="Урон" value="100" style="flex:1;">
                        <input type="number" id="bHp" placeholder="HP" value="400" style="flex:1;">
                    </div>
                    <div class="form-row" style="display:flex;gap:10px;">
                        <input type="number" id="bMinPower" placeholder="Мин. сила" value="1" style="flex:1;">
                        <input type="number" id="bMaxPower" placeholder="Макс. сила" value="10" style="flex:1;">
                    </div>
                    <button class="submit-btn" onclick="addBrawlerFull()">➕ Добавить</button>
                </div>
                <div class="list-admin">
                    ${brawlers.map((b, idx) => `
                        <div class="shop-item-admin">
                            ${b.image ? `<img src="${b.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">⚡</div>`}
                            <div class="info">
                                <div class="name">${b.name} <span class="reward" style="font-size:11px;">${b.rarity || 'Обычный'}</span></div>
                                <div class="desc">${b.desc || 'Нет описания'}</div>
                                <div class="stats" style="display:flex;gap:8px;font-size:12px;color:#aaaacc;">
                                    <span>⚔️ ${b.damage || 0}</span>
                                    <span>❤️ ${b.hp || 0}</span>
                                    <span>📊 ${b.minPower || 0}→${b.maxPower || 0}</span>
                                </div>
                            </div>
                            <button class="del-btn" onclick="deleteBrawler(${idx})">✕</button>
                        </div>
                    `).join('')}
                </div>
            `;
        } else if (adminSubTab === 'leaderboard') {
            html += `<h3 style="color:#f5c842;margin-bottom:12px;">🏆 Лидерборд</h3>`;
            db.ref('players').once('value').then((snapshot) => {
                const players = snapshot.val();
                if (players) {
                    const list = Object.values(players);
                    list.sort((a, b) => (b.gems || 0) - (a.gems || 0));
                    let boardHtml = '';
                    list.forEach((p, idx) => {
                        const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
                        const emoji = idx === 0 ? '👑' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`;
                        boardHtml += `
                            <div class="leaderboard-card">
                                <div class="rank ${rankClass}">${emoji}</div>
                                <div class="info">
                                    <div class="name">${p.name || 'Аноним'}</div>
                                    <div class="stats">💎 ${p.gems || 0} • 🪙 ${p.coins || 0}</div>
                                </div>
                                <div class="gems">${p.gems || 0} 💎</div>
                            </div>
                        `;
                    });
                    document.getElementById('leaderboardContainer').innerHTML = boardHtml;
                } else {
                    document.getElementById('leaderboardContainer').innerHTML = `<div class="empty-state"><span>📭</span>Нет игроков</div>`;
                }
            });
            html += `<div id="leaderboardContainer"></div>`;
        } else if (adminSubTab === 'settings') {
            html += `
                <div style="padding:12px 0;text-align:center;color:#aaa;">Управление сервером</div>
                ${serverRunning 
                    ? `<button class="server-btn stop" onclick="stopServer()"><span class="icon">⛔</span> ОСТАНОВИТЬ СЕРВЕР</button>`
                    : `<button class="server-btn start" onclick="startServer()"><span class="icon">🚀</span> ЗАПУСТИТЬ СЕРВЕР</button>`
                }
            `;
        }

        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="admin"]').classList.add('active');

        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                adminSubTab = this.dataset.sub;
                renderAdmin(cloudHtml);
            });
        });

        window.toggleCategoryFields = function() {
            const category = document.getElementById('shopCategory').value;
            document.getElementById('resourcesFields').className = 'category-fields' + (category === 'resources' ? ' visible' : '');
            document.getElementById('brawlerFields').className = 'category-fields' + (category === 'brawler' ? ' visible' : '');
        };
        setTimeout(window.toggleCategoryFields, 100);
    }

    // ============================================================
    //  ФУНКЦИИ
    // ============================================================
    window.selectBrawler = function(name) { selectedBrawler = name; render(); };
    window.startSearch = function() {
        if (!selectedBrawler) return;
        battleState = 'searching';
        searchCancelled = false;
        render();
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!searchCancelled && battleState === 'searching') {
                opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                battleState = 'result';
                render();
            }
        }, 5000);
        if (Math.random() < 0.3) {
            setTimeout(() => {
                if (!searchCancelled && battleState === 'searching') {
                    clearTimeout(searchTimer);
                    opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                    battleState = 'result';
                    render();
                }
            }, 1000 + Math.random() * 2500);
        }
    };
    window.cancelSearch = function() { searchCancelled = true; clearTimeout(searchTimer); battleState = 'select'; render(); };
    window.resetBattle = function() { clearTimeout(searchTimer); battleState = 'select'; selectedBrawler = null; opponent = null; render(); };

    // ===== АДМИНКА =====
    window.addShopItem = function() {
        const name = document.getElementById('shopName').value.trim();
        const desc = document.getElementById('shopDesc').value.trim();
        const category = document.getElementById('shopCategory').value;
        const isFree = document.getElementById('shopFree').checked;
        const fileInput = document.getElementById('shopImage');

        if (!name) return alert('Введите название товара!');

        if (category === 'resources') {
            const resourceType = document.getElementById('resourceType').value;
            const amount = parseInt(document.getElementById('resourceAmount').value) || 0;
            if (amount <= 0) return alert('Введите количество ресурсов!');
            const reward = resourceType === 'gems' ? `${amount} 💎` : `${amount} 🪙`;
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    shopItems.push({ name, desc, image: e.target.result, reward, category, resourceType, amount, free: isFree });
                    autoSync();
                    render();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                shopItems.push({ name, desc, image: '', reward, category, resourceType, amount, free: isFree });
                autoSync();
                render();
            }
        } else if (category === 'brawler') {
            const brawlerName = document.getElementById('brawlerSelect').value;
            const cost = parseInt(document.getElementById('brawlerCost').value) || 0;
            if (!brawlerName) return alert('Выберите бойца!');
            if (!isFree && cost <= 0) return alert('Введите стоимость в гемах!');
            const reward = `${brawlerName} (${isFree ? 'БЕСПЛАТНО' : cost + ' 💎'})`;
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    shopItems.push({ name, desc, image: e.target.result, reward, category, brawlerName, cost, free: isFree });
                    autoSync();
                    render();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                shopItems.push({ name, desc, image: '', reward, category, brawlerName, cost, free: isFree });
                autoSync();
                render();
            }
        }
    };

    window.deleteShopItem = function(idx) {
        shopItems.splice(idx, 1);
        autoSync();
        render();
    };

    window.addBrawlerFull = function() {
        const name = document.getElementById('bName').value.trim();
        if (!name) return alert('Введите имя!');
        const desc = document.getElementById('bDesc').value.trim();
        const rarity = document.getElementById('bRarity').value;
        const damage = parseInt(document.getElementById('bDamage').value) || 0;
        const hp = parseInt(document.getElementById('bHp').value) || 0;
        const minPower = parseInt(document.getElementById('bMinPower').value) || 0;
        const maxPower = parseInt(document.getElementById('bMaxPower').value) || 0;
        const fileInput = document.getElementById('bImage');

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                brawlers.push({ name, desc, rarity, image: e.target.result, damage, hp, minPower, maxPower });
                autoSync();
                render();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            brawlers.push({ name, desc, rarity, image: '', damage, hp, minPower, maxPower });
            autoSync();
            render();
        }
    };

    window.deleteBrawler = function(idx) {
        brawlers.splice(idx, 1);
        autoSync();
        render();
    };

    window.startServer = function() { 
        serverRunning = true;
        autoSync();
        render(); 
    };
    
    window.stopServer = function() { 
        serverRunning = false;
        autoSync();
        render(); 
    };

    function autoSync() {
        saveLocalData();
        syncToFirebase();
    }

    // ============================================================
    //  МЕНЮ
    // ============================================================
    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if (tab === 'admin' && !isAdmin) {
                document.getElementById('passwordOverlay').style.display = 'flex';
                return;
            }
            if (currentMainTab !== 'battle' && battleState !== 'select') {
                clearTimeout(searchTimer);
                battleState = 'select';
                selectedBrawler = null;
                opponent = null;
            }
            currentMainTab = tab;
            render();
        });
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    loadFromFirebase();
    document.getElementById('passwordOverlay').style.display = 'none';
    render();
</script>
</body>
</html>
