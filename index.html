<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #14142e;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:600px) {
            .app {
                max-width: 500px;
                height: 95vh;
                border-radius: 40px;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
                padding: 20px 18px;
            }
        }
        @media (max-width:430px) {
            .app {
                padding: 12px 10px;
                height: 100vh;
                max-height: 860px;
            }
            .header h1 {
                font-size: 22px;
            }
            .menu button {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-badge {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 16px 12px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @media (max-width:430px) {
            #content {
                padding: 12px 10px;
                border-radius: 18px;
            }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 12px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 6px 4px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 10px;
            gap: 2px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ===== ВХОД ===== */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        .auth-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .auth-box h2 {
            color: #f5c842;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .auth-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 15px;
            outline: none;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .auth-box input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .auth-box .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .auth-box .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .auth-box .btn-group .login-btn {
            background: #f5c842;
            color: #0b0b1a;
        }
        .auth-box .btn-group .login-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .auth-box .btn-group .register-btn {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .auth-box .btn-group .register-btn:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }
        .auth-box .error {
            color: #d43f3f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            animation: shake 0.4s ease;
        }
        .auth-box .success {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ===== БАН ===== */
        .banned-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: fadeIn 0.5s ease;
        }
        .banned-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #d43f3f;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        .banned-box .ban-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
        }
        .banned-box h2 {
            color: #d43f3f;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .banned-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .banned-box .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .banned-box .btn-group button {
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .banned-box .btn-group .new-account {
            background: #f5c842;
            color: #0b0b1a;
        }
        .banned-box .btn-group .new-account:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .banned-box .btn-group .appeal {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .banned-box .btn-group .appeal:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }

        /* ===== БОЙ ===== */
        .pvp-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }
        .pvp-search {
            text-align: center;
            padding: 30px 20px;
            background: #0f0f2a;
            border-radius: 24px;
            border: 2px solid #f5c84244;
            animation: pulse-search 1.5s ease-in-out infinite;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @keyframes pulse-search {
            0%,
            100% { border-color: #f5c84244; }
            50% { border-color: #f5c842; }
        }
        .pvp-search .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        .pvp-search h3 {
            color: #f5c842;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .pvp-search p {
            color: #8888aa;
            font-size: 14px;
        }
        .pvp-search .cancel-btn {
            margin-top: 16px;
            background: #555;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .pvp-search .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-height: 100px;
        }
        .battle-player {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            flex: 1;
            border: 2px solid #555577;
            transition: 0.3s ease;
        }
        .battle-player.active {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84244;
        }
        .battle-player .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .battle-player .hp {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 700;
        }
        .battle-player .brawler-icon {
            font-size: 48px;
            display: block;
            margin: 4px 0;
        }
        .battle-player .power {
            color: #f5c842;
            font-size: 12px;
            font-weight: 700;
        }
        .battle-vs {
            color: #f5c842;
            font-size: 24px;
            font-weight: 800;
        }
        .battle-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .battle-actions button {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            flex: 1;
            max-width: 150px;
        }
        .battle-actions .attack {
            background: #d43f3f;
            color: #fff;
        }
        .battle-actions .attack:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #d43f3f66;
        }
        .battle-actions .defend {
            background: #4fc3f7;
            color: #0b0b1a;
        }
        .battle-actions .defend:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #4fc3f766;
        }
        .battle-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .battle-log {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 10px 14px;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .battle-log .log-entry {
            color: #ccccee;
            font-size: 13px;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
        }
        .battle-status {
            text-align: center;
            color: #aaaacc;
            font-size: 14px;
            padding: 6px;
            background: #0f0f2a;
            border-radius: 12px;
        }
        .battle-status .waiting {
            color: #f5c842;
        }
        .battle-status .fighting {
            color: #ff6b6b;
            animation: pulse-fight 1s ease-in-out infinite;
        }
        @keyframes pulse-fight {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .battle-result {
            text-align: center;
            padding: 20px;
            background: #0f0f2a;
            border-radius: 20px;
            border: 2px solid #f5c842;
            animation: scaleIn 0.4s ease;
        }
        .battle-result .winner {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
        }
        .battle-result .trophies {
            font-size: 18px;
            color: #2ecc71;
            margin-top: 4px;
        }
        .battle-result .back-btn {
            background: #f5c842;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .battle-result .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== БОЙЦЫ ===== */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 14px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .brawler-item img {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            animation: scaleIn 0.3s ease;
            margin-top: 8px;
            text-align: center;
        }
        .brawler-detail .avatar {
            font-size: 80px;
            display: block;
            margin-bottom: 4px;
        }
        .brawler-detail .avatar img {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail .name {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
        }
        .brawler-detail .rarity {
            font-size: 14px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 18px;
            border-radius: 40px;
            display: inline-block;
            margin: 4px 0 12px;
        }
        .brawler-detail .desc {
            color: #ccccee;
            font-size: 15px;
            margin-bottom: 16px;
        }
        .brawler-detail .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .brawler-detail .stat-box {
            background: #1a1a3a;
            border-radius: 16px;
            padding: 10px 8px;
            border: 1px solid #555577;
        }
        .brawler-detail .stat-box .label {
            font-size: 11px;
            color: #8888aa;
        }
        .brawler-detail .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
        }
        .brawler-detail .stat-box .value.damage {
            color: #ff6b6b;
        }
        .brawler-detail .stat-box .value.hp {
            color: #51cf66;
        }
        .brawler-detail .stat-box .value.power {
            color: #f5c842;
        }
        .brawler-detail .status-badge {
            font-size: 14px;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 700;
        }
        .brawler-detail .status-badge.owned {
            background: #2ecc71;
            color: #0b0b1a;
        }
        .brawler-detail .status-badge.locked {
            background: #d43f3f;
            color: #fff;
        }
        .brawler-detail .power-display {
            margin-top: 8px;
            padding: 8px;
            background: #1a1a3a;
            border-radius: 16px;
            border: 1px solid #555577;
        }
        .brawler-detail .power-display .level {
            color: #f5c842;
            font-weight: 700;
        }
        .brawler-detail .upgrade-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
            font-size: 14px;
        }
        .brawler-detail .upgrade-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        .brawler-detail .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .brawler-detail .back-btn {
            background: #555577;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .brawler-detail .back-btn:hover {
            transform: scale(1.05);
            background: #777799;
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #555577;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84211;
        }
        .shop-item img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 15px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        .shop-item .info .reward {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 13px;
            flex-shrink: 0;
        }
        .shop-item .buy-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            text-align: center;
        }
        .profile-card .avatar {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .profile-card .nick {
            color: #f5c842;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .profile-card .stat-item {
            text-align: center;
        }
        .profile-card .stat-item .value {
            font-size: 24px;
            font-weight: 800;
            color: #f5c842;
        }

    // ============================================================
    //  АВТОРИЗАЦИЯ
    // ============================================================
    function register() {
        const nick = document.getElementById('authNick').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const errorEl = document.getElementById('authError');
        const successEl = document.getElementById('authSuccess');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!nick || !pass) {
            errorEl.textContent = '❌ Заполните все поля!';
            errorEl.style.display = 'block';
            return;
        }
        if (nick.length < 3) {
            errorEl.textContent = '❌ Ник должен быть минимум 3 символа!';
            errorEl.style.display = 'block';
            return;
        }
        if (pass.length < 4) {
            errorEl.textContent = '❌ Пароль должен быть минимум 4 символа!';
            errorEl.style.display = 'block';
            return;
        }

        db.ref('players').orderByChild('name').equalTo(nick).once('value').then((snap) => {
            if (snap.exists()) {
                errorEl.textContent = '❌ Этот ник уже занят!';
                errorEl.style.display = 'block';
                return;
            }

            const playerId = 'player_' + Math.random().toString(36).substring(2, 10);
            const newProfile = {
                name: nick,
                password: pass,
                gems: 50,
                coins: 100,
                brawlers: ['Шелли'],
                trophies: 0,
                banned: false,
                createdAt: Date.now()
            };

            db.ref('players/' + playerId).set(newProfile).then(() => {
                successEl.textContent = '✅ Аккаунт создан! Войдите.';
                successEl.style.display = 'block';
                document.getElementById('authNick').value = '';
                document.getElementById('authPassword').value = '';
            });
        });
    }

    function login() {
        const nick = document.getElementById('authNick').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const errorEl = document.getElementById('authError');
        const successEl = document.getElementById('authSuccess');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!nick || !pass) {
            errorEl.textContent = '❌ Заполните все поля!';
            errorEl.style.display = 'block';
            return;
        }

        db.ref('players').orderByChild('name').equalTo(nick).once('value').then((snap) => {
            if (!snap.exists()) {
                errorEl.textContent = '❌ Пользователь не найден!';
                errorEl.style.display = 'block';
                return;
            }

            const data = snap.val();
            const playerId = Object.keys(data)[0];
            const player = data[playerId];

            if (player.password !== pass) {
                errorEl.textContent = '❌ Неверный пароль!';
                errorEl.style.display = 'block';
                return;
            }

            if (player.banned) {
                errorEl.textContent = '❌ Вы забанены!';
                errorEl.style.display = 'block';
                document.getElementById('bannedOverlay').style.display = 'flex';
                return;
            }

            currentPlayerId = playerId;
            localStorage.setItem('brawl_playerId', playerId);
            profile = player;
            isLoggedIn = true;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('bannedOverlay').style.display = 'none';
            successEl.textContent = '✅ Вход выполнен!';
            successEl.style.display = 'block';

            loadGameData();
            render();
        });
    }

    function logout() {
        if (confirm('Выйти из аккаунта?')) {
            localStorage.removeItem('brawl_playerId');
            currentPlayerId = null;
            isLoggedIn = false;
            profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false, password: '' };
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('authSubtitle').textContent = 'Войдите или зарегистрируйтесь';
            render();
        }
    }

    // ============================================================
    //  НАСТРОЙКИ СЕРВЕРА
    // ============================================================
    function loadServerSettings() {
        db.ref('serverSettings').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                serverSettings = data;
                checkServerStatus();
                render();
            }
        });
    }

    function checkServerStatus() {
        if (serverSettings.isClosed) {
            serverRunning = false;
            return;
        }
        if (serverSettings.closeTime) {
            const closeDate = new Date(serverSettings.closeTime);
            const now = new Date();
            serverRunning = now < closeDate;
        } else {
            serverRunning = true;
        }
    }

    function saveServerSettings() {
        db.ref('serverSettings').set(serverSettings);
    }

    function getTimeRemaining() {
        if (!serverSettings.closeTime) return null;
        const closeDate = new Date(serverSettings.closeTime);
        const now = new Date();
        const diff = closeDate - now;
        if (diff <= 0) return null;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        return { hours, minutes, seconds };
    }

    // ============================================================
    //  ЗАГРУЗКА ДАННЫХ
    // ============================================================
    function loadGameData() {
        db.ref('data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                vouchers = data.vouchers || [];
                if (currentPlayerId) {
                    db.ref('players/' + currentPlayerId).once('value').then((snap) => {
                        const p = snap.val();
                        if (p) {
                            profile = p;
                            saveLocalProfile();
                            if (profile.banned) {
                                document.getElementById('bannedOverlay').style.display = 'flex';
                            } else {
                                document.getElementById('bannedOverlay').style.display = 'none';
                            }
                        }
                        render();
                    });
                }
                render();
            }
        });
    }

    function saveLocalProfile() {
        localStorage.setItem('brawl_profile', JSON.stringify(profile));
    }

    function loadLocalProfile() {
        try {
            const raw = localStorage.getItem('brawl_profile');
            if (raw) {
                const p = JSON.parse(raw);
                if (p && p.name) {
                    profile = p;
                    return true;
                }
            }
        } catch (e) {}
        return false;
    }

    function checkBan() {
        if (profile.banned) {
            document.getElementById('bannedOverlay').style.display = 'flex';
            return true;

        document.getElementById('bannedOverlay').style.display = 'none';
        return false;

        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('authSubtitle').textContent = 'Создайте новый аккаунт';

    // ============================================================
    //  FIREBASE СИНХРОНИЗАЦИЯ
    // ============================================================
    function syncToFirebase() {
        if (isSyncing || !currentPlayerId) return;
        isSyncing = true;
        const data = { brawlers, shopItems, vouchers };
        db.ref('data').set(data)
            .then(() => {
                if (currentPlayerId) {
                    db.ref('players/' + currentPlayerId).set(profile);
                }
                console.log('✅ Данные отправлены в Firebase');
                updateCloudUI(true);
                isSyncing = false;
            })
            .catch(error => {
                console.error('❌ Ошибка отправки:', error);
                updateCloudUI(false);
                isSyncing = false;
            });
    }

    function updateCloudUI(connected) {
        const badge = document.getElementById('connectionBadge');
        if (connected) {
            badge.className = 'online-badge';
            badge.textContent = '🟢 ☁️';
        } else {
            badge.className = 'offline-badge';
            badge.textContent = '🔴 ☁️';
        }
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    function autoSync() {
        saveLocalProfile();
        syncToFirebase();
    }

    // ============================================================
    //  БОЕВАЯ СИСТЕМА
    // ============================================================
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар', '🛡️ Щит', '🗡️ Клинок', '🏹 Стрела', '🧨 Фейерверк'];

    function getBrawlerStats(brawler, level) {
        if (!brawler) return { damage: 0, hp: 0 };
        // Если нет данных о разных уровнях — используем дефолт
        const minDamage = brawler.minDamage || brawler.damage || 100;
        const maxDamage = brawler.maxDamage || brawler.damage * 2 || 200;
        const minHp = brawler.minHp || brawler.hp || 400;
        const maxHp = brawler.maxHp || brawler.hp * 2 || 800;

        // Линейная интерполяция между min и max в зависимости от уровня
        const progress = (level - 1) / 9; // 1 → 0, 10 → 1
        const damage = Math.round(minDamage + (maxDamage - minDamage) * progress);
        const hp = Math.round(minHp + (maxHp - minHp) * progress);

        return { damage, hp };
    }

    function getUpgradeCost(level) {
        // Стоимость прокачки: уровень * 10 монет + 5 гемов
        return {
            coins: level * 10,
            gems: Math.floor(level / 2) + 1
        };
    }

    // ============================================================
    //  ПРОКАЧКА БОЙЦА
    // ============================================================
    window.upgradeBrawler = function(brawlerName) {
        if (checkBan() || !currentPlayerId) return;

        // Находим бойца в общем списке
        const brawler = brawlers.find(b => b.name === brawlerName);
        if (!brawler) return alert('Боец не найден!');

        // Находим бойца в профиле игрока
        if (!profile.brawlers) profile.brawlers = [];
        const playerBrawler = profile.brawlers.find(b => b.name === brawlerName);
        if (!playerBrawler) return alert('У вас нет этого бойца!');

        if (playerBrawler.level >= 10) return alert('⚠️ Боец уже на максимальном уровне!');

        const cost = getUpgradeCost(playerBrawler.level);
        if (profile.coins < cost.coins) {
            return alert(`❌ Не хватает монет! Нужно ${cost.coins} 🪙`);
        }
        if (profile.gems < cost.gems) {
            return alert(`❌ Не хватает гемов! Нужно ${cost.gems} 💎`);
        }

        // Списываем ресурсы
        profile.coins -= cost.coins;
        profile.gems -= cost.gems;

        // Повышаем уровень
        playerBrawler.level = (playerBrawler.level || 1) + 1;

        autoSync();
        render();
        alert(`✅ ${brawlerName} повышен до ${playerBrawler.level} уровня!`);
    };

                                <div class="power-display">
                                    <div class="level">⚡ Уровень ${level}/10</div>
                                    <div style="display:flex;gap:4px;margin-top:6px;justify-content:center;">
                                        ${[...Array(10)].map((_, i) => `
                                            <div style="width:16px;height:16px;border-radius:50%;background:${i < level ? '#f5c842' : '#555577'};"></div>
                                        `).join('')}
                                    </div>
                                    <div style="margin-top:6px;font-size:12px;color:#8888aa;">
                                        Следующий уровень: 🪙${cost.coins} + 💎${cost.gems}
                                    </div>
                                    <button class="upgrade-btn" onclick="upgradeBrawler('${b.name}')" ${level >= 10 ? 'disabled' : ''}>
                                        ${level >= 10 ? '⭐ МАКСИМАЛЬНЫЙ УРОВЕНЬ' : '⬆ ПОВЫСИТЬ УРОВЕНЬ'}
                                    </button>
                                </div>
                            ` : ''}
                            <button class="back-btn" onclick="closeBrawlerDetail()">⬅️ Назад к списку</button>
                        </div>
                    `;
                content.innerHTML = html;
                menuBtns.forEach(b => b.classList.remove('active'));
                document.querySelector('[data-tab="brawlers"]').classList.add('active');
                return;
            }
        }

        if (!brawlers.length) {
            html += `<div class="empty-state"><span>🦸</span>Нет бойцов</div>`;
        } else {
            html += `<div class="brawler-list">`;
            brawlers.forEach(b => {
                const owned = profile.brawlers && profile.brawlers.some(pb => pb.name === b.name);
                const playerBrawler = owned ? profile.brawlers.find(pb => pb.name === b.name) : null;
                const level = playerBrawler ? playerBrawler.level || 1 : 1;
                html += `
                        <div class="brawler-item" onclick="openBrawlerDetail('${b.name}')">
                            ${b.image ? `<img src="${b.image}">` : '⚡'}
                            ${b.name}
                            <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;margin-left:auto;">${owned ? '⚡'+level : '🔒'}</span>
                        </div>
                    `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="brawlers"]').classList.add('active');
    }

    window.openBrawlerDetail = function(name) { selectedBrawlerForDetail = name;
        render(); };
    window.closeBrawlerDetail = function() { selectedBrawlerForDetail = null;
        render(); };

    // ============================================================
    //  МАГАЗИН, ВАУЧЕРЫ, ЧАТ (СОКРАЩЕННО)
    // ============================================================
    window.buyItem = function(name) {
        if (checkBan() || !currentPlayerId) return;
        const item = shopItems.find(i => i.name === name);
        if (!item) return alert('Товар не найден!');
        const isFree = item.free === true;

        if (item.category === 'brawler') {
            // Проверяем, есть ли уже
            if (profile.brawlers && profile.brawlers.some(pb => pb.name === item.brawlerName)) {
                return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
            }
            if (!isFree && profile.gems < item.cost) {
                return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
            }
            if (!isFree) { profile.gems -= item.cost; }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push({ name: item.brawlerName, level: 1 });
            alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            autoSync();
            render();
        } else if (item.category === 'resources') {
            if (item.resourceType === 'gems') {
                profile.gems += item.amount;
                alert(`✅ Вы получили ${item.amount} 💎 Гемов${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            } else if (item.resourceType === 'coins') {
                profile.coins += item.amount;
                alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            }
            autoSync();
            render();
        } else {
            alert(`✅ Вы купили: ${name}!`);
        }
    };

    function renderShop(cloudHtml) {
        let html = cloudHtml;
        html += `
                <div class="form-card" style="margin-bottom:10px;">
                    <h3 style="color:#f5c842;margin-bottom:8px;">🎟️ Активировать ваучер</h3>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="voucherActivateInput" placeholder="Введите код" style="flex:1;margin-bottom:0;">
                        <button class="submit-btn" onclick="activateVoucher()" style="width:auto;padding:8px 20px;">Активировать</button>
                    </div>
                </div>
            `;

        if (!shopItems.length) {
            html += `<div class="empty-state"><span>🛒</span>Магазин пуст</div>`;
        } else {
            html += `<div class="shop-grid">`;
            shopItems.forEach(item => {
                const isOwned = item.category === 'brawler' && profile.brawlers && profile.brawlers.some(pb => pb
                    .name === item.brawlerName);
                const isFree = item.free === true;
                html += `
                        <div class="shop-item">
                            ${item.image ? `<img src="${item.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`}
                            <div class="info">
                                <div class="name">${item.name} ${isOwned ? '✅' : ''} ${isFree ? '🎁' : ''}</div>
                                <div class="desc">${item.desc || ''}</div>
                                <div class="reward">🎁 ${item.reward || 'Награда'}</div>
                                ${item.category === 'brawler' ? `<div style="font-size:11px;color:#4fc3f7;">👤 ${item.brawlerName} • ${isFree ? '🎁 БЕСПЛАТНО' : '💎 ' + item.cost}</div>` : ''}
                                ${item.category === 'resources' ? `<div style="font-size:11px;color:#ffd54f;">📦 ${item.resourceType === 'gems' ? '💎' : '🪙'} ${item.amount} ${isFree ? '🎁 БЕСПЛАТНО' : ''}</div>` : ''}
                            </div>
                            <button class="buy-btn" onclick="buyItem('${item.name}')" ${isOwned ? 'disabled style="opacity:0.5;"' : ''}>
                                ${isOwned ? '✅' : (isFree ? '🎁 Получить' : 'Купить')}
                            </button>
                        </div>
                    `;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="shop"]').classList.add('active');
    }

    function renderProfile(cloudHtml) {
        let html = cloudHtml +
            `
                <div class="profile-card">
                    <span class="avatar">👤</span>
                    <div class="nick">${profile.name || 'Игрок'}</div>
                    <div style="font-size:12px;color:#555577;margin-bottom:8px;">ID: ${currentPlayerId || '—'}</div>
                    <div class="stats">
                        <div class="stat-item"><div class="value gems">${profile.gems || 0}</div><div class="label">💎 Гемы</div></div>
                        <div class="stat-item"><div class="value coins">${profile.coins || 0}</div><div class="label">🪙 Монеты</div></div>
                        <div class="stat-item"><div class="value trophies">${profile.trophies || 0}</div><div class="label">🏆 Кубки</div></div>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            `;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="profile"]').classList.add('active');
    }

    // ============================================================
    //  АДМИНКА
    // ============================================================
    // (ПОЛНЫЙ КОД АДМИНКИ СМОТРИ НИЖЕ)
    // ============================================================

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    loadServerSettings();

    if (currentPlayerId) {
        const saved = loadLocalProfile();
        if (saved) {
            if (profile.banned) {
                document.getElementById('bannedOverlay').style.display = 'flex';
            } else {
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadGameData();
            }
        } else {
            document.getElementById('authOverlay').style.display = 'flex';
        }
    } else {
        document.getElementById('authOverlay').style.display = 'flex';
    }

    if (currentPlayerId && !profile.name) {
        db.ref('players/' + currentPlayerId).once('value').then((snap) => {
            const p = snap.val();
            if (p) {
                profile = p;
                saveLocalProfile();
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadGameData();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });
    }

    render();
</script>
</body>
    </html>
