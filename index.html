<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0b0b1a;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .app {
            max-width: 500px;
            width: 100%;
            background: #14142e;
            padding: 16px;
            border-radius: 30px;
            border: 1px solid #f5c84233;
            min-height: 650px;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 24px;
        }
        .header .badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 700;
        }
        #content {
            flex: 1;
            overflow-y: auto;
            min-height: 400px;
        }
        .menu {
            display: flex;
            gap: 4px;
            margin-top: 12px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
        }
        .menu button {
            flex: 1;
            padding: 10px 4px;
            border: none;
            border-radius: 30px;
            background: transparent;
            color: #777799;
            font-weight: 700;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84244;
        }
        .menu button:hover:not(.active) {
            color: #fff;
        }

        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
        }

        /* ===== БОЙЦЫ ===== */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 14px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .brawler-item .level-tag {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            margin-left: auto;
        }

        .brawler-detail {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            animation: scaleIn 0.3s ease;
            text-align: center;
        }
        .brawler-detail .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 4px;
        }
        .brawler-detail .name {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
        }
        .brawler-detail .rarity {
            font-size: 14px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 18px;
            border-radius: 40px;
            display: inline-block;
            margin: 4px 0 12px;
        }
        .brawler-detail .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .brawler-detail .stat-box {
            background: #1a1a3a;
            border-radius: 16px;
            padding: 10px 8px;
            border: 1px solid #555577;
        }
        .brawler-detail .stat-box .label {
            font-size: 11px;
            color: #8888aa;
        }
        .brawler-detail .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
        }
        .brawler-detail .stat-box .value.damage {
            color: #ff6b6b;
        }
        .brawler-detail .stat-box .value.hp {
            color: #51cf66;
        }
        .brawler-detail .stat-box .value.power {
            color: #f5c842;
        }
        .brawler-detail .upgrade-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
            font-size: 14px;
        }
        .brawler-detail .upgrade-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        .brawler-detail .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .brawler-detail .back-btn {
            background: #555577;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .brawler-detail .back-btn:hover {
            transform: scale(1.05);
            background: #777799;
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #555577;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 15px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        .shop-item .info .reward {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 13px;
        }
        .shop-item .buy-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }
        .shop-item .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .shop-item .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            background: #1a1a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #f5c84255;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            text-align: center;
        }
        .profile-card .avatar {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .profile-card .nick {
            color: #f5c842;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .profile-card .stat-item {
            text-align: center;
        }
        .profile-card .stat-item .value {
            font-size: 24px;
            font-weight: 800;
            color: #f5c842;
        }
        .profile-card .stat-item .label {
            font-size: 11px;
            color: #8888aa;
            margin-top: 2px;
        }
        .profile-card .stat-item .value.gems {
            color: #4fc3f7;
        }
        .profile-card .stat-item .value.coins {
            color: #ffd54f;
        }
        .profile-card .stat-item .value.trophies {
            color: #f5c842;
        }
        .profile-card .logout-btn {
            background: #d43f3f;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            margin-top: 12px;
        }
        .profile-card .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #d43f3f66;
        }

        /* ===== ЧАТ ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
            height: 100%;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            min-height: 200px;
            max-height: 350px;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #0f0f2a;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #f5c84255;
            border-radius: 10px;
        }
        .chat-message {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 8px 14px;
            border-left: 3px solid #f5c842;
            animation: slideIn 0.3s ease;
        }
        .chat-message .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        .chat-message .msg-name {
            font-weight: 700;
            color: #f5c842;
            font-size: 13px;
        }
        .chat-message .msg-time {
            font-size: 10px;
            color: #555577;
        }
        .chat-message .msg-text {
            color: #ccccee;
            font-size: 14px;
            word-wrap: break-word;
        }
        .chat-message.own {
            border-left-color: #4fc3f7;
        }
        .chat-message.own .msg-name {
            color: #4fc3f7;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input-row input {
            flex: 1;
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
        }
        .chat-input-row input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 20px #f5c84222;
        }
        .chat-input-row button {
            background: #f5c842;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 14px;
            flex-shrink: 0;
        }
        .chat-input-row button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== БОЙ ===== */
        .select-screen {
            text-align: center;
            padding: 10px 0;
        }
        .select-screen h3 {
            color: #f5c842;
            margin-bottom: 12px;
        }
        .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .brawler-card {
            padding: 10px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            cursor: pointer;
            transition: 0.3s ease;
            background: #0f0f2a;
            color: #eee;
            font-weight: 600;
            font-size: 14px;
        }
        .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.05);
        }
        .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 30px #f5c84244;
        }
        .brawler-stats {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #f5c84233;
        }
        .brawler-stats .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 14px;
            border-bottom: 1px solid #1a1a3a;
        }
        .brawler-stats .stat-row:last-child {
            border-bottom: none;
        }
        .brawler-stats .stat-label {
            color: #8888aa;
        }
        .brawler-stats .stat-value {
            color: #f5c842;
            font-weight: 700;
        }
        .brawler-stats .stat-value.damage {
            color: #ff6b6b;
        }
        .brawler-stats .stat-value.hp {
            color: #51cf66;
        }
        .brawler-stats .stat-value.level {
            color: #f5c842;
        }

        .btn-primary {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            background: #f5c842;
            color: #0b0b1a;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-danger {
            background: #d43f3f;
            color: #fff;
        }
        .btn-danger:hover {
            box-shadow: 0 0 30px #d43f3f66;
        }

        .searching {
            text-align: center;
            padding: 40px 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .battle-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-bar {
            background: #0f0f2a;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
        }
        .status-bar .my-turn {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }
        .status-bar .enemy-turn {
            color: #f5c842;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .player-card {
            flex: 1;
            background: #0f0f2a;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #555577;
            transition: 0.3s ease;
            position: relative;
            min-height: 120px;
        }
        .player-card.active {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84244;
        }
        .player-card .icon {
            font-size: 36px;
            display: block;
        }
        .player-card .name {
            font-weight: 700;
            font-size: 13px;
            margin-top: 2px;
        }
        .player-card .level-tag {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 2px;
        }
        .player-card .hp-text {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b6b;
            margin: 4px 0;
        }
        .hp-bar {
            background: #1a1a3a;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .hp-bar .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .fill.green {
            background: #51cf66;
        }
        .fill.yellow {
            background: #f5c842;
        }
        .fill.red {
            background: #d43f3f;
        }
        .player-card .shield-tag {
            display: inline-block;
            background: #4fc3f7;
            color: #0b0b1a;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: 40px;
            margin-top: 2px;
        }
        .player-card .cooldown-tag {
            color: #9b59b6;
            font-size: 12px;
            font-weight: 700;
            margin-top: 2px;
        }
        .vs {
            color: #f5c842;
            font-size: 20px;
            font-weight: 800;
            padding: 0 4px;
        }

        .damage-float {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            pointer-events: none;
            animation: floatUp 1s ease forwards;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            color: #ff6b6b;
        }
        .damage-float.heal {
            color: #51cf66;
            text-shadow: 0 0 20px rgba(81, 207, 102, 0.8);
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            30% {
                transform: translate(-50%, -80%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -130%) scale(1);
            }
        }

        .shake {
            animation: shakeAnim 0.4s ease;
        }
        @keyframes shakeAnim {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-15px) scale(0.9);
            }
            75% {
                transform: translateX(15px) scale(0.9);
            }
        }

        .battle-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .battle-actions button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
            max-width: 130px;
        }
        .battle-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .battle-actions button:active:not(:disabled) {
            transform: scale(0.95);
        }
        .btn-attack {
            background: #d43f3f;
            color: #fff;
        }
        .btn-attack:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #d43f3f66;
        }
        .btn-defend {
            background: #4fc3f7;
            color: #0b0b1a;
        }
        .btn-defend:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #4fc3f766;
        }
        .btn-ability {
            background: #9b59b6;
            color: #fff;
        }
        .btn-ability:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #9b59b666;
        }
        .btn-ability .cd {
            font-size: 11px;
            opacity: 0.8;
        }

        .battle-log {
            background: #0f0f2a;
            border-radius: 12px;
            padding: 10px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 13px;
            min-height: 50px;
        }
        .battle-log .entry {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
        }
        .battle-log .entry.damage {
            color: #ff6b6b;
        }
        .battle-log .entry.heal {
            color: #51cf66;
        }
        .battle-log .entry.crit {
            color: #ffd700;
        }
        .battle-log .entry.win {
            color: #f5c842;
            font-weight: 700;
        }
        .battle-log .entry.shield {
            color: #4fc3f7;
        }

        .result-screen {
            text-align: center;
            padding: 30px 20px;
        }
        .result-screen .big {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
        }
        .result-screen .sub {
            color: #888;
            margin-top: 8px;
            font-size: 16px;
        }

        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .auth-box {
            background: #1a1a3a;
            padding: 30px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
        }
        .auth-box h2 {
            color: #f5c842;
            font-size: 24px;
        }
        .auth-box p {
            color: #888;
            font-size: 14px;
            margin: 6px 0 14px;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #555;
            background: #0f0f2a;
            color: #eee;
            font-size: 15px;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }
        .auth-box input:focus {
            border-color: #f5c842;
        }
        .auth-box .btn-group {
            display: flex;
            gap: 10px;
        }

<body>

    <div class="app">
        <div class="header">
            <h1>⚡ BRAWL</h1>
            <span class="badge" id="statusBadge">☁️ Онлайн</span>
        </div>

        <div id="content"></div>

        <div class="menu">
            <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
            <button data-tab="shop">🛍️ Магазин</button>
            <button data-tab="battle">⚡ Бой</button>
            <button data-tab="profile">👤 Профиль</button>
            <button data-tab="chat">💬 Чат</button>
        </div>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2>⚡ BRAWL</h2>
            <p>Вход по имени</p>
            <input type="text" id="authUsername" placeholder="Имя пользователя" />
            <input type="password" id="authPassword" placeholder="Пароль" />
            <div class="error" id="authError">❌ Ошибка</div>
            <div class="success" id="authSuccess">✅ Успешно!</div>
            <div class="btn-group">
                <button class="login-btn" id="loginBtn">🔑 Войти</button>
                <button class="register-btn" id="registerBtn">📝 Регистрация</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  FIREBASE КОНФИГ
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB_IDn4_u5W1G82CrjXSMz6SAwXhkdnktc",
            authDomain: "brawl-stars-panel.firebaseapp.com",
            databaseURL: "https://brawl-stars-panel-default-rtdb.firebaseio.com",
            projectId: "brawl-stars-panel",
            storageBucket: "brawl-stars-panel.firebasestorage.app",
            messagingSenderId: "458936707927",
            appId: "1:458936707927:web:2abf0144fc135277ee6c12"
        };

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                console.log('✅ Firebase подключен!');
            }
        } catch (e) {
            console.error('Firebase error:', e);
            alert('Ошибка подключения к Firebase! Проверьте интернет.');
        }
        const db = firebase.database();

        // ============================================================
        //  ВСЕ БОЙЦЫ
        // ============================================================
        const ALL_BRAWLERS = [
            { name: 'Шелли', icon: '🔫', rarity: 'Обычный', minDmg: 100, maxDmg: 180, minHp: 400, maxHp: 700 },
            { name: 'Кольт', icon: '🔫', rarity: 'Редкий', minDmg: 110, maxDmg: 200, minHp: 350, maxHp: 600 },
            { name: 'Булл', icon: '🐂', rarity: 'Редкий', minDmg: 80, maxDmg: 150, minHp: 550, maxHp: 900 },
            { name: 'Джесси', icon: '⚡', rarity: 'Эпический', minDmg: 90, maxDmg: 170, minHp: 380, maxHp: 650 },
            { name: 'Брок', icon: '🚀', rarity: 'Эпический', minDmg: 130, maxDmg: 220, minHp: 300, maxHp: 550 },
            { name: 'Спайк', icon: '🌵', rarity: 'Мифический', minDmg: 105, maxDmg: 190, minHp: 360, maxHp: 630 },
            { name: 'Леон', icon: '🦎', rarity: 'Мифический', minDmg: 100, maxDmg: 185, minHp: 340, maxHp: 620 },
            { name: 'Динамайк', icon: '💣', rarity: 'Легендарный', minDmg: 120, maxDmg: 210, minHp: 320, maxHp: 580 }
        ];

        // ============================================================
        //  РАСЧЁТ СТАТИСТИКИ
        // ============================================================
        function getBrawlerStats(brawlerName, level) {
            const b = ALL_BRAWLERS.find(x => x.name === brawlerName);
            if (!b) return { damage: 100, hp: 400, level: level || 1 };
            const lvl = Math.min(Math.max(level || 1, 1), 10);
            const progress = (lvl - 1) / 9;
            return {
                damage: Math.round(b.minDmg + (b.maxDmg - b.minDmg) * progress),
                hp: Math.round(b.minHp + (b.maxHp - b.minHp) * progress),
                level: lvl
            };
        }

        function getUpgradeCost(level) {
            return { coins: level * 10, gems: Math.floor(level / 2) + 1 };
        }

        // ============================================================
        //  ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUserId = null;
        let isLoggedIn = false;
        let profile = {
            name: '',
            gems: 50,
            coins: 100,
            brawlers: [
                { name: 'Шелли', level: 1 },
                { name: 'Кольт', level: 1 }
            ],
            trophies: 0,
            banned: false
        };

        let currentTab = 'brawlers';
        let selectedBrawlerForDetail = null;
        let battleState = 'select';
        let selectedBrawler = null;
        let selectedBrawlerStats = null;
        let battleData = null;
        let battleId = null;
        let botTimeout = null;
        let botInterval = null;
        let searchRef = null;
        let battleListener = null;
        let moveListener = null;

        // ============================================================
        //  АВТОРИЗАЦИЯ (Firebase)
        // ============================================================
        function checkSession() {
            const savedId = localStorage.getItem('brawl_userId');
            if (savedId) {
                currentUserId = savedId;
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadProfile();
                render();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', function() {
            const name = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            const err = document.getElementById('authError');
            const ok = document.getElementById('authSuccess');
            err.style.display = 'none';
            ok.style.display = 'none';

            if (!name || !pass) { err.textContent = '❌ Заполните все поля!';
                err.style.display = 'block'; return; }

            db.ref('usernames/' + name).once('value').then(snap => {
                const uid = snap.val();
                if (!uid) { err.textContent = '❌ Пользователь не найден!';
                    err.style.display = 'block'; return; }

                db.ref('passwords/' + uid).once('value').then(ps => {
                    if (ps.val() !== pass) { err.textContent = '❌ Неверный пароль!';
                        err.style.display = 'block'; return; }

                    currentUserId = uid;
                    isLoggedIn = true;
                    localStorage.setItem('brawl_userId', uid);
                    ok.textContent = '✅ Вход выполнен!';
                    ok.style.display = 'block';
                    loadProfile();
                    setTimeout(() => { document.getElementById('authOverlay').style.display = 'none';
                        render(); }, 500);
                });
            }).catch(() => { err.textContent = '❌ Ошибка сети!';
                err.style.display = 'block'; });
        });

        document.getElementById('registerBtn').addEventListener('click', function() {
            const name = document.getElementById('authUsername').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            const err = document.getElementById('authError');
            const ok = document.getElementById('authSuccess');
            err.style.display = 'none';
            ok.style.display = 'none';

            if (!name || !pass) { err.textContent = '❌ Заполните все поля!';
                err.style.display = 'block'; return; }
            if (name.length < 3) { err.textContent = '❌ Имя минимум 3 символа!';
                err.style.display = 'block'; return; }
            if (pass.length < 4) { err.textContent = '❌ Пароль минимум 4 символа!';
                err.style.display = 'block'; return; }

            db.ref('usernames/' + name).once('value').then(snap => {
                if (snap.exists()) { err.textContent = '❌ Имя занято!';
                    err.style.display = 'block'; return; }

                const uid = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
                db.ref('usernames/' + name).set(uid);
                db.ref('passwords/' + uid).set(pass);

                const newProfile = {
                    name,
                    gems: 50,
                    coins: 100,
                    brawlers: [
                        { name: 'Шелли', level: 1 },
                        { name: 'Кольт', level: 1 }
                    ],
                    trophies: 0,
                    banned: false,
                    createdAt: Date.now()
                };
                db.ref('players/' + uid).set(newProfile);

                currentUserId = uid;
                isLoggedIn = true;
                localStorage.setItem('brawl_userId', uid);
                profile = newProfile;
                ok.textContent = '✅ Аккаунт создан!';
                ok.style.display = 'block';
                setTimeout(() => { document.getElementById('authOverlay').style.display = 'none';
                    render(); }, 500);
            }).catch(() => { err.textContent = '❌ Ошибка сети!';
                err.style.display = 'block'; });
        });

        function loadProfile() {
            if (!currentUserId) return;
            db.ref('players/' + currentUserId).once('value').then(snap => {
                if (snap.val()) {
                    profile = snap.val();
                    if (profile.banned) {
                        alert('⛔ Ваш аккаунт забанен!');
                        logout();
                    }
                    render();
                }
            });
        }

        function saveProfile() {
            if (!currentUserId) return;
            db.ref('players/' + currentUserId).set(profile);
        }

        // ============================================================
        //  ВЫХОД
        // ============================================================
        window.logout = function() {
            if (confirm('Выйти из аккаунта?')) {
                localStorage.removeItem('brawl_userId');
                currentUserId = null;
                isLoggedIn = false;
                profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false };
                document.getElementById('authOverlay').style.display = 'flex';
                render();
            }
        };

        // ============================================================
        //  БОЙЦЫ
        // ============================================================
        window.upgradeBrawler = function(name) {
            const brawler = profile.brawlers.find(b => b.name === name);
            if (!brawler) return alert('У вас нет этого бойца!');
            if (brawler.level >= 10) return alert('⚠️ Максимальный уровень!');
            const cost = getUpgradeCost(brawler.level);
            if (profile.coins < cost.coins) return alert(`❌ Нужно ${cost.coins} 🪙`);
            if (profile.gems < cost.gems) return alert(`❌ Нужно ${cost.gems} 💎`);
            profile.coins -= cost.coins;
            profile.gems -= cost.gems;
            brawler.level += 1;
            saveProfile();
            render();
            alert(`✅ ${name} → ${brawler.level} ур.!`);
        };

        window.openBrawlerDetail = function(name) {
            selectedBrawlerForDetail = name;
            render();
        };

        window.closeBrawlerDetail = function() {
            selectedBrawlerForDetail = null;
            render();
        };

        // ============================================================
        //  МАГАЗИН (Firebase)
        // ============================================================
        let shopItems = [];

        function loadShop() {
            db.ref('shop').on('value', snap => {
                const data = snap.val();
                if (data) {
                    shopItems = data;
                    render();
                }
            });
        }

        // Добавляем товары в Firebase при первом запуске
        function initShop() {
            db.ref('shop').once('value', snap => {
                if (!snap.val()) {
                    const defaultShop = [
                        { id: 1, name: '50 💎 Гемов', desc: 'Пополните запас гемов', icon: '💎', cost: 0, reward: { type: 'gems',
                                amount: 50 }, free: false },
                        { id: 2, name: '100 🪙 Монет', desc: 'Для прокачки бойцов', icon: '🪙', cost: 0, reward: { type: 'coins',
                                amount: 100 }, free: false },
                        { id: 3, name: 'Боец: Спайк', desc: 'Мифический боец', icon: '🌵', cost: 149, reward: { type: 'brawler',
                                name: 'Спайк' }, free: false },
                        { id: 4, name: 'Боец: Леон', desc: 'Мифический боец', icon: '🦎', cost: 149, reward: { type: 'brawler',
                                name: 'Леон' }, free: false },
                        { id: 5, name: 'Боец: Динамайк', desc: 'Легендарный боец', icon: '💣', cost: 299, reward: { type: 'brawler',
                                name: 'Динамайк' }, free: false },
                        { id: 6, name: '🎁 БЕСПЛАТНО!', desc: '50 гемов в подарок', icon: '🎁', cost: 0, reward: { type: 'gems',
                                amount: 50 }, free: true }
                    ];
                    db.ref('shop').set(defaultShop);
                }
            });
        }

        window.buyItem = function(itemId) {
            const item = shopItems.find(i => i.id === itemId);
            if (!item) return alert('Товар не найден!');

            if (!item.free && profile.gems < item.cost) {
                return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎`);
            }

            if (!item.free) profile.gems -= item.cost;

            const reward = item.reward;
            if (reward.type === 'gems') {
                profile.gems += reward.amount;
                alert(`✅ +${reward.amount} 💎 Гемов!`);
            } else if (reward.type === 'coins') {
                profile.coins += reward.amount;
                alert(`✅ +${reward.amount} 🪙 Монет!`);
            } else if (reward.type === 'brawler') {
                if (profile.brawlers.some(b => b.name === reward.name)) {
                    alert(`⚠️ У вас уже есть ${reward.name}!`);
                    if (!item.free) profile.gems += item.cost;
                    saveProfile();
                    render();
                    return;
                }
                profile.brawlers.push({ name: reward.name, level: 1 });
                alert(`✅ Получен боец ${reward.name}!`);
            }

            saveProfile();
            render();
        };

        // ============================================================
        //  ВАУЧЕРЫ (Firebase)
        // ============================================================
        let vouchers = [];

        function loadVouchers() {
            db.ref('vouchers').on('value', snap => {
                const data = snap.val();
                if (data) {
                    vouchers = Object.values(data);
                    render();
                }
            });
        }

        window.generateVoucher = function() {
            const rewardType = document.getElementById('voucherRewardType').value;
            const amount = parseInt(document.getElementById('voucherAmount').value) || 0;
            const brawlerName = document.getElementById('voucherBrawlerName').value;
            const maxUses = parseInt(document.getElementById('voucherMaxUses').value) || 1;

            if (rewardType === 'gems' && amount <= 0) return alert('Введите количество гемов!');
            if (rewardType === 'coins' && amount <= 0) return alert('Введите количество монет!');
            if (rewardType === 'brawler' && !brawlerName) return alert('Выберите бойца!');
            if (maxUses < 1) return alert('Минимум 1 активация!');

            const code = 'VOUCHER_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            const voucher = {
                code,
                rewardType,
                amount,
                brawlerName,
                maxUses,
                used: false,
                usedBy: [],
                createdAt: Date.now()
            };

            db.ref('vouchers/' + code).set(voucher);
            alert(`✅ Ваучер создан!\nКод: ${code}`);
            document.getElementById('voucherResult').innerHTML = `
                <div class="voucher-code">
                    <span class="code">${code}</span>
                    <button class="btn-primary" style="padding:4px 12px;font-size:12px;" onclick="copyVoucher('${code}')">📋 Копировать</button>
                </div>
            `;
        };

        window.copyVoucher = function(code) {
            navigator.clipboard.writeText(code).then(
                () => alert('✅ Код скопирован!'),
                () => prompt('Скопируйте код:', code)
            );
        };

        window.activateVoucher = function() {
            const codeInput = document.getElementById('voucherActivateInput');
            const code = codeInput.value.trim().toUpperCase();
            if (!code) return alert('Введите код!');

            db.ref('vouchers/' + code).once('value').then(snap => {
                const voucher = snap.val();
                if (!voucher) return alert('❌ Неверный код!');
                if (voucher.maxUses <= 0) return alert('❌ Ваучер уже использован!');
                if (voucher.usedBy && voucher.usedBy.includes(currentUserId)) {
                    return alert('⚠️ Вы уже активировали этот ваучер!');
                }

                if (!voucher.usedBy) voucher.usedBy = [];
                voucher.usedBy.push(currentUserId);
                voucher.maxUses -= 1;
                if (voucher.maxUses <= 0) voucher.used = true;

                if (voucher.rewardType === 'gems') {
                    profile.gems += voucher.amount;
                    alert(`✅ +${voucher.amount} 💎 Гемов!`);
                } else if (voucher.rewardType === 'coins') {
                    profile.coins += voucher.amount;
                    alert(`✅ +${voucher.amount} 🪙 Монет!`);
                } else if (voucher.rewardType === 'brawler') {
                    if (profile.brawlers.some(b => b.name === voucher.brawlerName)) {
                        alert(`⚠️ У вас уже есть ${voucher.brawlerName}!`);
                        return;
                    }
                    profile.brawlers.push({ name: voucher.brawlerName, level: 1 });
                    alert(`✅ Получен боец ${voucher.brawlerName}!`);
                }

                db.ref('vouchers/' + code).set(voucher);
                saveProfile();
                codeInput.value = '';
                render();
                alert(`🎉 Ваучер активирован! Осталось ${voucher.maxUses} активаций.`);
            });
        };

        // ============================================================
        //  ЧАТ (Firebase)
        // ============================================================
        window.sendMessage = function() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            db.ref('chat').push({
                playerId: currentUserId,
                name: profile.name || 'Игрок',
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
        };

        function loadChat() {
            db.ref('chat').orderByChild('timestamp').limitToLast(50).on('value', snap => {
                const messages = snap.val();
                const container = document.getElementById('chatMessages');
                if (!container) return;

                if (!messages) {
                    container.innerHTML = '<div class="empty-state"><span>💬</span>Нет сообщений</div>';
                    return;
                }

                let html = '';
                const msgs = Object.values(messages).reverse();
                msgs.forEach(msg => {
                    const isOwn = msg.playerId === currentUserId;
                    const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit',
                        minute: '2-digit' });
                    html += `
                        <div class="chat-message ${isOwn ? 'own' : ''}">
                            <div class="msg-header">
                                <span class="msg-name">${msg.name || 'Аноним'}</span>
                                <span class="msg-time">${time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        //  БОЕВАЯ СИСТЕМА (Firebase)
        // ============================================================

        window.selectBrawlerForBattle = function(name) {
            const has = profile.brawlers.some(b => b.name === name);
            if (!has) { alert('У вас нет этого бойца!'); return; }
            selectedBrawler = name;
            const b = profile.brawlers.find(b => b.name === name);
            selectedBrawlerStats = getBrawlerStats(name, b.level);
            render();
        };

        window.findBattle = function() {
            if (!selectedBrawler) { alert('Выберите бойца!'); return; }

            battleState = 'searching';
            render();

            const searchData = {
                playerId: currentUserId,
                name: profile.name || 'Игрок',
                brawler: selectedBrawler,
                level: profile.brawlers.find(b => b.name === selectedBrawler)?.level || 1,
                timestamp: Date.now(),
                status: 'searching'
            };

            searchRef = db.ref('search').push(searchData);

            const searchListener = db.ref('search');
            searchListener.on('value', function(snap) {
                const searches = snap.val();
                if (!searches) return;

                const other = Object.keys(searches).find(key => {
                    return searches[key].playerId !== currentUserId && searches[key].status === 'searching';
                });

                if (other) {
                    const opponent = searches[other];
                    db.ref('search/' + other).remove();
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    searchListener.off();
                    if (botTimeout) clearTimeout(botTimeout);
                    startBattle(opponent);
                }
            });

            botTimeout = setTimeout(() => {
                if (battleState === 'searching') {
                    const botNames = ['🤖 Гром', '🤖 Вспышка', '🤖 Тень', '🤖 Молния', '🤖 Звезда'];
                    const botBrawlers = ['Шелли', 'Кольт', 'Булл', 'Джесси', 'Брок', 'Спайк', 'Леон'];
                    const bot = {
                        playerId: 'bot_' + Math.random().toString(36).substring(2, 8),
                        name: botNames[Math.floor(Math.random() * botNames.length)],
                        brawler: botBrawlers[Math.floor(Math.random() * botBrawlers.length)],
                        level: Math.floor(Math.random() * 5) + 1,
                        isBot: true
                    };
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    searchListener.off();
                    startBattle(bot);
                }
            }, 3000);
        };

        window.cancelSearch = function() {
            if (searchRef) { db.ref('search/' + searchRef.key).remove();
                searchRef = null; }
            db.ref('search').off();
            if (botTimeout) clearTimeout(botTimeout);
            battleState = 'select';
            render();
        };

        window.resetBattle = function() {
            if (searchRef) { db.ref('search/' + searchRef.key).remove();
                searchRef = null; }
            db.ref('search').off();
            if (botTimeout) clearTimeout(botTimeout);
            if (battleId) {
                db.ref('battles/' + battleId).off();
                if (moveListener) { moveListener.off();
                    moveListener = null; }
                if (battleListener) { battleListener.off();
                    battleListener = null; }
            }
            if (botInterval) { clearInterval(botInterval);
                botInterval = null; }
            battleState = 'select';
            battleData = null;
            battleId = null;
            render();
        };

        function startBattle(opponent) {
            const myStats = selectedBrawlerStats;
            const oppStats = getBrawlerStats(opponent.brawler, opponent.level || 1);

            battleId = 'battle_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);

            battleData = {
                id: battleId,
                p1Id: currentUserId,
                p1Name: profile.name || 'Игрок',
                p1Brawler: selectedBrawler,
                p1Level: myStats.level,
                p1MaxHP: myStats.hp,
                p1HP: myStats.hp,
                p1Dmg: myStats.damage,
                p1Cooldown: 0,
                p1Shield: false,
                p2Id: opponent.playerId,
                p2Name: opponent.name || 'Противник',
                p2Brawler: opponent.brawler,
                p2Level: oppStats.level,
                p2MaxHP: oppStats.hp,
                p2HP: oppStats.hp,
                p2Dmg: oppStats.damage,
                p2Cooldown: 0,
                p2Shield: false,
                turn: 'p1',
                finished: false,
                winner: null,
                log: [`⚔️ ${profile.name} (${selectedBrawler} ⚡${myStats.level}) vs ${opponent.name} (${opponent.brawler} ⚡${oppStats.level})`],
                isBot: opponent.isBot || false
            };

            db.ref('battles/' + battleId).set(battleData);

            battleState = 'fighting';

            // Слушаем бой
            battleListener = db.ref('battles/' + battleId);
            battleListener.on('value', snap => {
                const data = snap.val();
                if (data) {
                    battleData = data;
                    if (battleData.finished) {
                        endBattle();
                    }
                    render();
                }
            });

            // Слушаем ходы
            moveListener = db.ref('battles/' + battleId + '/moves');
            moveListener.on('child_added', snap => {
                const move = snap.val();
                if (move.playerId === currentUserId) return;
                if (battleData && !battleData.finished) {
                    processMove(move);
                }
            });

            if (opponent.isBot) {
                startBot();
            }

            render();
        }

        function startBot() {
            if (botInterval) clearInterval(botInterval);
            botInterval = setInterval(() => {
                if (!battleData || battleData.finished) {
                    clearInterval(botInterval);
                    botInterval = null;
                    return;
                }

                const isBotTurn = (battleData.turn === 'p1' && battleData.p1Id.startsWith('bot_')) ||
                    (battleData.turn === 'p2' && battleData.p2Id.startsWith('bot_'));

                if (!isBotTurn) return;

                const isP1 = battleData.turn === 'p1';
                const botHP = isP1 ? battleData.p1HP : battleData.p2HP;
                const botMaxHP = isP1 ? battleData.p1MaxHP : battleData.p2MaxHP;
                const percent = botHP / botMaxHP;
                const cooldown = isP1 ? battleData.p1Cooldown : battleData.p2Cooldown;

                let action;
                if (percent < 0.25) action = 'defend';
                else if (cooldown <= 0 && Math.random() < 0.3) action = 'ability';
                else action = Math.random() < 0.6 ? 'attack' : 'defend';

                const move = { action: action, playerId: isP1 ? battleData.p1Id : battleData.p2Id };
                db.ref('battles/' + battleId + '/moves').push(move);
            }, 1500);
        }

        function processMove(move) {
            if (!battleData || battleData.finished) return;

            const isP1 = battleData.turn === 'p1';
            const isPlayerTurn = isP1 ? battleData.p1Id === move.playerId : battleData.p2Id === move.playerId;
            if (!isPlayerTurn) return;

            if (battleData.p1Cooldown > 0) battleData.p1Cooldown--;
            if (battleData.p2Cooldown > 0) battleData.p2Cooldown--;

            const attackerName = isP1 ? battleData.p1Name : battleData.p2Name;
            const defenderName = isP1 ? battleData.p2Name : battleData.p1Name;
            const attackerDmg = isP1 ? battleData.p1Dmg : battleData.p2Dmg;

            let damage = 0;
            let isCrit = false;

            if (move.action === 'attack') {
                const variance = 0.8 + Math.random() * 0.4;
                isCrit = Math.random() < 0.2;
                damage = Math.round(attackerDmg * variance * (isCrit ? 1.5 : 1));

                if (isP1 ? battleData.p2Shield : battleData.p1Shield) {
                    damage = Math.round(damage * 0.5);
                    if (isP1) battleData.p2Shield = false;
                    else battleData.p1Shield = false;
                    battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
                }

                battleData.log.push(`💥 ${attackerName} нанёс ${damage} урона ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

                if (isP1) {
                    battleData.p2HP = Math.max(0, battleData.p2HP - damage);
                } else {
                    battleData.p1HP = Math.max(0, battleData.p1HP - damage);
                }

            } else if (move.action === 'defend') {
                const maxHP = isP1 ? battleData.p1MaxHP : battleData.p2MaxHP;
                const heal = Math.round(maxHP * 0.2);
                if (isP1) {
                    battleData.p1HP = Math.min(battleData.p1MaxHP, battleData.p1HP + heal);
                    battleData.p1Shield = true;
                } else {
                    battleData.p2HP = Math.min(battleData.p2MaxHP, battleData.p2HP + heal);
                    battleData.p2Shield = true;
                }
                battleData.log.push(`🛡️ ${attackerName} восстановил ${heal} HP и поставил щит!`);

            } else if (move.action === 'ability') {
                const cooldown = isP1 ? battleData.p1Cooldown : battleData.p2Cooldown;
                if (cooldown > 0) {
                    battleData.log.push(`⏳ ${attackerName} — способность на перезарядке!`);
                } else {
                    if (isP1) battleData.p1Cooldown = 2;
                    else battleData.p2Cooldown = 2;

                    const variance = 0.9 + Math.random() * 0.2;
                    isCrit = Math.random() < 0.3;
                    damage = Math.round(attackerDmg * 2.5 * variance * (isCrit ? 1.5 : 1));

                    if (isP1 ? battleData.p2Shield : battleData.p1Shield) {
                        damage = Math.round(damage * 0.5);
                        if (isP1) battleData.p2Shield = false;
                        else battleData.p1Shield = false;
                        battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
                    }

                    battleData.log.push(`⚡ ${attackerName} нанёс СУПЕР-УДАР (${damage}) ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

                    if (isP1) {
                        battleData.p2HP = Math.max(0, battleData.p2HP - damage);
                    } else {
                        battleData.p1HP = Math.max(0, battleData.p1HP - damage);
                    }
                }
            }

            if (battleData.p1HP <= 0 || battleData.p2HP <= 0) {
                battleData.finished = true;
                battleData.winner = battleData.p1HP > 0 ? 'p1' : 'p2';
                const winnerName = battleData.winner === 'p1' ? battleData.p1Name : battleData.p2Name;
                battleData.log.push(`🏆 ${winnerName} ПОБЕДИЛ!`);

                if ((battleData.winner === 'p1' && battleData.p1Id === currentUserId) ||
                    (battleData.winner === 'p2' && battleData.p2Id === currentUserId)) {
                    profile.trophies = (profile.trophies || 0) + 15;
                    saveProfile();
                    setTimeout(() => alert('🏆 ПОБЕДА! +15 кубков!'), 300);
                } else {
                    setTimeout(() => alert('💀 Поражение... Попробуйте снова!'), 300);
                }

                db.ref('battles/' + battleId).set(battleData);
                if (botInterval) { clearInterval(botInterval);
                    botInterval = null; }
                render();
                return;
            }

            battleData.turn = isP1 ? 'p2' : 'p1';
            db.ref('battles/' + battleId).set(battleData);
            render();
        }

        function endBattle() {
            battleState = 'result';
            if (battleListener) { battleListener.off();
                battleListener = null; }
            if (moveListener) { moveListener.off();
                moveListener = null; }
            if (botInterval) { clearInterval(botInterval);
                botInterval = null; }
            render();
        }

        window.makeMove = function(action) {
            if (!battleData) { alert('Нет данных о бое!'); return; }
            if (battleData.finished) { alert('Бой окончен!'); return; }

            const isMyTurn = (battleData.turn === 'p1' && battleData.p1Id === currentUserId) ||
                (battleData.turn === 'p2' && battleData.p2Id === currentUserId);

            if (!isMyTurn) { alert('Сейчас не ваш ход!'); return; }

            if (action === 'ability') {
                const cooldown = battleData.turn === 'p1' ? battleData.p1Cooldown : battleData.p2Cooldown;
                if (cooldown > 0) { alert(`⏳ Перезарядка: ${cooldown} ходов`); return; }
            }

            const move = { action: action, playerId: currentUserId, timestamp: Date.now() };
            db.ref('battles/' + battleId + '/moves').push(move);
        };

                                <span class="icon">${myIcon}</span>
                                <div class="name">${battleData.p1Name} ${isP1 ? '(Вы)' : ''}</div>
                                <div class="level-tag">⚡ Уровень ${myLevel}</div>
                                <div class="hp-text">❤️ ${myHP}/${myMaxHP}</div>
                                <div class="hp-bar"><div class="fill ${myClass}" style="width:${myPct}%;"></div></div>
                                ${myShield ? '<div class="shield-tag">🛡️ ЩИТ</div>' : ''}
                                ${myCooldown > 0 ? `<div class="cooldown-tag">⏳ ${myCooldown}</div>` : ''}
                            </div>

                            <div class="vs">⚔️</div>

                            <div class="player-card ${!isMyTurn ? 'active' : ''}">
                                <span class="icon">${enemyIcon}</span>
                                <div class="name">${battleData.p2Name} ${!isP1 ? '(Вы)' : ''}</div>
                                <div class="level-tag">⚡ Уровень ${enemyLevel}</div>
                                <div class="hp-text">❤️ ${enemyHP}/${enemyMaxHP}</div>
                                <div class="hp-bar"><div class="fill ${enemyClass}" style="width:${enemyPct}%;"></div></div>
                                ${enemyShield ? '<div class="shield-tag">🛡️ ЩИТ</div>' : ''}
                            </div>
                        </div>

                        <div class="battle-actions">
                            <button class="btn-attack" onclick="makeMove('attack')" ${!isMyTurn ? 'disabled' : ''}>
                                ⚔️ Атака
                                <br><span style="font-size:10px;opacity:0.7;">${myDmg} урона</span>
                            </button>
                            <button class="btn-defend" onclick="makeMove('defend')" ${!isMyTurn ? 'disabled' : ''}>
                                🛡️ Защита
                                <br><span style="font-size:10px;opacity:0.7;">+20% HP</span>
                            </button>
                            <button class="btn-ability" onclick="makeMove('ability')" ${!isMyTurn || myCooldown > 0 ? 'disabled' : ''}>
                                ⚡ Супер
                                <br><span style="font-size:10px;opacity:0.7;">${Math.round(myDmg * 2.5)} урона</span>
                                ${myCooldown > 0 ? `<span class="cd">(${myCooldown})</span>` : ''}
                            </button>
                        </div>

                        <div class="battle-log">${logHtml}</div>
                    </div>
                `;
                return;
            }

            if (battleState === 'result' && battleData) {
                const isWin = (battleData.winner === 'p1' && battleData.p1Id === currentUserId) ||
                    (battleData.winner === 'p2' && battleData.p2Id === currentUserId);

                content.innerHTML = `
                    <div class="result-screen">
                        <div class="big">${isWin ? '🎉 ПОБЕДА!' : '💀 ПОРАЖЕНИЕ'}</div>
                        ${isWin ? '<div class="sub" style="color:#2ecc71;">🏆 +15 кубков!</div>' : ''}
                        <div style="color:#888;margin-top:8px;font-size:14px;">
                            ${battleData.p1Name} (${battleData.p1Brawler} ⚡${battleData.p1Level}) vs ${battleData.p2Name} (${battleData.p2Brawler} ⚡${battleData.p2Level})
                        </div>
                        <button class="btn-primary" onclick="resetBattle()" style="margin-top:12px;">⬅️ Назад</button>
                    </div>
                `;
                return;
            }

            content.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">Загрузка...</div>';
        }

        // ===== ПРОФИЛЬ =====
        function renderProfile() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="profile-card">
                    <span class="avatar">👤</span>
                    <div class="nick">${profile.name || 'Игрок'}</div>
                    <div style="font-size:12px;color:#555577;margin-bottom:8px;">ID: ${currentUserId?.slice(0,12)}</div>
                    <div class="stats">
                        <div class="stat-item"><div class="value gems">${profile.gems || 0}</div><div class="label">💎 Гемы</div></div>
                        <div class="stat-item"><div class="value coins">${profile.coins || 0}</div><div class="label">🪙 Монеты</div></div>
                        <div class="stat-item"><div class="value trophies">${profile.trophies || 0}</div><div class="label">🏆 Кубки</div></div>
                    </div>
                    <div style="margin-top:12px;color:#888;font-size:13px;">
                        Бойцы: ${profile.brawlers?.map(b => `${b.name}(${b.level}⚡)`).join(', ') || 'нет'}
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            `;
        }

        // ===== ЧАТ =====
        function renderChatTab() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Введите сообщение..." maxlength="200" />
                        <button onclick="sendMessage()">📤</button>
                    </div>
                </div>
            `;
            loadChat();
        }

        // ============================================================
        //  МЕНЮ
        // ============================================================
        document.querySelectorAll('.menu button').forEach(btn => {
            btn.addEventListener('click', function() {
                const tab = this.dataset.tab;

                if (tab !== 'battle' && battleState !== 'select') {
                    if (botTimeout) clearTimeout(botTimeout);
                    if (botInterval) { clearInterval(botInterval);
                        botInterval = null; }
                    if (searchRef) { db.ref('search/' + searchRef.key).remove();
                        searchRef = null; }
                    db.ref('search').off();
                    if (battleId) {
                        db.ref('battles/' + battleId).off();
                        if (moveListener) { moveListener.off();
                            moveListener = null; }
                        if (battleListener) { battleListener.off();
                            battleListener = null; }
                    }
                    battleState = 'select';
                    battleData = null;
                    battleId = null;
                    selectedBrawler = null;
                    selectedBrawlerStats = null;
                }

                currentTab = tab;
                selectedBrawlerForDetail = null;
                render();
            });
        });

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        loadShop();
        initShop();
        loadVouchers();
        checkSession();
        render();

        console.log('🚀 Brawl Stars с Firebase запущен!');
        console.log('📊 Доступно бойцов:', ALL_BRAWLERS.length);
        console.log('👤 Игрок:', profile.name || 'Не авторизован');
        console.log('🔥 Firebase статус:', firebase.apps.length ? '✅ Подключен' : '❌ Не подключен');
    </script>
</body>
</html>
