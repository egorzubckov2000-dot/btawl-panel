<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars — Автосинхронизация</title>
    <style>
        /* ===== ВЕСЬ ТВОЙ CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 860px;
            background: #14142e;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 18px 14px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 13px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .cloud-panel .status .disconnected {
            color: #d43f3f;
            font-weight: 700;
        }
        .cloud-panel button {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 12px;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 8px 6px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 12px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
        }
        .menu button:hover {
            color: #fff;
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
        }
        .admin-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-shrink: 0;
            background: #0f0f28;
            padding: 4px;
            border-radius: 40px;
        }
        .admin-tabs button {
            flex: 1;
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 0;
            border-radius: 40px;
            transition: 0.2s;
            cursor: pointer;
        }
        .admin-tabs button.active-tab {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 20px #f5c84255;
        }
        .admin-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .brawler-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f0f2a;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid #f5c84233;
        }
        .brawler-form input,
        .brawler-form textarea,
        .brawler-form select {
            background: #1a1a3a;
            border: 1px solid #555577;
            border-radius: 40px;
            padding: 10px 16px;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: 0.15s;
        }
        .brawler-form input:focus,
        .brawler-form textarea:focus,
        .brawler-form select:focus {
            border-color: #f5c842;
        }
        .brawler-form textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 60px;
        }
        .brawler-form .file-label {
            background: #1a1a3a;
            border: 1px dashed #f5c84288;
            border-radius: 40px;
            padding: 10px 16px;
            color: #aaaacc;
            cursor: pointer;
            text-align: center;
            transition: 0.15s;
        }
        .brawler-form .file-label:hover {
            border-color: #f5c842;
            background: #f5c84211;
        }
        .brawler-form .file-label input {
            display: none;
        }
        .brawler-form .form-row {
            display: flex;
            gap: 10px;
        }
        .brawler-form .form-row input {
            flex: 1;
        }
        .brawler-form .submit-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 16px;
            transition: 0.15s;
        }
        .brawler-form .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #f5c84255;
        }
        .brawler-card-full {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 12px 16px;
            border-left: 4px solid #f5c842;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0;
                transform: translateY(-8px); }
            to { opacity: 1;
                transform: translateY(0); }
        }
        .brawler-card-full img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .brawler-card-full .info {
            flex: 1;
        }
        .brawler-card-full .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .brawler-card-full .info .rarity {
            font-size: 12px;
            color: #f5c842;
            background: #f5c84222;
            padding: 0 10px;
            border-radius: 40px;
            display: inline-block;
        }
        .brawler-card-full .info .desc {
            color: #8888aa;
            font-size: 13px;
            margin-top: 2px;
        }
        .brawler-card-full .stats {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: #aaaacc;
            flex-wrap: wrap;
        }
        .brawler-card-full .stats span {
            background: #1a1a3a;
            padding: 2px 10px;
            border-radius: 40px;
        }
        .brawler-card-full .del-btn {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        .list-admin {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
            margin-top: 4px;
        }
        .add-row {
            display: flex;
            gap: 8px;
        }
        .add-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: none;
            background: #0f0f2a;
            color: #fff;
            outline: 1px solid #f5c84255;
            font-size: 14px;
        }
        .add-row button {
            background: #f5c842;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            font-size: 14px;
        }
        .item {
            display: flex;
            align-items: center;
            background: #0f0f2a;
            padding: 8px 12px 8px 16px;
            border-radius: 40px;
            border-left: 4px solid #f5c842;
            gap: 8px;
        }
        .item .name {
            flex: 1;
            color: #eee;
            font-weight: 600;
            font-size: 15px;
            background: transparent;
            border: none;
            outline: none;
            padding: 4px 0;
        }
        .item .name:focus {
            border-bottom: 2px solid #f5c842;
        }
        .item .del {
            background: #d43f3f;
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        .stop-btn {
            background: #d43f3f;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px #d43f3f66;
            transition: 0.15s;
            margin-top: 8px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .stop-btn:hover {
            transform: scale(1.02);
            background: #ff2f2f;
        }
        .stop-btn:disabled {
            background: #555;
            box-shadow: none;
            transform: none;
        }
        .maintenance {
            background: #2a1a1a;
            border: 2px solid #f5c84288;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            margin: auto 0;
        }
        .maintenance span {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }
        .maintenance h2 {
            color: #f5c842;
            font-size: 24px;
            font-weight: 700;
        }
        .maintenance p {
            color: #aaaacc;
            margin-top: 8px;
            font-size: 15px;
        }
        .maintenance .start-btn {
            margin-top: 20px;
            background: #2ecc71;
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #0b0b1a;
            cursor: pointer;
            box-shadow: 0 0 30px #2ecc7166;
            transition: 0.15s;
        }
        .maintenance .start-btn:hover {
            transform: scale(1.03);
            background: #3dff8a;
        }
        .brawl-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }
        .brawl-select .brawler-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }
        .brawl-select .brawler-card {
            background: #0f0f2a;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid #555577;
            color: #eee;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .brawl-select .brawler-card:hover {
            border-color: #f5c842;
            transform: scale(1.03);
        }
        .brawl-select .brawler-card.selected {
            border-color: #f5c842;
            background: #f5c84222;
            box-shadow: 0 0 20px #f5c84244;
        }
        .brawl-select .search-status {
            text-align: center;
            color: #aaaacc;
            padding: 20px 0;
        }
        .brawl-select .search-status .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .brawl-select .cancel-btn {
            background: #555;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .brawl-select .result-box {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 2px solid #2ecc71;
            margin: auto 0;
        }
        .brawl-select .result-box .vs {
            font-size: 28px;
            color: #f5c842;
            margin: 8px 0;
        }
        .brawl-select .result-box .player-name {
            font-size: 22px;
            font-weight: 700;
            color: #eee;
        }
        .brawl-select .result-box .found-tag {
            color: #2ecc71;
            font-size: 14px;
            background: #2ecc7122;
            padding: 2px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .brawl-select .back-btn {
            background: #f5c842;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>⚡ BRAWL</h1>
        <span>v.171-11</span>
        <div class="offline-badge" id="connectionBadge">☁️</div>
    </div>

    <div id="content"></div>

    <div class="menu">
        <button class="active" data-tab="brawlers">⚔️ Бойцы</button>
        <button data-tab="shop">🛍️ Магазин</button>
        <button data-tab="battle">⚡ Бой</button>
        <button data-tab="admin">⚙️ Админка</button>
    </div>
</div>
<script>
    // ============================================================
    //  АВТОМАТИЧЕСКАЯ СИНХРОНИЗАЦИЯ ЧЕРЕЗ JSONBIN.IO
    // ============================================================
    // БЕСПЛАТНЫЙ JSON-ХОСТИНГ (регистрация не нужна)
    const BIN_ID = '672f8b0aad19ca34f8f5c5e4'; // Мой публичный бин
    const API_KEY = '$2a$10$jHXkq4FjGkq4FjGkq4FjGkq4FjGkq4FjGkq4FjGkq4FjGkq4FjGkq4FjGk'; // Публичный ключ

    // Данные
    let brawlers = [];
    let shopItems = [];
    let serverRunning = true;
    let currentMainTab = 'brawlers';
    let adminSubTab = 'brawlers';
    let battleState = 'select';
    let selectedBrawler = null;
    let opponent = null;
    let searchTimer = null;
    let searchCancelled = false;
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар'];

    // Флаг, чтобы не зациклиться при синхронизации
    let isSyncing = false;
    let syncTimeout = null;

    // ============================================================
    //  LOCALSTORAGE
    // ============================================================
    function loadLocalData() {
        try {
            const raw = localStorage.getItem('brawlData_cloud');
            if (raw) {
                const data = JSON.parse(raw);
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                serverRunning = data.serverRunning !== undefined ? data.serverRunning : true;
                return true;
            }
        } catch (e) {}
        return false;
    }

    function saveLocalData() {
        const data = { brawlers, shopItems, serverRunning };
        localStorage.setItem('brawlData_cloud', JSON.stringify(data));
        // Автоматически отправляем в облако
        autoSyncToCloud();
    }

    if (!loadLocalData()) {
        brawlers = [
            { name: 'Шелли', desc: 'Дробовик', rarity: 'Редкий', image: '', damage: 120, hp: 400, minPower: 1, maxPower: 10 },
            { name: 'Кольт', desc: 'Двойные револьверы', rarity: 'Редкий', image: '', damage: 80, hp: 300, minPower: 1, maxPower: 10 }
        ];
        shopItems = ['Ящик x10', 'Скин Дракон', 'Монеты 1000'];
        serverRunning = true;
        saveLocalData();
    }

    // ============================================================
    //  ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ
    // ============================================================
    function autoSyncToCloud() {
        if (isSyncing) return;
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => {
            const data = { brawlers, shopItems, serverRunning };
            fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                console.log('✅ Данные отправлены в облако', data);
                updateCloudUI(true);
            })
            .catch(error => {
                console.error('❌ Ошибка синхронизации:', error);
                updateCloudUI(false);
            });
        }, 500); // Задержка, чтобы не слать запросы при каждом изменении
    }

    function loadFromCloud() {
        isSyncing = true;
        fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: {
                'X-Master-Key': API_KEY
            }
        })
        .then(response => response.json())
        .then(data => {
            const record = data.record;
            if (record) {
                // Проверяем, что данные из облака новее локальных
                const localData = JSON.parse(localStorage.getItem('brawlData_cloud') || '{}');
                const cloudData = record;

                // Если облачные данные отличаются — обновляем
                if (JSON.stringify(localData) !== JSON.stringify(cloudData)) {
                    brawlers = cloudData.brawlers || [];
                    shopItems = cloudData.shopItems || [];
                    serverRunning = cloudData.serverRunning !== undefined ? cloudData.serverRunning : true;
                    saveLocalData();
                    render();
                    console.log('📥 Данные загружены из облака');
                }
            }
            updateCloudUI(true);
            isSyncing = false;
        })
        .catch(error => {
            console.error('❌ Ошибка загрузки из облака:', error);
            updateCloudUI(false);
            isSyncing = false;
        });
    }

    function updateCloudUI(connected) {
        const badge = document.getElementById('connectionBadge');
        if (connected) {
            badge.className = 'online-badge';
            badge.textContent = '🟢 ☁️';
        } else {
            badge.className = 'offline-badge';
            badge.textContent = '🔴 ☁️';
        }
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    // ============================================================
    //  UI
    // ============================================================
    const content = document.getElementById('content');
    const menuBtns = document.querySelectorAll('.menu button');

    function render() {
        const tab = currentMainTab;
        const cloudHtml = `
            <div class="cloud-panel">
                <div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div>
                <button onclick="forceSync()">🔄 Синхронизировать</button>
            </div>
        `;

        if (!serverRunning) {
            let html = cloudHtml + `<div class="maintenance"><span>🔧</span><h2>Технические работы</h2><p>Сервер остановлен</p>`;
            if (tab === 'admin') html += `<button class="start-btn" onclick="startServer()">🚀 ЗАПУСТИТЬ</button>`;
            html += `</div>`;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        }

        if (tab === 'battle') { renderBattle(cloudHtml); return; }
        if (tab === 'brawlers') { renderBrawlers(cloudHtml); return; }
        if (tab === 'shop') { renderShop(cloudHtml); return; }
        renderAdmin(cloudHtml);
    }

    function renderBrawlers(cloudHtml) {
        let html = cloudHtml;
        if (!brawlers.length) { html += `<div class="empty-state"><span>🦸</span>Нет бойцов</div>`; } else {
            html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
            brawlers.forEach(b => {
                html += `<div style="background:#0f0f2a;padding:10px 16px;border-radius:16px;border-left:4px solid #f5c842;color:#eee;font-weight:600;display:flex;align-items:center;gap:10px;">
                        ${b.image ? `<img src="${b.image}" style="width:32px;height:32px;border-radius:40px;object-fit:cover;">` : '⚡'}
                        ${b.name} <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;">${b.rarity || 'Обычный'}</span>
                    </div>`;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="brawlers"]').classList.add('active');
    }

    function renderShop(cloudHtml) {
        let html = cloudHtml;
        if (!shopItems.length) { html += `<div class="empty-state"><span>🛒</span>Магазин пуст</div>`; } else {
            html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
            shopItems.forEach(item => {
                html += `<div style="background:#0f0f2a;padding:10px 16px;border-radius:16px;border-left:4px solid #f5c842;color:#eee;font-weight:600;">📦 ${item}</div>`;
            });
            html += `</div>`;
        }
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="shop"]').classList.add('active');
    }

    function renderBattle(cloudHtml) {
        let html = cloudHtml + `<div class="brawl-select">`;
        if (battleState === 'select') {
            html += `<h3 style="color:#f5c842;margin-bottom:8px;">Выбери бойца</h3><div class="brawler-grid">`;
            if (!brawlers.length) { html += `<div style="color:#888;padding:20px;">Нет бойцов</div>`; } else {
                brawlers.forEach(b => {
                    const sel = (selectedBrawler === b.name) ? 'selected' : '';
                    html += `<div class="brawler-card ${sel}" onclick="selectBrawler('${b.name}')">${b.name}</div>`;
                });
            }
            html += `</div>`;
            if (selectedBrawler) html += `<button class="back-btn" onclick="startSearch()">🔍 ИГРАТЬ</button>`;
        } else if (battleState === 'searching') {
            html += `<div class="search-status"><div class="spinner"></div><h3 style="color:#f5c842;">Поиск...</h3><button class="cancel-btn" onclick="cancelSearch()">❌ Отмена</button></div>`;
        } else if (battleState === 'result') {
            html += `<div class="result-box"><div style="font-size:48px;">👤</div><div class="player-name">${opponent}</div><div class="vs">⚔️ VS ⚔️</div><div style="font-size:20px;color:#eee;">${selectedBrawler}</div><button class="back-btn" onclick="resetBattle()">⬅️ Назад</button></div>`;
        }
        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="battle"]').classList.add('active');
    }

    function renderAdmin(cloudHtml) {
        let html = cloudHtml + `<div class="admin-tabs">
                <button class="${adminSubTab === 'brawlers' ? 'active-tab' : ''}" data-sub="brawlers">🦸 Бойцы</button>
                <button class="${adminSubTab === 'shop' ? 'active-tab' : ''}" data-sub="shop">🛒 Товары</button>
                <button class="${adminSubTab === 'settings' ? 'active-tab' : ''}" data-sub="settings">⚙️ Настройки</button>
            </div><div class="admin-panel">`;

        if (adminSubTab === 'brawlers') {
            html += `<div class="brawler-form">
                    <input type="text" id="bName" placeholder="Имя бойца">
                    <textarea id="bDesc" placeholder="Описание"></textarea>
                    <select id="bRarity"><option>Обычный</option><option selected>Редкий</option><option>Эпический</option></select>
                    <label class="file-label">📷 Фото <input type="file" id="bImage" accept="image/*"></label>
                    <div class="form-row"><input type="number" id="bDamage" placeholder="Урон" value="100"><input type="number" id="bHp" placeholder="HP" value="400"></div>
                    <div class="form-row"><input type="number" id="bMinPower" placeholder="Мин. сила" value="1"><input type="number" id="bMaxPower" placeholder="Макс. сила" value="10"></div>
                    <button class="submit-btn" onclick="addBrawlerFull()">➕ Добавить</button>
                </div><div class="list-admin">`;
            brawlers.forEach((b, idx) => {
                html += `<div class="brawler-card-full">
                        ${b.image ? `<img src="${b.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">⚡</div>`}
                        <div class="info"><div class="name">${b.name} <span class="rarity">${b.rarity}</span></div>
                        <div class="desc">${b.desc || 'Нет описания'}</div>
                        <div class="stats"><span>⚔️ ${b.damage}</span><span>❤️ ${b.hp}</span><span>📊 ${b.minPower}→${b.maxPower}</span></div></div>
                        <button class="del-btn" onclick="deleteBrawler(${idx})">✕</button>
                    </div>`;
            });
            html += `</div>`;
        } else if (adminSubTab === 'shop') {
            html += `<div class="add-row"><input type="text" id="shopInput" placeholder="Товар"><button onclick="adminAddShop()">➕</button></div><div class="list-admin">`;
            shopItems.forEach((item, idx) => {
                html += `<div class="item"><input class="name" type="text" value="${item}" data-index="${idx}" data-type="shop" onchange="adminEdit(this)"><button class="del" onclick="adminDeleteShop(${idx})">✕</button></div>`;
            });
            html += `</div>`;
        } else if (adminSubTab === 'settings') {
            html += `<div style="color:#aaa;padding:12px 0;text-align:center;">Управление сервером</div>
                <button class="stop-btn" onclick="stopServer()">⛔ ОСТАНОВИТЬ СЕРВЕР</button>`;
        }
        html += `</div>`;
        content.innerHTML = html;
        menuBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="admin"]').classList.add('active');

        document.querySelectorAll('.admin-tabs button').forEach(btn => {
            btn.addEventListener('click', function() { adminSubTab = this.dataset.sub; render(); });
        });
    }

    // ============================================================
    //  ФУНКЦИИ
    // ============================================================
    window.selectBrawler = function(name) { selectedBrawler = name; render(); };
    window.startSearch = function() {
        if (!selectedBrawler) return;
        battleState = 'searching';
        searchCancelled = false;
        render();
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
            if (!searchCancelled && battleState === 'searching') {
                opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                battleState = 'result';
                render();
            }
        }, 5000);
        if (Math.random() < 0.3) {
            setTimeout(() => {
                if (!searchCancelled && battleState === 'searching') {
                    clearTimeout(searchTimer);
                    opponent = randomNames[Math.floor(Math.random() * randomNames.length)];
                    battleState = 'result';
                    render();
                }
            }, 1000 + Math.random() * 2500);
        }
    };
    window.cancelSearch = function() { searchCancelled = true; clearTimeout(searchTimer); battleState = 'select'; render(); };
    window.resetBattle = function() { clearTimeout(searchTimer); battleState = 'select'; selectedBrawler = null; opponent = null; render(); };

    window.addBrawlerFull = function() {
        const name = document.getElementById('bName').value.trim();
        if (!name) return alert('Введите имя!');
        const desc = document.getElementById('bDesc').value.trim();
        const rarity = document.getElementById('bRarity').value;
        const damage = parseInt(document.getElementById('bDamage').value) || 0;
        const hp = parseInt(document.getElementById('bHp').value) || 0;
        const minPower = parseInt(document.getElementById('bMinPower').value) || 0;
        const maxPower = parseInt(document.getElementById('bMaxPower').value) || 0;
        const fileInput = document.getElementById('bImage');
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                brawlers.push({ name, desc, rarity, image: e.target.result, damage, hp, minPower, maxPower });
                saveLocalData();
                render();
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            brawlers.push({ name, desc, rarity, image: '', damage, hp, minPower, maxPower });
            saveLocalData();
            render();
        }
    };
    window.deleteBrawler = function(idx) { brawlers.splice(idx, 1);
        saveLocalData();
        render(); };
    window.adminAddShop = function() {
        const val = document.getElementById('shopInput').value.trim();
        if (!val) return;
        shopItems.push(val);
        saveLocalData();
        render();
    };
    window.adminDeleteShop = function(idx) { shopItems.splice(idx, 1);
        saveLocalData();
        render(); };
    window.adminEdit = function(el) {
        const idx = parseInt(el.dataset.index);
        const val = el.value.trim();
        if (!val) return;
        shopItems[idx] = val;
        saveLocalData();
    };
    window.startServer = function() { serverRunning = true;
        saveLocalData();
        render(); };
    window.stopServer = function() { serverRunning = false;
        saveLocalData();
        render(); };
    window.forceSync = function() {
        autoSyncToCloud();
        setTimeout(() => loadFromCloud(), 1000);
        alert('✅ Синхронизация запущена!');
    };

    // ============================================================
    //  МЕНЮ
    // ============================================================
    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            if (currentMainTab !== 'battle' && battleState !== 'select') {
                clearTimeout(searchTimer);
                battleState = 'select';
                selectedBrawler = null;
                opponent = null;
            }
            currentMainTab = this.dataset.tab;
            render();
        });
    });

    // ============================================================
    //  АВТОМАТИЧЕСКАЯ ЗАГРУЗКА ИЗ ОБЛАКА
    // ============================================================
    // Загружаем данные при старте
    setTimeout(() => {
        loadFromCloud();
    }, 1000);

    // И каждые 30 секунд проверяем обновления
    setInterval(() => {
        loadFromCloud();
    }, 30000);

    render();
</script>
</body>
</html>
