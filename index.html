<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #14142e;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:600px) {
            .app {
                max-width: 500px;
                height: 95vh;
                border-radius: 40px;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
                padding: 20px 18px;
            }
        }
        @media (max-width:430px) {
            .app {
                padding: 12px 10px;
                height: 100vh;
                max-height: 860px;
            }
            .header h1 {
                font-size: 22px;
            }
            .menu button {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        @keyframes pulse-badge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 16px 12px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @media (max-width:430px) {
            #content {
                padding: 12px 10px;
                border-radius: 18px;
            }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 12px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 6px 4px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 10px;
            gap: 2px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        .auth-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .auth-box h2 {
            color: #f5c842;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .auth-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 15px;
            outline: none;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .auth-box input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .auth-box .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .auth-box .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .auth-box .btn-group .login-btn {
            background: #f5c842;
            color: #0b0b1a;
        }
        .auth-box .btn-group .login-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .auth-box .btn-group .register-btn {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .auth-box .btn-group .register-btn:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }
        .auth-box .error {
            color: #d43f3f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            animation: shake 0.4s ease;
        }
        .auth-box .success {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }
        .banned-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: fadeIn 0.5s ease;
        }
        .banned-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #d43f3f;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        .banned-box .ban-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
        }
        .banned-box h2 {
            color: #d43f3f;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .banned-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .banned-box .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .banned-box .btn-group button {
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .banned-box .btn-group .new-account {
            background: #f5c842;
            color: #0b0b1a;
        }
        .banned-box .btn-group .new-account:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .banned-box .btn-group .appeal {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .banned-box .btn-group .appeal:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }
        .server-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5c842, #f5a623);
            color: #0b0b1a;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            z-index: 9999;
            box-shadow: 0 0 60px rgba(245, 200, 66, 0.5);
            max-width: 90%;
            width: auto;
            text-align: center;
            animation: slideDown 0.5s ease;
            display: none;
            border: 2px solid #fff;
        }
        .server-notification .close-notify {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #d43f3f;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 0 20px rgba(212, 63, 63, 0.5);
        }
        .server-notification .close-notify:hover {
            transform: scale(1.15);
            background: #ff2f2f;
        }
        .server-notification .notify-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-60px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .pvp-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }
        .pvp-search {
            text-align: center;
            padding: 30px 20px;
            background: #0f0f2a;
            border-radius: 24px;
            border: 2px solid #f5c84244;
            animation: pulse-search 1.5s ease-in-out infinite;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @keyframes pulse-search {
            0%,
            100% {
                border-color: #f5c84244;
            }
            50% {
                border-color: #f5c842;
            }
        }
        .pvp-search .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .pvp-search h3 {
            color: #f5c842;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .pvp-search p {
            color: #8888aa;
            font-size: 14px;
        }
        .pvp-search .cancel-btn {
            margin-top: 16px;
            background: #555;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .pvp-search .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-height: 100px;
        }
        .battle-player {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            flex: 1;
            border: 2px solid #555577;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .battle-player.active {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84244;
        }
        .battle-player .hp-container {
            position: relative;
            margin-top: 4px;
        }
        .battle-player .hp-bar-bg {
            background: #1a1a3a;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            position: relative;
        }
        .battle-player .hp-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }
        .battle-player .hp-bar-fill.green {
            background: linear-gradient(90deg, #51cf66, #2ecc71);
        }
        .battle-player .hp-bar-fill.yellow {
            background: linear-gradient(90deg, #f5c842, #f39c12);
        }
        .battle-player .hp-bar-fill.red {
            background: linear-gradient(90deg, #d43f3f, #e74c3c);
        }
        .battle-player .hp-text {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 700;
            margin-top: 2px;
        }
        .battle-player .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .battle-player .brawler-icon {
            font-size: 48px;
            display: block;
            margin: 4px 0;
            transition: transform 0.3s ease;
        }
        .battle-player .brawler-icon.hit {
            animation: hitShake 0.4s ease;
        }
        @keyframes hitShake {
            0% {
                transform: translateX(0) scale(1);
            }
            25% {
                transform: translateX(-15px) scale(0.9);
            }
            50% {
                transform: translateX(15px) scale(0.9);
            }
            75% {
                transform: translateX(-10px) scale(0.95);
            }
            100% {
                transform: translateX(0) scale(1);
            }
        }
        .battle-player .brawler-icon.heal {
            animation: healPulse 0.6s ease;
        }
        @keyframes healPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
                filter: brightness(1.5);
            }
            100% {
                transform: scale(1);
            }
        }
        .battle-player .brawler-icon.shield {
            animation: shieldPulse 0.5s ease;
        }
        @keyframes shieldPulse {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.3);
                filter: drop-shadow(0 0 20px #4fc3f7);
            }
            100% {
                transform: scale(1);
            }
        }
        .battle-player .power {
            color: #f5c842;
            font-size: 12px;
            font-weight: 700;
        }
        .battle-player .shield-indicator {
            display: inline-block;
            background: #4fc3f7;
            color: #0b0b1a;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: 40px;
            margin-top: 2px;
            animation: shieldGlow 0.8s ease-in-out infinite;
        }
        @keyframes shieldGlow {
            0%,
            100% {
                box-shadow: 0 0 10px #4fc3f755;
            }
            50% {
                box-shadow: 0 0 30px #4fc3f7;
            }
        }
        .battle-player .damage-float {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            animation: damageFloat 1s ease forwards;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            color: #ff6b6b;
        }
        .battle-player .damage-float.heal-float {
            color: #2ecc71;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.8);
        }
        @keyframes damageFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            30% {
                transform: translate(-50%, -80%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120%) scale(1);
            }
        }
        .battle-vs {
            color: #f5c842;
            font-size: 24px;
            font-weight: 800;
        }
        .battle-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .battle-actions button {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            max-width: 150px;
            position: relative;
            overflow: hidden;
        }
        .battle-actions button:active:not(:disabled) {
            transform: scale(0.92);
        }
        .battle-actions button .btn-icon {
            display: block;
            font-size: 20px;
        }
        .battle-actions button .btn-label {
            display: block;
            font-size: 11px;
            margin-top: 2px;
        }
        .battle-actions .attack {
            background: linear-gradient(135deg, #d43f3f, #b71c1c);
            color: #fff;
        }
        .battle-actions .attack:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #d43f3f66;
        }
        .battle-actions .defend {
            background: linear-gradient(135deg, #4fc3f7, #0288d1);
            color: #fff;
        }
        .battle-actions .defend:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #4fc3f766;
        }
        .battle-actions .ability {
            background: linear-gradient(135deg, #9b59b6, #6c3483);
            color: #fff;
        }
        .battle-actions .ability:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #9b59b666;
        }
        .battle-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .battle-actions button .cooldown-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #f5c842;
            color: #0b0b1a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .battle-log {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 10px 14px;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .battle-log .log-entry {
            color: #ccccee;
            font-size: 13px;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
            animation: logSlide 0.3s ease;
        }
        @keyframes logSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .battle-log .log-entry.crit {
            color: #ffd700;
            font-weight: 700;
        }
        .battle-log .log-entry.heal {
            color: #51cf66;
        }
        .battle-log .log-entry.damage {
            color: #ff6b6b;
        }
        .battle-log .log-entry.win {
            color: #f5c842;
            font-weight: 700;
            font-size: 16px;
        }
        .battle-log .log-entry.shield {
            color: #4fc3f7;
        }
        .battle-status {
            text-align: center;
            color: #aaaacc;
            font-size: 14px;
            padding: 6px;
            background: #0f0f2a;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .battle-status .waiting {
            color: #f5c842;
        }
        .battle-status .fighting {
            color: #ff6b6b;
            animation: pulse-fight 1s ease-in-out infinite;
        }
        @keyframes pulse-fight {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        .battle-result {
            text-align: center;
            padding: 20px;
            background: #0f0f2a;
            border-radius: 20px;
            border: 2px solid #f5c842;
            animation: scaleIn 0.4s ease;
        }
        .battle-result .winner {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
        }
        .battle-result .trophies {
            font-size: 18px;
            color: #2ecc71;
            margin-top: 4px;
        }
        .battle-result .back-btn {
            background: #f5c842;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }

        // Инициализируем Firebase
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                console.log('✅ Firebase инициализирован!');

        }
        const db = firebase.database();

        // ============================================================
        //  ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUserId = null;
        let isLoggedIn = false;
        let profile = { name: '', gems: 50, coins: 100, brawlers: [{ name: 'Шелли', level: 1 }], trophies: 0, banned: false };
        let currentMainTab = 'brawlers';
        let selectedBrawlerForDetail = null;
        let isSyncing = false;

        let battleState = 'select';
        let selectedBrawler = null;
        let selectedBrawlerStats = null;
        let battleData = null;
        let battleId = null;
        let searchRef = null;
        let botTimeout = null;
        let moveListener = null;
        let battleListener = null;
        let botInterval = null;

        let brawlers = [];
        let shopItems = [];
        let vouchers = [];
        let serverRunning = true;
        let serverSettings = {
            closeTime: null,
            workMessage: 'Добро пожаловать в Brawl Stars!',
            maintenanceMessage: 'Технические работы. Зайдите позже.',
            isClosed: false
        };

        const ALL_BRAWLERS = [
            { name: 'Шелли', icon: '🔫', minDamage: 100, maxDamage: 180, minHp: 400, maxHp: 700 },
            { name: 'Кольт', icon: '🔫', minDamage: 110, maxDamage: 200, minHp: 350, maxHp: 600 },
            { name: 'Булл', icon: '🐂', minDamage: 80, maxDamage: 150, minHp: 550, maxHp: 900 },
            { name: 'Джесси', icon: '⚡', minDamage: 90, maxDamage: 170, minHp: 380, maxHp: 650 },
            { name: 'Брок', icon: '🚀', minDamage: 130, maxDamage: 220, minHp: 300, maxHp: 550 },
            { name: 'Спайк', icon: '🌵', minDamage: 105, maxDamage: 190, minHp: 360, maxHp: 630 },
            { name: 'Леон', icon: '🦎', minDamage: 100, maxDamage: 185, minHp: 340, maxHp: 620 },
            { name: 'Динамайк', icon: '💣', minDamage: 120, maxDamage: 210, minHp: 320, maxHp: 580 }
        ];

        // ============================================================
        //  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getBrawlerStats(brawlerName, level) {
            const b = ALL_BRAWLERS.find(br => br.name === brawlerName);
            if (!b) return { damage: 100, hp: 400 };
            const progress = (level - 1) / 9;
            const damage = Math.round(b.minDamage + (b.maxDamage - b.minDamage) * progress);
            const hp = Math.round(b.minHp + (b.maxHp - b.minHp) * progress);
            return { damage, hp };
        }

        function getUpgradeCost(level) {
            return { coins: level * 10, gems: Math.floor(level / 2) + 1 };
        }

        // ============================================================
        //  АВТОРИЗАЦИЯ
        // ============================================================
        function checkSession() {
            const savedId = localStorage.getItem('brawl_userId');
            if (savedId) {
                currentUserId = savedId;
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadUserProfile();
                loadGameData();
                render();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        }

        window.registerWithUsername = function() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = '❌ Заполните все поля!';
                errorEl.style.display = 'block';
                return;
            }
            if (username.length < 3) {
                errorEl.textContent = '❌ Имя должно быть минимум 3 символа!';
                errorEl.style.display = 'block';
                return;
            }
            if (password.length < 4) {
                errorEl.textContent = '❌ Пароль должен быть минимум 4 символа!';
                errorEl.style.display = 'block';
                return;
            }

            db.ref('usernames/' + username).once('value').then((snap) => {
                if (snap.exists()) {
                    errorEl.textContent = '❌ Это имя уже занято!';
                    errorEl.style.display = 'block';
                    return;
                }

                };

            }).catch(err => {
                errorEl.textContent = '❌ Ошибка сети: ' + err.message;
                errorEl.style.display = 'block';

        window.loginWithUsername = function() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = '❌ Заполните все поля!';
                errorEl.style.display = 'block';
                return;
            }

            db.ref('usernames/' + username).once('value').then((snap) => {
                const uid = snap.val();
                if (!uid) {
                    errorEl.textContent = '❌ Пользователь не найден!';
                    errorEl.style.display = 'block';
                    return;
                }

                db.ref('passwords/' + uid).once('value').then((passSnap) => {
                    const savedPass = passSnap.val();
                    if (savedPass !== password) {
                        errorEl.textContent = '❌ Неверный пароль!';
                        errorEl.style.display = 'block';
                        return;
                    }

                    currentUserId = uid;
                    isLoggedIn = true;
                    localStorage.setItem('brawl_userId', uid);

                    successEl.textContent = '✅ Вход выполнен!';
                    successEl.style.display = 'block';

                    loadUserProfile();
                    setTimeout(() => {
                        document.getElementById('authOverlay').style.display = 'none';
                        render();
                    }, 500);
                });
            }).catch(err => {
                errorEl.textContent = '❌ Ошибка сети: ' + err.message;
                errorEl.style.display = 'block';
            });
        };

        window.logout = function() {
            if (confirm('Выйти из аккаунта?')) {
                localStorage.removeItem('brawl_userId');
                currentUserId = null;
                isLoggedIn = false;
                profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false };
                document.getElementById('authOverlay').style.display = 'flex';
                render();
            }
        };

        function loadUserProfile() {
            if (!currentUserId) return;
            db.ref('players/' + currentUserId).once('value').then((snap) => {
                const data = snap.val();
                if (data) {
                    profile = data;
                    saveLocalProfile();
                    if (profile.banned) {
                        document.getElementById('bannedOverlay').style.display = 'flex';
                    } else {
                        document.getElementById('bannedOverlay').style.display = 'none';
                    }
                }
                render();
            }).catch(err => console.warn('Ошибка загрузки профиля:', err));
        }

        function saveLocalProfile() {
            localStorage.setItem('brawl_profile', JSON.stringify(profile));
        }

        function checkBan() {
            if (profile.banned) {
                document.getElementById('bannedOverlay').style.display = 'flex';
                return true;
            }
            document.getElementById('bannedOverlay').style.display = 'none';
            return false;
        }

        window.createNewAccount = function() {
            document.getElementById('bannedOverlay').style.display = 'none';
            document.getElementById('authOverlay').style.display = 'flex';
            localStorage.removeItem('brawl_userId');
            currentUserId = null;
            isLoggedIn = false;
            profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false };
            render();
        }

        window.appealBan = function() { alert('📩 Заявка на разбан отправлена!'); }

        // ============================================================
        //  ЗАГРУЗКА ДАННЫХ
        // ============================================================
        function loadGameData() {
            db.ref('data').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    brawlers = data.brawlers || [];
                    shopItems = data.shopItems || [];
                    vouchers = data.vouchers || [];
                    if (currentUserId) {
                        db.ref('players/' + currentUserId).once('value').then((snap) => {
                            const p = snap.val();
                            if (p) {
                                profile = p;
                                saveLocalProfile();
                                if (profile.banned) {
                                    document.getElementById('bannedOverlay').style.display = 'flex';
                                } else {
                                    document.getElementById('bannedOverlay').style.display = 'none';
                                }
                            }
                            render();
                        });
                    }
                    render();
                }
            }, (err) => {
                console.warn('Ошибка загрузки данных:', err);
            });
        }

        function loadServerSettings() {
            db.ref('serverSettings').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    serverSettings = data;
                    checkServerStatus();
                    render();
                }
            });
        }

        function checkServerStatus() {
            if (serverSettings.isClosed) {
                serverRunning = false;
                return;
            }
            if (serverSettings.closeTime) {
                const closeDate = new Date(serverSettings.closeTime);
                const now = new Date();
                serverRunning = now < closeDate;
            } else {
                serverRunning = true;
            }
        }

        function listenForNotifications() {
            db.ref('serverNotifications').on('child_added', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    showNotification(data.text, data.duration || 5);
                    db.ref('serverNotifications/' + snapshot.key).remove();
                }
            });
        }

        window.showNotification = function(text, duration = 5) {
            const el = document.getElementById('serverNotification');
            const textEl = document.getElementById('notificationText');
            textEl.textContent = text;
            el.style.display = 'block';
            if (window.notificationTimeout) clearTimeout(window.notificationTimeout);
            window.notificationTimeout = setTimeout(() => {
                el.style.display = 'none';
            }, duration * 1000);
        }

        window.closeNotification = function() {
            const el = document.getElementById('serverNotification');
            el.style.display = 'none';
            if (window.notificationTimeout) { clearTimeout(window.notificationTimeout);
                window.notificationTimeout = null; }
        }

        // ============================================================
        //  СИНХРОНИЗАЦИЯ
        // ============================================================
        function syncToFirebase() {
            if (isSyncing || !currentUserId) return;
            isSyncing = true;
            const data = { brawlers, shopItems, vouchers };
            db.ref('data').set(data)
                .then(() => {
                    if (currentUserId) db.ref('players/' + currentUserId).set(profile);
                    updateCloudUI(true);
                    isSyncing = false;
                })
                .catch(error => { updateCloudUI(false);
                    isSyncing = false; });
        }

        function updateCloudUI(connected) {
            const badge = document.getElementById('connectionBadge');
            badge.className = connected ? 'online-badge' : 'offline-badge';
            badge.textContent = connected ? '🟢 ☁️' : '🔴 ☁️';
            const statusEl = document.getElementById('cloudStatus');
            if (statusEl) {
                statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
                statusEl.className = connected ? 'connected' : 'disconnected';
            }
        }

        function autoSync() {
            saveLocalProfile();
            syncToFirebase();
        }

        // ============================================================
        //  БОЕВАЯ СИСТЕМА - ПОЛНОСТЬЮ ПЕРЕРАБОТАНА
        // ============================================================

        window.upgradeBrawler = function(brawlerName) {
            if (checkBan() || !currentUserId) return;
            const brawler = brawlers.find(b => b.name === brawlerName);
            if (!brawler) return alert('Боец не найден!');
            if (!profile.brawlers) profile.brawlers = [];
            const playerBrawler = profile.brawlers.find(b => b.name === brawlerName);
            if (!playerBrawler) return alert('У вас нет этого бойца!');
            if (playerBrawler.level >= 10) return alert('⚠️ Максимальный уровень!');
            const cost = getUpgradeCost(playerBrawler.level);
            if (profile.coins < cost.coins) return alert(`❌ Нужно ${cost.coins} 🪙`);
            if (profile.gems < cost.gems) return alert(`❌ Нужно ${cost.gems} 💎`);
            profile.coins -= cost.coins;
            profile.gems -= cost.gems;
            playerBrawler.level += 1;
            autoSync();
            render();
            alert(`✅ ${brawlerName} → ${playerBrawler.level} ур.!`);
        }

        // ===== ВЫБОР БОЙЦА ДЛЯ БОЯ =====
        window.selectBrawlerForBattle = function(name) {
            if (!profile.brawlers.some(b => b.name === name)) {
                alert('У вас нет этого бойца!');
                return;
            }
            selectedBrawler = name;
            const b = profile.brawlers.find(b => b.name === name);
            selectedBrawlerStats = getBrawlerStats(name, b.level);
            render();
        }

        // ===== СБРОС БОЯ =====
        window.resetBattle = function() {
            if (searchRef) {
                db.ref('search/' + searchRef.key).remove();
                searchRef = null;
            }
            db.ref('search').off();
            if (botTimeout) clearTimeout(botTimeout);
            if (battleId) {
                db.ref('battles/' + battleId).off();
                if (moveListener) {
                    moveListener.off();
                    moveListener = null;
                }
                if (battleListener) {
                    battleListener.off();
                    battleListener = null;
                }
            }
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
            battleState = 'select';
            battleData = null;
            battleId = null;
            selectedBrawler = null;
            selectedBrawlerStats = null;
            render();
        }

        // ===== ПОИСК БОЯ =====
        window.findBattle = function() {
            if (checkBan() || !currentUserId) return;
            if (!selectedBrawler) {
                alert('Выберите бойца!');
                return;
            }
            const hasBrawler = profile.brawlers && profile.brawlers.some(pb => pb.name === selectedBrawler);
            if (!hasBrawler) {
                alert('⚠️ У вас нет этого бойца!');
                return;
            }

            battleState = 'searching';
            render();

            const searchData = {
                playerId: currentUserId,
                name: profile.name || 'Игрок',
                brawler: selectedBrawler,
                brawlerLevel: profile.brawlers.find(pb => pb.name === selectedBrawler)?.level || 1,
                timestamp: Date.now(),
                status: 'searching'
            };

            searchRef = db.ref('search').push(searchData);

            const searchListener = db.ref('search');
            searchListener.on('value', function(snapshot) {
                const searches = snapshot.val();
                if (!searches) return;

                const other = Object.keys(searches).find(key => {
                    const s = searches[key];
                    return s.playerId !== currentUserId && s.status === 'searching';
                });

                if (other) {
                    const opponent = searches[other];
                    db.ref('search/' + other).remove();
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    searchListener.off();
                    if (botTimeout) clearTimeout(botTimeout);
                    startBattle(opponent);
                }
            });

            botTimeout = setTimeout(() => {
                if (battleState === 'searching') {
                    const botNames = ['🤖 Гром', '🤖 Вспышка', '🤖 Тень', '🤖 Молния', '🤖 Звезда', '🤖 Кошмар'];
                    const botBrawlers = ['Шелли', 'Кольт', 'Булл', 'Джесси', 'Брок', 'Спайк'];
                    const botData = {
                        playerId: 'bot_' + Math.random().toString(36).substring(2, 8),
                        name: botNames[Math.floor(Math.random() * botNames.length)],
                        brawler: botBrawlers[Math.floor(Math.random() * botBrawlers.length)],
                        brawlerLevel: Math.floor(Math.random() * 5) + 1,
                        isBot: true
                    };
                    if (searchRef) db.ref('search/' + searchRef.key).remove();
                    searchListener.off();
                    startBattle(botData);
                }
            }, 5000);
        };

        window.cancelSearch = function() {
            if (searchRef) {
                db.ref('search/' + searchRef.key).remove();
                searchRef = null;
            }
            db.ref('search').off();
            if (botTimeout) clearTimeout(botTimeout);
            battleState = 'select';
            render();
        };

        // ===== ЗАПУСК БОЯ =====
        function startBattle(opponentData) {
            const myLevel = profile.brawlers.find(b => b.name === selectedBrawler)?.level || 1;
            const myStats = getBrawlerStats(selectedBrawler, myLevel);
            const oppStats = getBrawlerStats(opponentData.brawler, opponentData.brawlerLevel || 1);

            battleId = 'battle_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);

            battleData = {
                id: battleId,
                player1Id: currentUserId,
                player1Name: profile.name || 'Игрок',
                player1Brawler: selectedBrawler,
                player1HP: myStats.hp,
                player1MaxHP: myStats.hp,
                player1Damage: myStats.damage,
                player1Power: myLevel,
                player1Cooldown: 0,
                player1Shield: false,
                player2Id: opponentData.playerId,
                player2Name: opponentData.name || 'Противник',
                player2Brawler: opponentData.brawler,
                player2HP: oppStats.hp,
                player2MaxHP: oppStats.hp,
                player2Damage: oppStats.damage,
                player2Power: opponentData.brawlerLevel || 1,
                player2Cooldown: 0,
                player2Shield: false,
                currentTurn: 'player1',
                finished: false,
                winner: null,
                log: ['⚔️ Бой начался!'],
                isBot: opponentData.isBot || false
            };

            // Сохраняем бой в Firebase
            db.ref('battles/' + battleId).set(battleData)
                .then(() => {
                    battleState = 'fighting';
                    render();

                    // СЛУШАЕМ ИЗМЕНЕНИЯ БОЯ
                    battleListener = db.ref('battles/' + battleId);
                    battleListener.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const oldData = battleData ? { ...battleData } : null;
                            battleData = data;
                            if (battleData.finished) {
                                endBattle();
                            }
                            render();
                            // Анимации при изменении HP
                            if (oldData && !battleData.finished) {
                                animateHPChanges(oldData, battleData);
                            }
                        }
                    });

                    // СЛУШАЕМ ХОДЫ
                    moveListener = db.ref('battles/' + battleId + '/moves');
                    moveListener.on('child_added', (snapshot) => {
                        const move = snapshot.val();
                        if (move.playerId === currentUserId) return;
                        if (battleData && !battleData.finished) {
                            processMove(move);
                        }
                    });

                    if (opponentData.isBot) {
                        startBotAI();
                    }
                })
                .catch(err => {
                    alert('Ошибка создания боя: ' + err.message);
                    battleState = 'select';
                    render();
                });
        }

        // ===== АНИМАЦИИ =====
        function animateHPChanges(oldData, newData) {
            if (!oldData || !newData) return;

            if (oldData.player1HP !== newData.player1HP) {
                const diff = newData.player1HP - oldData.player1HP;
                const isHeal = diff > 0;
                showDamageFloat('player1', Math.abs(diff), isHeal);
                if (!isHeal) shakeBrawler('player1');
                else healBrawler('player1');
            }

            if (oldData.player2HP !== newData.player2HP) {
                const diff = newData.player2HP - oldData.player2HP;
                const isHeal = diff > 0;
                showDamageFloat('player2', Math.abs(diff), isHeal);
                if (!isHeal) shakeBrawler('player2');
                else healBrawler('player2');
            }

            if (oldData.player1Shield !== newData.player1Shield && newData.player1Shield) {
                showShieldEffect('player1');
            }
            if (oldData.player2Shield !== newData.player2Shield && newData.player2Shield) {
                showShieldEffect('player2');
            }
        }

        function showDamageFloat(playerId, amount, isHeal) {
            const container = document.querySelector(`.battle-player.${playerId}-container`);
            if (!container) return;
            const el = document.createElement('div');
            el.className = `damage-float ${isHeal ? 'heal-float' : ''}`;
            el.textContent = (isHeal ? '+' : '-') + amount;
            container.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function shakeBrawler(playerId) {
            const icon = document.querySelector(`.battle-player.${playerId}-container .brawler-icon`);
            if (icon) {
                icon.classList.remove('hit');
                void icon.offsetWidth;
                icon.classList.add('hit');
                setTimeout(() => icon.classList.remove('hit'), 500);
            }
        }

        function healBrawler(playerId) {
            const icon = document.querySelector(`.battle-player.${playerId}-container .brawler-icon`);
            if (icon) {
                icon.classList.remove('heal');
                void icon.offsetWidth;
                icon.classList.add('heal');
                setTimeout(() => icon.classList.remove('heal'), 600);
            }
        }

        function showShieldEffect(playerId) {
            const icon = document.querySelector(`.battle-player.${playerId}-container .brawler-icon`);
            if (icon) {
                icon.classList.remove('shield');
                void icon.offsetWidth;
                icon.classList.add('shield');
                setTimeout(() => icon.classList.remove('shield'), 500);
            }
        }

        // ===== БОТ =====
        function startBotAI() {
            if (botInterval) clearInterval(botInterval);
            botInterval = setInterval(() => {
                if (!battleData || battleData.finished) {
                    clearInterval(botInterval);
                    botInterval = null;
                    return;
                }

                const isBotTurn = (battleData.currentTurn === 'player1' && battleData.player1Id.startsWith('bot_')) ||
                    (battleData.currentTurn === 'player2' && battleData.player2Id.startsWith('bot_'));

                if (!isBotTurn) return;

                const isPlayer1Bot = battleData.currentTurn === 'player1';
                const botHP = isPlayer1Bot ? battleData.player1HP : battleData.player2HP;
                const botMaxHP = isPlayer1Bot ? battleData.player1MaxHP : battleData.player2MaxHP;
                const botHPPercent = botHP / botMaxHP;
                const botCooldown = isPlayer1Bot ? battleData.player1Cooldown : battleData.player2Cooldown;

                let action;
                if (botHPPercent < 0.25) {
                    action = 'defend';
                } else if (botCooldown <= 0 && Math.random() < 0.35) {
                    action = 'ability';
                } else {
                    action = Math.random() < 0.65 ? 'attack' : 'defend';
                }

                const move = {
                    action: action,
                    playerId: battleData.currentTurn === 'player1' ? battleData.player1Id : battleData.player2Id,
                    timestamp: Date.now()
                };
                db.ref('battles/' + battleId + '/moves').push(move);
            }, 1200);
        }

        // ===== ОБРАБОТКА ХОДА =====
        function processMove(move) {
            if (!battleData || battleData.finished) return;

            const isPlayer1 = battleData.currentTurn === 'player1';
            const isPlayerTurn = isPlayer1 ? battleData.player1Id === move.playerId : battleData.player2Id === move.playerId;
            if (!isPlayerTurn) return;

            // Обновляем кулдауны
            if (battleData.player1Cooldown > 0) battleData.player1Cooldown--;
            if (battleData.player2Cooldown > 0) battleData.player2Cooldown--;

            const attackerName = isPlayer1 ? battleData.player1Name : battleData.player2Name;
            const defenderName = isPlayer1 ? battleData.player2Name : battleData.player1Name;
            const attackerDamage = isPlayer1 ? battleData.player1Damage : battleData.player2Damage;
            let damage = 0;
            let isCrit = false;

            if (move.action === 'attack') {
                const variance = 0.8 + Math.random() * 0.4;
                isCrit = Math.random() < 0.25;
                damage = Math.round(attackerDamage * variance * (isCrit ? 1.5 : 1));

                // Проверка щита
                const hasShield = isPlayer1 ? battleData.player2Shield : battleData.player1Shield;
                if (hasShield) {
                    damage = Math.round(damage * 0.5);
                    if (isPlayer1) battleData.player2Shield = false;
                    else battleData.player1Shield = false;
                    battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
                }

                battleData.log.push(`💥 ${attackerName} нанёс ${damage} урона ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

                if (isPlayer1) {
                    battleData.player2HP = Math.max(0, battleData.player2HP - damage);
                } else {
                    battleData.player1HP = Math.max(0, battleData.player1HP - damage);
                }

            } else if (move.action === 'defend') {
                const heal = Math.round((isPlayer1 ? battleData.player1MaxHP : battleData.player2MaxHP) * 0.2);
                if (isPlayer1) {
                    battleData.player1HP = Math.min(battleData.player1MaxHP, battleData.player1HP + heal);
                    battleData.player1Shield = true;
                } else {
                    battleData.player2HP = Math.min(battleData.player2MaxHP, battleData.player2HP + heal);
                    battleData.player2Shield = true;
                }
                battleData.log.push(`🛡️ ${attackerName} восстановил ${heal} HP и поставил щит!`);

            } else if (move.action === 'ability') {
                const cooldown = isPlayer1 ? battleData.player1Cooldown : battleData.player2Cooldown;
                if (cooldown > 0) {
                    battleData.log.push(`⏳ ${attackerName} — способность на перезарядке!`);
                } else {
                    // Устанавливаем кулдаун
                    if (isPlayer1) battleData.player1Cooldown = 2;
                    else battleData.player2Cooldown = 2;

                    const variance = 0.9 + Math.random() * 0.2;
                    isCrit = Math.random() < 0.3;
                    damage = Math.round(attackerDamage * 2.5 * variance * (isCrit ? 1.5 : 1));

                    // Проверка щита
                    const hasShield = isPlayer1 ? battleData.player2Shield : battleData.player1Shield;
                    if (hasShield) {
                        damage = Math.round(damage * 0.5);
                        if (isPlayer1) battleData.player2Shield = false;
                        else battleData.player1Shield = false;
                        battleData.log.push(`🛡️ ${defenderName} заблокировал часть урона!`);
                    }

                    battleData.log.push(`⚡ ${attackerName} нанёс СУПЕР-УДАР (${damage}) ${defenderName}${isCrit ? ' 💥 КРИТ!' : ''}`);

                    if (isPlayer1) {
                        battleData.player2HP = Math.max(0, battleData.player2HP - damage);
                    } else {
                        battleData.player1HP = Math.max(0, battleData.player1HP - damage);
                    }
                }
            }

            // Проверяем окончание боя
            if (battleData.player1HP <= 0 || battleData.player2HP <= 0) {
                battleData.finished = true;
                battleData.winner = battleData.player1HP > 0 ? 'player1' : 'player2';
                const winnerName = battleData.winner === 'player1' ? battleData.player1Name : battleData.player2Name;
                battleData.log.push(`🏆 ${winnerName} ПОБЕДИЛ!`);

                if ((battleData.winner === 'player1' && battleData.player1Id === currentUserId) ||
                    (battleData.winner === 'player2' && battleData.player2Id === currentUserId)) {
                    profile.trophies = (profile.trophies || 0) + 15;
                    autoSync();
                    setTimeout(() => alert('🏆 ПОБЕДА! +15 кубков!'), 300);
                } else {
                    setTimeout(() => alert('💀 Поражение... Попробуйте снова!'), 300);
                }

                db.ref('battles/' + battleId).set(battleData);
                if (botInterval) { clearInterval(botInterval);
                    botInterval = null; }
                render();
                return;
            }

            // Меняем ход
            battleData.currentTurn = isPlayer1 ? 'player2' : 'player1';
            db.ref('battles/' + battleId).set(battleData);
            render();
        }

        // ===== ЗАВЕРШЕНИЕ БОЯ =====
        function endBattle() {
            battleState = 'result';
            if (battleListener) {
                battleListener.off();
                battleListener = null;
            }
            if (moveListener) {
                moveListener.off();
                moveListener = null;
            }
            if (botInterval) { clearInterval(botInterval);
                botInterval = null; }
            render();
        }

        // ===== ХОД ИГРОКА =====
        window.makeMove = function(action) {
            if (!battleData) {
                alert('❌ Нет данных о бое!');
                return;
            }
            if (battleData.finished) {
                alert('⛔ Бой уже закончен!');
                return;
            }

            const isMyTurn = (battleData.currentTurn === 'player1' && battleData.player1Id === currentUserId) ||
                (battleData.currentTurn === 'player2' && battleData.player2Id === currentUserId);

            if (!isMyTurn) {
                alert('⏳ Сейчас не ваш ход!');
                return;
            }

            if (action === 'ability') {
                const cooldown = battleData.currentTurn === 'player1' ? battleData.player1Cooldown : battleData
                    .player2Cooldown;
                if (cooldown > 0) {
                    alert(`⏳ Перезарядка: ${cooldown} ходов`);
                    return;
                }
            }

            // Блокируем кнопки
            document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = true);

            const move = { action: action, playerId: currentUserId, timestamp: Date.now() };

            db.ref('battles/' + battleId + '/moves').push(move)
                .then(() => {
                    setTimeout(() => {
                        document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = false);
                    }, 500);
                })
                .catch((err) => {
                    alert('Ошибка отправки хода!');
                    document.querySelectorAll('.battle-actions button').forEach(b => b.disabled = false);
                });
        };

        // ============================================================
        //  МАГАЗИН
        // ============================================================
        window.buyItem = function(name) {
            if (checkBan() || !currentUserId) return;
            const item = shopItems.find(i => i.name === name);
            if (!item) return alert('Товар не найден!');
            const isFree = item.free === true;

            if (item.category === 'brawler') {
                if (profile.brawlers && profile.brawlers.some(pb => pb.name === item.brawlerName)) {
                    return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
                }
                if (!isFree && profile.gems < item.cost) {
                    return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
                }
                if (!isFree) { profile.gems -= item.cost; }
                if (!profile.brawlers) profile.brawlers = [];
                profile.brawlers.push({ name: item.brawlerName, level: 1 });
                alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
                autoSync();
                render();
            } else if (item.category === 'resources') {
                if (item.resourceType === 'gems') {
                    profile.gems += item.amount;
                    alert(`✅ Вы получили ${item.amount} 💎 Гемов${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
                } else if (item.resourceType === 'coins') {
                    profile.coins += item.amount;
                    alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
                }
                autoSync();
                render();
            } else {
                alert(`✅ Вы купили: ${name}!`);
            }
        }

        window.activateVoucher = function() {
            const codeInput = document.getElementById('voucherActivateInput');
            const code = codeInput.value.trim().toUpperCase();
            if (!code) return alert('Введите код ваучера!');

            const voucher = vouchers.find(v => v.code === code);
            if (!voucher) return alert('❌ Неверный код!');
            if (voucher.maxUses <= 0) return alert('❌ Этот ваучер уже использован!');
            if (voucher.usedBy && voucher.usedBy.includes(currentUserId)) return alert('⚠️ Вы уже активировали этот ваучер!');

            if (!voucher.usedBy) voucher.usedBy = [];
            voucher.usedBy.push(currentUserId);
            voucher.maxUses -= 1;
            if (voucher.maxUses <= 0) voucher.used = true;

            if (voucher.rewardType === 'gems') {
                profile.gems += voucher.amount;
                alert(`✅ Вы получили ${voucher.amount} 💎 Гемов!`);
            } else if (voucher.rewardType === 'coins') {
                profile.coins += voucher.amount;
                alert(`✅ Вы получили ${voucher.amount} 🪙 Монет!`);
            } else if (voucher.rewardType === 'brawler') {
                if (profile.brawlers && profile.brawlers.some(pb => pb.name === voucher.brawlerName)) {
                    alert(`⚠️ У вас уже есть боец ${voucher.brawlerName}!`);
                    return;
                }
                if (!profile.brawlers) profile.brawlers = [];
                profile.brawlers.push({ name: voucher.brawlerName, level: 1 });
                alert(`✅ Вы получили бойца ${voucher.brawlerName}!`);
            }

            autoSync();
            render();
            codeInput.value = '';
            alert(`🎉 Ваучер активирован! Осталось ${voucher.maxUses} активаций.`);
        }

        // ============================================================
        //  ЧАТ
        // ============================================================
        window.sendMessage = function() {
            if (checkBan() || !currentUserId) return;
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            db.ref('chat').push({ playerId: currentUserId, name: profile.name || 'Аноним', text: text, timestamp: Date
                    .now() });
            input.value = '';
        }

        function loadChat() {
            db.ref('chat').orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
                const messages = snapshot.val();
                const container = document.getElementById('chatMessages');
                if (!container) return;
                if (!messages) {
                    container.innerHTML =
                        `<div class="chat-empty"><span>💬</span>Сообщений пока нет<br><span style="font-size:12px;color:#555577;">Будь первым!</span></div>`;
                    return;
                }
                let html = '';
                const msgs = Object.values(messages).reverse();
                msgs.forEach(msg => {
                    const isOwn = msg.playerId === currentUserId;
                    const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit',
                        minute: '2-digit' });
                    html +=
                        `<div class="chat-message ${isOwn ? 'own' : ''}"><div class="msg-header"><span class="msg-name">${msg.name || 'Аноним'}</span><span class="msg-time">${time}</span></div><div class="msg-text">${msg.text}</div></div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }

        // ============================================================
        //  UI
        // ============================================================
        const content = document.getElementById('content');
        const menuBtns = document.querySelectorAll('.menu button');

        function render() {
            if (!isLoggedIn || !currentUserId) {
                document.getElementById('authOverlay').style.display = 'flex';
                content.innerHTML =
                    `<div class="empty-state"><span>🔒</span>Авторизуйтесь для продолжения</div>`;
                menuBtns.forEach(b => b.classList.remove('active'));
                return;
            }

            if (profile.banned) {
                document.getElementById('bannedOverlay').style.display = 'flex';
                content.innerHTML = `<div class="empty-state"><span>🚫</span>Вы забанены</div>`;
                menuBtns.forEach(b => b.classList.remove('active'));
                const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === currentMainTab);
                if (activeBtn) activeBtn.classList.add('active');
                return;
            } else {
                document.getElementById('bannedOverlay').style.display = 'none';
            }

            const tab = currentMainTab;
            const cloudHtml =
                `<div class="cloud-panel"><div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div></div>`;

            checkServerStatus();

            if (!serverRunning) {
                content.innerHTML = cloudHtml +
                    `<div class="maintenance"><span>🔧</span><h2>${serverSettings.maintenanceMessage || 'Технические работы ведутся'}</h2><p>${serverSettings.closeTime ? 'Сервер будет доступен после ' + new Date(serverSettings.closeTime).toLocaleString() : 'Сервер временно недоступен'}</p></div>`;
                menuBtns.forEach(b => b.classList.remove('active'));
                const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
                if (activeBtn) activeBtn.classList.add('active');
                return;
            }

            if (tab === 'battle') { renderBattle(cloudHtml); return; }
            if (tab === 'brawlers') { renderBrawlers(cloudHtml); return; }
            if (tab === 'shop') { renderShop(cloudHtml); return; }
            if (tab === 'profile') { renderProfile(cloudHtml); return; }

            if (battleState === 'fighting' && battleData) {

                    html += `
                            <div class="brawler-item" onclick="openBrawlerDetail('${b.name}')">
                                ${b.image ? `<img src="${b.image}">` : icon}
                                ${b.name}
                                <span style="font-size:11px;color:#f5c842;background:#f5c84222;padding:0 10px;border-radius:40px;margin-left:auto;">${owned ? '⚡'+level : '🔒'}</span>
                            </div>
                        `;
                });
                html += `</div>`;
            }
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="brawlers"]').classList.add('active');
        }

        window.openBrawlerDetail = function(name) { selectedBrawlerForDetail = name;
            render(); }
        window.closeBrawlerDetail = function() { selectedBrawlerForDetail = null;
            render(); }

        // ===== МАГАЗИН =====
        function renderShop(cloudHtml) {
            let html = cloudHtml;
            html += `
                    <div class="form-card">
                        <h3 style="color:#f5c842;margin-bottom:8px;">🎟️ Активировать ваучер</h3>
                        <div style="display:flex;gap:8px;">
                            <input type="text" id="voucherActivateInput" placeholder="Введите код" style="flex:1;">
                            <button class="submit-btn" onclick="activateVoucher()">Активировать</button>
                        </div>
                    </div>
                `;

            if (!shopItems.length) {
                html += `<div class="empty-state"><span>🛒</span>Магазин пуст</div>`;
            } else {
                html += `<div class="shop-grid">`;
                shopItems.forEach(item => {
                    const isOwned = item.category === 'brawler' && profile.brawlers && profile.brawlers.some(pb =>
                        pb.name === item.brawlerName);
                    const isFree = item.free === true;
                    html += `
                            <div class="shop-item">
                                ${item.image ? `<img src="${item.image}">` : `<div style="width:50px;height:50px;border-radius:40px;background:#1a1a3a;display:flex;align-items:center;justify-content:center;font-size:24px;">📦</div>`}
                                <div class="info">
                                    <div class="name">${item.name} ${isOwned ? '✅' : ''} ${isFree ? '🎁' : ''}</div>
                                    <div class="desc">${item.desc || ''}</div>
                                    <div class="reward">🎁 ${item.reward || 'Награда'}</div>
                                    ${item.category === 'brawler' ? `<div style="font-size:11px;color:#4fc3f7;">👤 ${item.brawlerName} • ${isFree ? '🎁 БЕСПЛАТНО' : '💎 ' + item.cost}</div>` : ''}
                                    ${item.category === 'resources' ? `<div style="font-size:11px;color:#ffd54f;">📦 ${item.resourceType === 'gems' ? '💎' : '🪙'} ${item.amount} ${isFree ? '🎁 БЕСПЛАТНО' : ''}</div>` : ''}
                                </div>
                                <button class="buy-btn" onclick="buyItem('${item.name}')" ${isOwned ? 'disabled style="opacity:0.5;"' : ''}>
                                    ${isOwned ? '✅' : (isFree ? '🎁 Получить' : 'Купить')}
                                </button>
                            </div>
                        `;
                });
                html += `</div>`;
            }
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="shop"]').classList.add('active');
        }

        // ===== ПРОФИЛЬ =====
        function renderProfile(cloudHtml) {
            content.innerHTML = cloudHtml +
                `
                    <div class="profile-card">
                        <span class="avatar">👤</span>
                        <div class="nick">${profile.name || 'Игрок'}</div>
                        <div style="font-size:12px;color:#555577;margin-bottom:8px;">ID: ${currentUserId?.slice(0,12)}</div>
                        <div class="stats">
                            <div class="stat-item"><div class="value gems">${profile.gems || 0}</div><div class="label">💎 Гемы</div></div>
                            <div class="stat-item"><div class="value coins">${profile.coins || 0}</div><div class="label">🪙 Монеты</div></div>
                            <div class="stat-item"><div class="value trophies">${profile.trophies || 0}</div><div class="label">🏆 Кубки</div></div>
                        </div>
                        <div style="margin-top:12px;color:#888;font-size:13px;">
                            Бойцы: ${profile.brawlers?.map(b => `${b.name}(${b.level}⚡)`).join(', ') || 'нет'}
                        </div>
                        <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                    </div>
                `;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="profile"]').classList.add('active');
        }

        // ===== ЧАТ =====
        function renderChat(cloudHtml) {
            content.innerHTML = cloudHtml +
                `
                    <div class="chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-empty"><span>💬</span>Загрузка сообщений...</div>
                        </div>
                        <div class="chat-input-row">
                            <input type="text" id="chatInput" placeholder="Введите сообщение..." maxlength="200" />
                            <button onclick="sendMessage()">📤</button>
                        </div>
                    </div>
                `;
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="chat"]').classList.add('active');
            loadChat();
        }

        // ============================================================
        //  ПРИВЯЗКА КНОПОК
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const newAccountBtn = document.getElementById('newAccountBtn');
            const appealBtn = document.getElementById('appealBtn');

            if (loginBtn) loginBtn.addEventListener('click', loginWithUsername);
            if (registerBtn) registerBtn.addEventListener('click', registerWithUsername);
            if (newAccountBtn) newAccountBtn.addEventListener('click', createNewAccount);
            if (appealBtn) appealBtn.addEventListener('click', appealBan);

            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { sendMessage(); }
                });
            }

            menuBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    if (tab !== 'brawlers') { selectedBrawlerForDetail = null; }
                    if (tab !== 'battle' && battleState !== 'select') {
                        if (searchRef) {
                            db.ref('search/' + searchRef.key).remove();
                            searchRef = null;
                        }
                        db.ref('search').off();
                        if (botTimeout) clearTimeout(botTimeout);
                        if (battleId) {
                            db.ref('battles/' + battleId).off();
                            if (moveListener) {
                                moveListener.off();
                                moveListener = null;
                            }
                            if (battleListener) {
                                battleListener.off();
                                battleListener = null;
                            }
                        }
                        if (botInterval) {
                            clearInterval(botInterval);
                            botInterval = null;
                        }
                        battleState = 'select';
                        battleData = null;
                        battleId = null;
                        selectedBrawler = null;
                        selectedBrawlerStats = null;
                    }
                    currentMainTab = tab;
                    render();
                });
            });
        });

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        loadServerSettings();
        loadGameData();
        listenForNotifications();
        checkSession();
        render();

        console.log('🚀 Brawl Stars запущен!');
        console.log('🔥 Firebase статус:', firebase.apps.length ? '✅ Подключен' : '❌ Не подключен');
    </script>
</body>
</html>
