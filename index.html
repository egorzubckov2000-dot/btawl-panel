<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Brawl Stars</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #14142e;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        @media (min-width:600px) {
            .app {
                max-width: 500px;
                height: 95vh;
                border-radius: 40px;
                border: 1px solid #f5c84255;
                box-shadow: 0 0 60px #f5c84222;
                padding: 20px 18px;
            }
        }
        @media (max-width:430px) {
            .app {
                padding: 12px 10px;
                height: 100vh;
                max-height: 860px;
            }
            .header h1 {
                font-size: 22px;
            }
            .menu button {
                font-size: 11px;
                padding: 8px 4px;
            }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .header h1 {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .header span {
            background: #f5c842;
            color: #0b0b1a;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 12px;
        }
        .online-badge {
            background: #2ecc71;
            color: #0b0b1a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse-badge 2s ease-in-out infinite;
        }
        .online-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #0b0b1a;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes pulse-badge {
            0%,
            100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .offline-badge {
            background: #d43f3f;
            color: #fff;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 10px;
        }
        #content {
            flex: 1;
            background: #1a1a3a;
            border-radius: 24px;
            padding: 16px 12px;
            border: 1px solid #f5c84233;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        @media (max-width:430px) {
            #content {
                padding: 12px 10px;
                border-radius: 18px;
            }
        }
        .cloud-panel {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border: 1px solid #f5c84244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cloud-panel .status {
            color: #aaaacc;
            font-size: 12px;
        }
        .cloud-panel .status .connected {
            color: #2ecc71;
            font-weight: 700;
        }
        .menu {
            display: flex;
            justify-content: space-around;
            background: #0f0f28;
            border-radius: 60px;
            padding: 6px 4px;
            border: 1px solid #f5c84233;
            flex-shrink: 0;
            margin-top: 10px;
            gap: 2px;
        }
        .menu button {
            background: transparent;
            border: none;
            color: #777799;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 6px;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.3s ease;
        }
        .menu button.active {
            background: #f5c842;
            color: #0b0b1a;
            box-shadow: 0 0 24px #f5c84277;
            transform: scale(1.05);
        }
        .menu button:hover:not(.active) {
            color: #fff;
            transform: scale(1.05);
        }
        .empty-state {
            color: #8888aa;
            text-align: center;
            padding: 30px 0;
            font-size: 18px;
            margin: auto 0;
        }
        .empty-state span {
            display: block;
            font-size: 52px;
            margin-bottom: 12px;
            animation: bounce-icon 2s ease-in-out infinite;
        }
        @keyframes bounce-icon {
            0%,
            100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ===== ВХОД ===== */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }
        .auth-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #f5c842;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .auth-box h2 {
            color: #f5c842;
            font-size: 24px;
            margin-bottom: 4px;
        }
        .auth-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .auth-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #555577;
            background: #0f0f2a;
            color: #eee;
            font-size: 15px;
            outline: none;
            text-align: center;
            transition: 0.3s ease;
            margin-bottom: 10px;
        }
        .auth-box input:focus {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84222;
        }
        .auth-box .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .auth-box .btn-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .auth-box .btn-group .login-btn {
            background: #f5c842;
            color: #0b0b1a;
        }
        .auth-box .btn-group .login-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .auth-box .btn-group .register-btn {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .auth-box .btn-group .register-btn:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }
        .auth-box .error {
            color: #d43f3f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            animation: shake 0.4s ease;
        }
        .auth-box .success {
            color: #2ecc71;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        @keyframes shake {
            0%,
            100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ===== БАН ===== */
        .banned-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: fadeIn 0.5s ease;
        }
        .banned-box {
            background: #1a1a3a;
            padding: 30px 24px;
            border-radius: 30px;
            border: 2px solid #d43f3f;
            text-align: center;
            max-width: 340px;
            width: 90%;
            animation: scaleIn 0.4s ease;
        }
        .banned-box .ban-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 8px;
        }
        .banned-box h2 {
            color: #d43f3f;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .banned-box p {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .banned-box .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .banned-box .btn-group button {
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .banned-box .btn-group .new-account {
            background: #f5c842;
            color: #0b0b1a;
        }
        .banned-box .btn-group .new-account:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px #f5c84255;
        }
        .banned-box .btn-group .appeal {
            background: transparent;
            color: #4fc3f7;
            border: 2px solid #4fc3f7;
        }
        .banned-box .btn-group .appeal:hover {
            transform: scale(1.03);
            background: #4fc3f722;
        }

        /* ===== БОЙ ===== */
        .pvp-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 10px;
        }
        .pvp-search {
            text-align: center;
            padding: 30px 20px;
            background: #0f0f2a;
            border-radius: 24px;
            border: 2px solid #f5c84244;
            animation: pulse-search 1.5s ease-in-out infinite;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @keyframes pulse-search {
            0%,
            100% { border-color: #f5c84244; }
            50% { border-color: #f5c842; }
        }
        .pvp-search .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #555577;
            border-top: 4px solid #f5c842;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        .pvp-search h3 {
            color: #f5c842;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .pvp-search p {
            color: #8888aa;
            font-size: 14px;
        }
        .pvp-search .cancel-btn {
            margin-top: 16px;
            background: #555;
            border: none;
            padding: 10px 30px;
            border-radius: 40px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .pvp-search .cancel-btn:hover {
            transform: scale(1.05);
            background: #777;
        }
        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-height: 100px;
        }
        .battle-player {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            flex: 1;
            border: 2px solid #555577;
            transition: 0.3s ease;
        }
        .battle-player.active {
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84244;
        }
        .battle-player .name {
            color: #eee;
            font-weight: 700;
            font-size: 16px;
        }
        .battle-player .hp {
            color: #ff6b6b;
            font-size: 14px;
            font-weight: 700;
        }
        .battle-player .brawler-icon {
            font-size: 48px;
            display: block;
            margin: 4px 0;
        }
        .battle-player .power {
            color: #f5c842;
            font-size: 12px;
            font-weight: 700;
        }
        .battle-vs {
            color: #f5c842;
            font-size: 24px;
            font-weight: 800;
        }
        .battle-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }
        .battle-actions button {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            flex: 1;
            max-width: 150px;
        }
        .battle-actions .attack {
            background: #d43f3f;
            color: #fff;
        }
        .battle-actions .attack:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #d43f3f66;
        }
        .battle-actions .defend {
            background: #4fc3f7;
            color: #0b0b1a;
        }
        .battle-actions .defend:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #4fc3f766;
        }
        .battle-actions button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .battle-log {
            background: #0f0f2a;
            border-radius: 16px;
            padding: 10px 14px;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .battle-log .log-entry {
            color: #ccccee;
            font-size: 13px;
            padding: 2px 0;
            border-bottom: 1px solid #1a1a3a;
        }
        .battle-status {
            text-align: center;
            color: #aaaacc;
            font-size: 14px;
            padding: 6px;
            background: #0f0f2a;
            border-radius: 12px;
        }
        .battle-status .waiting {
            color: #f5c842;
        }
        .battle-status .fighting {
            color: #ff6b6b;
            animation: pulse-fight 1s ease-in-out infinite;
        }
        @keyframes pulse-fight {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .battle-result {
            text-align: center;
            padding: 20px;
            background: #0f0f2a;
            border-radius: 20px;
            border: 2px solid #f5c842;
            animation: scaleIn 0.4s ease;
        }
        .battle-result .winner {
            font-size: 32px;
            font-weight: 800;
            color: #f5c842;
        }
        .battle-result .trophies {
            font-size: 18px;
            color: #2ecc71;
            margin-top: 4px;
        }
        .battle-result .back-btn {
            background: #f5c842;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .battle-result .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== БОЙЦЫ ===== */
        .brawler-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .brawler-item {
            background: #0f0f2a;
            padding: 10px 14px;
            border-radius: 16px;
            border-left: 4px solid #f5c842;
            color: #eee;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .brawler-item:hover {
            transform: scale(1.02);
            border-left-color: #f5c84288;
        }
        .brawler-item img {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            animation: scaleIn 0.3s ease;
            margin-top: 8px;
            text-align: center;
        }
        .brawler-detail .avatar {
            font-size: 80px;
            display: block;
            margin-bottom: 4px;
        }
        .brawler-detail .avatar img {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            object-fit: cover;
        }
        .brawler-detail .name {
            color: #f5c842;
            font-size: 26px;
            font-weight: 800;
        }
        .brawler-detail .rarity {
            font-size: 14px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 18px;
            border-radius: 40px;
            display: inline-block;
            margin: 4px 0 12px;
        }
        .brawler-detail .desc {
            color: #ccccee;
            font-size: 15px;
            margin-bottom: 16px;
        }
        .brawler-detail .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .brawler-detail .stat-box {
            background: #1a1a3a;
            border-radius: 16px;
            padding: 10px 8px;
            border: 1px solid #555577;
        }
        .brawler-detail .stat-box .label {
            font-size: 11px;
            color: #8888aa;
        }
        .brawler-detail .stat-box .value {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
        }
        .brawler-detail .stat-box .value.damage {
            color: #ff6b6b;
        }
        .brawler-detail .stat-box .value.hp {
            color: #51cf66;
        }
        .brawler-detail .stat-box .value.power {
            color: #f5c842;
        }
        .brawler-detail .status-badge {
            font-size: 14px;
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            font-weight: 700;
        }
        .brawler-detail .status-badge.owned {
            background: #2ecc71;
            color: #0b0b1a;
        }
        .brawler-detail .status-badge.locked {
            background: #d43f3f;
            color: #fff;
        }
        .brawler-detail .power-display {
            margin-top: 8px;
            padding: 8px;
            background: #1a1a3a;
            border-radius: 16px;
            border: 1px solid #555577;
        }
        .brawler-detail .power-display .level {
            color: #f5c842;
            font-weight: 700;
        }
        .brawler-detail .upgrade-btn {
            background: #f5c842;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 8px;
            font-size: 14px;
        }
        .brawler-detail .upgrade-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #f5c84255;
        }
        .brawler-detail .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .brawler-detail .back-btn {
            background: #555577;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 12px;
            font-size: 14px;
        }
        .brawler-detail .back-btn:hover {
            transform: scale(1.05);
            background: #777799;
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shop-item {
            background: #0f0f2a;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #555577;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: 0.3s ease;
        }
        .shop-item:hover {
            transform: scale(1.02);
            border-color: #f5c842;
            box-shadow: 0 0 30px #f5c84211;
        }
        .shop-item img {
            width: 50px;
            height: 50px;
            border-radius: 40px;
            object-fit: cover;
            background: #1a1a3a;
            border: 2px solid #f5c84255;
        }
        .shop-item .info {
            flex: 1;
        }
        .shop-item .info .name {
            color: #eee;
            font-weight: 700;
            font-size: 15px;
        }
        .shop-item .info .desc {
            color: #8888aa;
            font-size: 12px;
        }
        .shop-item .info .reward {
            font-size: 11px;
            color: #f5c842;
            background: #f5c84222;
            padding: 2px 10px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
        }
        .shop-item .buy-btn {
            background: #f5c842;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b1a;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 13px;
            flex-shrink: 0;
        }
        .shop-item .buy-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px #f5c84255;
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: #0f0f2a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #f5c84233;
            text-align: center;
        }
        .profile-card .avatar {
            font-size: 64px;
            margin-bottom: 8px;
            display: block;
        }
        .profile-card .nick {
            color: #f5c842;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-card .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .profile-card .stat-item {
            text-align: center;
        }
        .profile-card .stat-item .value {
            font-size: 24px;
            font-weight: 800;
            color: #f5c842;
        }

    let isSyncing = false;
    let selectedBrawlerForDetail = null;
    let battleData = null;
    let battleId = null;
    let searchRef = null;
    let searchTimeout = null;

    let serverSettings = {
        closeTime: null,
        workMessage: 'Добро пожаловать в Brawl Stars!',
        maintenanceMessage: 'Технические работы. Зайдите позже.',
        isClosed: false
    };

    let currentPlayerId = localStorage.getItem('brawl_playerId');
    let isLoggedIn = false;
    let profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false, password: '' };

    // ============================================================
    //  АВТОРИЗАЦИЯ
    // ============================================================
    function register() {
        const nick = document.getElementById('authNick').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const errorEl = document.getElementById('authError');
        const successEl = document.getElementById('authSuccess');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!nick || !pass) {
            errorEl.textContent = '❌ Заполните все поля!';
            errorEl.style.display = 'block';
            return;
        }
        if (nick.length < 3) {
            errorEl.textContent = '❌ Ник должен быть минимум 3 символа!';
            errorEl.style.display = 'block';
            return;
        }
        if (pass.length < 4) {
            errorEl.textContent = '❌ Пароль должен быть минимум 4 символа!';
            errorEl.style.display = 'block';
            return;
        }

        db.ref('players').orderByChild('name').equalTo(nick).once('value').then((snap) => {
            if (snap.exists()) {
                errorEl.textContent = '❌ Этот ник уже занят!';
                errorEl.style.display = 'block';
                return;
            }

            const playerId = 'player_' + Math.random().toString(36).substring(2, 10);
            const newProfile = {
                name: nick,
                password: pass,
                gems: 50,
                coins: 100,
                brawlers: [{ name: 'Шелли', level: 1 }],
                trophies: 0,
                banned: false,
                createdAt: Date.now()
            };

            db.ref('players/' + playerId).set(newProfile).then(() => {
                successEl.textContent = '✅ Аккаунт создан! Войдите.';
                successEl.style.display = 'block';
                document.getElementById('authNick').value = '';
                document.getElementById('authPassword').value = '';
            });
        });
    }

    function login() {
        const nick = document.getElementById('authNick').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        const errorEl = document.getElementById('authError');
        const successEl = document.getElementById('authSuccess');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!nick || !pass) {
            errorEl.textContent = '❌ Заполните все поля!';
            errorEl.style.display = 'block';
            return;
        }

        db.ref('players').orderByChild('name').equalTo(nick).once('value').then((snap) => {
            if (!snap.exists()) {
                errorEl.textContent = '❌ Пользователь не найден!';
                errorEl.style.display = 'block';
                return;
            }

            const data = snap.val();
            const playerId = Object.keys(data)[0];
            const player = data[playerId];

            if (player.password !== pass) {
                errorEl.textContent = '❌ Неверный пароль!';
                errorEl.style.display = 'block';
                return;
            }

            if (player.banned) {
                errorEl.textContent = '❌ Вы забанены!';
                errorEl.style.display = 'block';
                document.getElementById('bannedOverlay').style.display = 'flex';
                return;
            }

            currentPlayerId = playerId;
            localStorage.setItem('brawl_playerId', playerId);
            profile = player;
            isLoggedIn = true;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('bannedOverlay').style.display = 'none';
            successEl.textContent = '✅ Вход выполнен!';
            successEl.style.display = 'block';

            loadGameData();
            render();
        });
    }

    function logout() {
        if (confirm('Выйти из аккаунта?')) {
            localStorage.removeItem('brawl_playerId');
            currentPlayerId = null;
            isLoggedIn = false;
            profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false, password: '' };
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('authSubtitle').textContent = 'Войдите или зарегистрируйтесь';
            render();
        }
    }

    // ============================================================
    //  НАСТРОЙКИ СЕРВЕРА
    // ============================================================
    function loadServerSettings() {
        db.ref('serverSettings').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                serverSettings = data;
                checkServerStatus();
                render();
            }
        });
    }

    function checkServerStatus() {
        if (serverSettings.isClosed) {
            serverRunning = false;
            return;
        }
        if (serverSettings.closeTime) {
            const closeDate = new Date(serverSettings.closeTime);
            const now = new Date();
            serverRunning = now < closeDate;
        } else {
            serverRunning = true;
        }
    }

    function saveServerSettings() {
        db.ref('serverSettings').set(serverSettings);
    }

    function getTimeRemaining() {
        if (!serverSettings.closeTime) return null;
        const closeDate = new Date(serverSettings.closeTime);
        const now = new Date();
        const diff = closeDate - now;
        if (diff <= 0) return null;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        return { hours, minutes, seconds };
    }

    // ============================================================
    //  ЗАГРУЗКА ДАННЫХ
    // ============================================================
    function loadGameData() {
        db.ref('data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                brawlers = data.brawlers || [];
                shopItems = data.shopItems || [];
                vouchers = data.vouchers || [];
                if (currentPlayerId) {
                    db.ref('players/' + currentPlayerId).once('value').then((snap) => {
                        const p = snap.val();
                        if (p) {
                            profile = p;
                            saveLocalProfile();
                            if (profile.banned) {
                                document.getElementById('bannedOverlay').style.display = 'flex';
                            } else {
                                document.getElementById('bannedOverlay').style.display = 'none';
                            }
                        }
                        render();
                    });
                }
                render();
            }
        });
    }

    function saveLocalProfile() {
        localStorage.setItem('brawl_profile', JSON.stringify(profile));
    }

    function loadLocalProfile() {
        try {
            const raw = localStorage.getItem('brawl_profile');
            if (raw) {
                const p = JSON.parse(raw);
                if (p && p.name) {
                    profile = p;
                    return true;
                }
            }
        } catch (e) {}
        return false;
    }

    // ============================================================
    //  БАН
    // ============================================================
    function checkBan() {
        if (profile.banned) {
            document.getElementById('bannedOverlay').style.display = 'flex';
            return true;
        }
        document.getElementById('bannedOverlay').style.display = 'none';
        return false;
    }

    window.createNewAccount = function() {
        document.getElementById('bannedOverlay').style.display = 'none';
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('authSubtitle').textContent = 'Создайте новый аккаунт';
        localStorage.removeItem('brawl_playerId');
        localStorage.removeItem('brawl_profile');
        currentPlayerId = null;
        isLoggedIn = false;
        profile = { name: '', gems: 0, coins: 0, brawlers: [], trophies: 0, banned: false, password: '' };
        render();
    };

    window.appealBan = function() {
        alert('📩 Ваша заявка на разбан отправлена! Администратор рассмотрит её в ближайшее время.');
    };

    // ============================================================
    //  FIREBASE СИНХРОНИЗАЦИЯ
    // ============================================================
    function syncToFirebase() {
        if (isSyncing || !currentPlayerId) return;
        isSyncing = true;
        const data = { brawlers, shopItems, vouchers };
        db.ref('data').set(data)
            .then(() => {
                if (currentPlayerId) {
                    db.ref('players/' + currentPlayerId).set(profile);
                }
                console.log('✅ Данные отправлены в Firebase');
                updateCloudUI(true);
                isSyncing = false;
            })
            .catch(error => {
                console.error('❌ Ошибка отправки:', error);
                updateCloudUI(false);
                isSyncing = false;
            });
    }

    function updateCloudUI(connected) {
        const badge = document.getElementById('connectionBadge');
        if (connected) {
            badge.className = 'online-badge';
            badge.textContent = '🟢 ☁️';
        } else {
            badge.className = 'offline-badge';
            badge.textContent = '🔴 ☁️';
        }
        const statusEl = document.getElementById('cloudStatus');
        if (statusEl) {
            statusEl.textContent = connected ? '🟢 Синхронизация активна' : '🔴 Офлайн';
            statusEl.className = connected ? 'connected' : 'disconnected';
        }
    }

    function autoSync() {
        saveLocalProfile();
        syncToFirebase();
    }

    // ============================================================
    //  БОЕВАЯ СИСТЕМА
    // ============================================================
    const randomNames = ['🔥 Гром', '💥 Вспышка', '🌀 Тень', '⚡ Молния', '🌟 Звезда', '💀 Кошмар', '🛡️ Щит', '🗡️ Клинок', '🏹 Стрела', '🧨 Фейерверк'];

    function getBrawlerStats(brawler, level) {
        if (!brawler) return { damage: 0, hp: 0 };
        const minDamage = brawler.minDamage || brawler.damage || 100;
        const maxDamage = brawler.maxDamage || brawler.damage * 2 || 200;
        const minHp = brawler.minHp || brawler.hp || 400;
        const maxHp = brawler.maxHp || brawler.hp * 2 || 800;

        const progress = (level - 1) / 9;
        const damage = Math.round(minDamage + (maxDamage - minDamage) * progress);
        const hp = Math.round(minHp + (maxHp - minHp) * progress);

        return { damage, hp };
    }

    function getUpgradeCost(level) {
        return {
            coins: level * 10,
            gems: Math.floor(level / 2) + 1
        };
    }

    // ============================================================
    //  ПРОКАЧКА БОЙЦА
    // ============================================================
    window.upgradeBrawler = function(brawlerName) {
        if (checkBan() || !currentPlayerId) return;
        const brawler = brawlers.find(b => b.name === brawlerName);
        if (!brawler) return alert('Боец не найден!');

        if (!profile.brawlers) profile.brawlers = [];
        const playerBrawler = profile.brawlers.find(b => b.name === brawlerName);
        if (!playerBrawler) return alert('У вас нет этого бойца!');

        if (playerBrawler.level >= 10) return alert('⚠️ Боец уже на максимальном уровне!');

        const cost = getUpgradeCost(playerBrawler.level);
        if (profile.coins < cost.coins) {
            return alert(`❌ Не хватает монет! Нужно ${cost.coins} 🪙`);
        }
        if (profile.gems < cost.gems) {
            return alert(`❌ Не хватает гемов! Нужно ${cost.gems} 💎`);
        }

        profile.coins -= cost.coins;
        profile.gems -= cost.gems;
        playerBrawler.level = (playerBrawler.level || 1) + 1;

        autoSync();
        render();
        alert(`✅ ${brawlerName} повышен до ${playerBrawler.level} уровня!`);
    };

    // ============================================================
    //  UI
    // ============================================================
    const content = document.getElementById('content');
    const menuBtns = document.querySelectorAll('.menu button');

    function render() {
        if (profile.banned) {
            document.getElementById('bannedOverlay').style.display = 'flex';
            content.innerHTML =
                `<div class="empty-state"><span>🚫</span>Вы забанены</div>`;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === currentMainTab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        } else {
            document.getElementById('bannedOverlay').style.display = 'none';
        }

        if (!isLoggedIn && !currentPlayerId) {
            document.getElementById('authOverlay').style.display = 'flex';
            return;
        }

        const tab = currentMainTab;
        const cloudHtml =
            `
                <div class="cloud-panel">
                    <div class="status">☁️ Синхронизация: <span id="cloudStatus" class="connected">🟢 Синхронизация активна</span></div>
                </div>
            `;

        if (tab === 'admin' && isAdmin) {
            renderAdmin(cloudHtml);
            return;
        }
        if (tab === 'admin' && !isAdmin) {
            document.getElementById('passwordOverlay').style.display = 'flex';
            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="brawlers"]').classList.add('active');
            currentMainTab = 'brawlers';
            return;
        }

        checkServerStatus();

        if (!serverRunning) {
            let html = cloudHtml +
                `
                    <div class="maintenance">
                        <span>🔧</span>
                        <h2>${serverSettings.maintenanceMessage || 'Технические работы ведутся'}</h2>
                        <p>${serverSettings.closeTime ? 'Сервер будет доступен после ' + new Date(serverSettings.closeTime).toLocaleString() : 'Сервер временно недоступен'}</p>
                    </div>
                `;
            content.innerHTML = html;
            menuBtns.forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(menuBtns).find(b => b.dataset.tab === tab);
            if (activeBtn) activeBtn.classList.add('active');
            return;
        }

        if (tab === 'battle') { renderBattle(cloudHtml); return; }
        if (tab === 'brawlers') { renderBrawlers(cloudHtml); return; }
        if (tab === 'shop') { renderShop(cloudHtml); return; }
        if (tab === 'profile') { renderProfile(cloudHtml); return; }
        if (tab === 'chat') { renderChat(cloudHtml); return; }
    }

    // ===== БОЙ =====
    function renderBattle(cloudHtml) {
        let html = cloudHtml;

        if (battleState === 'select') {
            const ownedBrawlers = profile.brawlers || [];
            html += `

                        <h3 style="color:#f5c842;margin-bottom:8px;">Выбери бойца для PvP</h3>

                            ${ownedBrawlers.length ?
                                ownedBrawlers.map(pb => {
                                    return `
                                        <div class="brawler-card ${selectedBrawler === pb.name ? 'selected' : ''}" onclick="selectBrawlerForBattle('${pb.name}')">
                                            ${pb.name} (${pb.level || 1}⚡)
                                        </div>
                                    `;

            document.querySelector('[data-tab="battle"]').classList.add('active');
            return;
        }

        if (battleState === 'searching') {
            html += `
                    <div class="pvp-search">
                        <div class="spinner"></div>

                        <p>Ищем игрока для боя</p>
                        <button class="cancel-btn" onclick="cancelSearch()">❌ Отмена</button>
                    </div>
                `;

            menuBtns.forEach(b => b.classList.remove('active'));
            document.querySelector('[data-tab="battle"]').classList.add('active');

        }

        if (battleState === 'fighting' && battleData) {
            const isMyTurn = (battleData.currentTurn === 'player1' && battleData.player1Id === currentPlayerId) ||
                (battleData.currentTurn === 'player2' && battleData.player2Id === currentPlayerId);

            const isPlayer1 = battleData.player1Id === currentPlayerId;
            const myName = isPlayer1 ? battleData.player1Name : battleData.player2Name;
            const oppName = isPlayer1 ? battleData.player2Name : battleData.player1Name;
            const myHP = isPlayer1 ? battleData.player1HP : battleData.player2HP;
            const myMaxHP = isPlayer1 ? battleData.player1MaxHP : battleData.player2MaxHP;
            const oppHP = isPlayer1 ? battleData.player2HP : battleData.player1HP;
            const oppMaxHP = isPlayer1 ? battleData.player2MaxHP : battleData.player1MaxHP;
            const myPower = isPlayer1 ? battleData.player1Power : battleData.player2Power;
            const oppPower = isPlayer1 ? battleData.player2Power : battleData.player1Power;

            const myHPPercent = Math.round((myHP / myMaxHP) * 100);
            const oppHPPercent = Math.round((oppHP / oppMaxHP) * 100);

            html += `
                    <div class="pvp-container">
                        <div class="battle-status">

                                <div class="power">⚡ Уровень ${myPower}</div>

            db.ref('pvp_search/' + searchRef.key).remove();
            searchRef = null;
        }
        db.ref('pvp_search').off();
        if (searchTimeout) clearTimeout(searchTimeout);
        if (battleId) {

        battleState = 'select';
        battleData = null;
        battleId = null;

        render();

    window.buyItem = function(name) {
        if (checkBan() || !currentPlayerId) return;
        const item = shopItems.find(i => i.name === name);
        if (!item) return alert('Товар не найден!');
        const isFree = item.free === true;

        if (item.category === 'brawler') {
            if (profile.brawlers && profile.brawlers.some(pb => pb.name === item.brawlerName)) {
                return alert(`⚠️ У вас уже есть боец ${item.brawlerName}!`);
            }
            if (!isFree && profile.gems < item.cost) {
                return alert(`❌ Не хватает гемов! Нужно ${item.cost} 💎, у вас ${profile.gems}`);
            }
            if (!isFree) { profile.gems -= item.cost; }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push({ name: item.brawlerName, level: 1 });
            alert(`✅ Вы купили бойца ${item.brawlerName}${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            autoSync();
            render();
        } else if (item.category === 'resources') {
            if (item.resourceType === 'gems') {
                profile.gems += item.amount;
                alert(`✅ Вы получили ${item.amount} 💎 Гемов${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            } else if (item.resourceType === 'coins') {
                profile.coins += item.amount;
                alert(`✅ Вы получили ${item.amount} 🪙 Монет${isFree ? ' (БЕСПЛАТНО!)' : ''}!`);
            }
            autoSync();
            render();
        } else {
            alert(`✅ Вы купили: ${name}!`);
        }
    };

    window.sendMessage = function() {
        if (checkBan() || !currentPlayerId) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const msg = {
            playerId: currentPlayerId,
            name: profile.name || 'Аноним',
            text: text,
            timestamp: Date.now()
        };

        db.ref('chat').push(msg);
        input.value = '';
    };

    document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { sendMessage(); }
    });

    function loadChat() {
        db.ref('chat').orderByChild('timestamp').limitToLast(100).on('value', (snapshot) => {
            const messages = snapshot.val();
            const container = document.getElementById('chatMessages');
            if (!container) return;

            if (!messages) {
                container.innerHTML =
                    `
                        <div class="chat-empty">
                            <span>💬</span>
                            Сообщений пока нет<br>
                            <span style="font-size:12px;color:#555577;">Будь первым!</span>
                        </div>
                    `;
                return;
            }

            let html = '';
            const msgs = Object.values(messages).reverse();
            msgs.forEach(msg => {
                const isOwn = msg.playerId === currentPlayerId;
                const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                html += `
                        <div class="chat-message ${isOwn ? 'own' : ''}">
                            <div class="msg-header">
                                <span class="msg-name">${msg.name || 'Аноним'}</span>
                                <span class="msg-time">${time}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                        </div>
                    `;
            });
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        });
    }

    window.generateVoucher = function() {
        const rewardType = document.getElementById('voucherRewardType').value;
        const amount = parseInt(document.getElementById('voucherAmount').value) || 0;
        const brawlerName = document.getElementById('voucherBrawler').value;
        const maxUses = parseInt(document.getElementById('voucherMaxUses').value) || 1;

        if (rewardType === 'gems' && amount <= 0) return alert('Введите количество гемов!');
        if (rewardType === 'coins' && amount <= 0) return alert('Введите количество монет!');
        if (rewardType === 'brawler' && !brawlerName) return alert('Выберите бойца!');
        if (maxUses < 1) return alert('Количество активаций должно быть минимум 1!');

        const code = 'VOUCHER_' + Math.random().toString(36).substring(2, 8).toUpperCase();
        const voucher = {
            code,
            rewardType,
            amount,
            brawlerName,
            maxUses: maxUses,
            used: false,
            usedBy: [],
            createdAt: Date.now()
        };
        vouchers.push(voucher);
        autoSync();
        renderAdmin();
        alert(`✅ Ваучер создан!\nКод: ${code}\nНаграда: ${rewardType === 'gems' ? '💎 ' + amount : rewardType === 'coins' ? '🪙 ' + amount : '👤 ' + brawlerName}\nАктиваций: ${maxUses}`);
        const container = document.getElementById('voucherResult');
        if (container) {
            container.innerHTML =
                `
                    <div class="voucher-code">
                        <span class="code">${code}</span>
                        <button class="copy-btn" onclick="copyVoucher('${code}')">📋 Копировать</button>
                    </div>
                `;
        }
    };

    window.copyVoucher = function(code) {
        navigator.clipboard.writeText(code).then(() => {
            alert('✅ Код скопирован!');
        }).catch(() => {
            prompt('Скопируйте код вручную:', code);
        });
    };

    window.activateVoucher = function() {
        const codeInput = document.getElementById('voucherActivateInput');
        const code = codeInput.value.trim().toUpperCase();
        if (!code) return alert('Введите код ваучера!');

        const voucher = vouchers.find(v => v.code === code);
        if (!voucher) return alert('❌ Неверный код!');
        if (voucher.maxUses <= 0) return alert('❌ Этот ваучер уже использован!');

        if (voucher.usedBy && voucher.usedBy.includes(currentPlayerId)) {
            return alert('⚠️ Вы уже активировали этот ваучер!');
        }

        if (!voucher.usedBy) voucher.usedBy = [];
        voucher.usedBy.push(currentPlayerId);
        voucher.maxUses -= 1;
        if (voucher.maxUses <= 0) {
            voucher.used = true;
        }

        if (voucher.rewardType === 'gems') {
            profile.gems += voucher.amount;
            alert(`✅ Вы получили ${voucher.amount} 💎 Гемов!`);
        } else if (voucher.rewardType === 'coins') {
            profile.coins += voucher.amount;
            alert(`✅ Вы получили ${voucher.amount} 🪙 Монет!`);
        } else if (voucher.rewardType === 'brawler') {
            if (profile.brawlers && profile.brawlers.some(pb => pb.name === voucher.brawlerName)) {
                alert(`⚠️ У вас уже есть боец ${voucher.brawlerName}!`);
                return;
            }
            if (!profile.brawlers) profile.brawlers = [];
            profile.brawlers.push({ name: voucher.brawlerName, level: 1 });
            alert(`✅ Вы получили бойца ${voucher.brawlerName}!`);
        }

        autoSync();
        render();
        codeInput.value = '';
        alert(`🎉 Ваучер активирован! Осталось ${voucher.maxUses} активаций.`);
    };

    let playersList = [];

    function loadPlayersList() {
        db.ref('players').once('value').then((snapshot) => {
            const players = snapshot.val();
            if (players) {
                playersList = Object.keys(players).map(key => ({
                    id: key,
                    ...players[key]
                }));
                playersList.sort((a, b) => (b.trophies || 0) - (a.trophies || 0));
                updatePlayerSelects();
            }
        });
    }

    function updatePlayerSelects() {
        const selects = ['adminPlayerSelect', 'banPlayerSelect', 'unbanPlayerSelect', 'adminTrophySelect',
            'adminDeleteSelect'
        ];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const currentVal = el.value;
                el.innerHTML = '<option value="">-- Выберите игрока --</option>';
                playersList.forEach(p => {
                    const label = `${p.name || 'Аноним'} (🏆 ${p.trophies || 0})`;
                    el.innerHTML += `<option value="${p.id}">${label}</option>`;
                });
                if (currentVal) el.value = currentVal;
            }
        });
    }

    // ===== ВЫДАЧА РЕСУРСОВ =====
    window.adminGiveResources = function() {
        const select = document.getElementById('adminPlayerSelect');
        const playerId = select.value;
        const resourceType = document.getElementById('adminResourceType').value;
        const amount = parseInt(document.getElementById('adminResourceAmount').value) || 0;

        if (!playerId) return alert('Выберите игрока!');
        if (amount <= 0) return alert('Введите количество!');

        db.ref('players/' + playerId).once('value').then((snap) => {
            const player = snap.val();
            if (!player) return alert('❌ Игрок не найден!');

            if (resourceType === 'gems') {
                player.gems = (player.gems || 0) + amount;
            } else if (resourceType === 'coins') {
                player.coins = (player.coins || 0) + amount;
            }

            db.ref('players/' + playerId).set(player);
            alert(`✅ Выдано ${amount} ${resourceType === 'gems' ? '💎 гемов' : '🪙 монет'} игроку ${player.name || playerId}`);
            document.getElementById('adminResourceAmount').value = '';
            loadPlayersList();
        });
    };

    // ============================================================
    //  PVP ПОИСК
    // ============================================================
    function findBattle() {
        if (checkBan() || !currentPlayerId) return;
        if (!selectedBrawler) return alert('Выберите бойца!');
        const hasBrawler = profile.brawlers && profile.brawlers.some(pb => pb.name === selectedBrawler);
        if (!hasBrawler) {
            return alert('⚠️ У вас нет этого бойца!');
        }

        battleState = 'searching';
        renderBattle();

        const searchData = {
            playerId: currentPlayerId,
            name: profile.name || 'Игрок',
            brawler: selectedBrawler,
            brawlerLevel: profile.brawlers.find(pb => pb.name === selectedBrawler)?.level || 1,
            timestamp: Date.now(),
            status: 'searching'
        };

        searchRef = db.ref('pvp_search').push(searchData);

        db.ref('pvp_search').on('value', (snapshot) => {
            const searches = snapshot.val();
            if (!searches) return;

            const other = Object.keys(searches).find(key => {
                const s = searches[key];
                return s.playerId !== currentPlayerId && s.status === 'searching';
            });

            if (other) {
                const opponentData = searches[other];
                db.ref('pvp_search/' + other).remove();
                if (searchRef) {
                    db.ref('pvp_search/' + searchRef.key).remove();
                }
                db.ref('pvp_search').off();
                startPvpBattle(opponentData);
            }
        });

        searchTimeout = setTimeout(() => {
            if (battleState === 'searching') {
                cancelSearch();
                alert('⏳ Игрок не найден. Попробуйте позже!');
            }
        }, 30000);
    }

    function cancelSearch() {
        if (searchRef) {
            db.ref('pvp_search/' + searchRef.key).remove();
            searchRef = null;
        }
        db.ref('pvp_search').off();
        if (searchTimeout) clearTimeout(searchTimeout);
        battleState = 'select';
        renderBattle();
    }

    // ============================================================
    //  PVP БОЙ
    // ============================================================
    function startPvpBattle(opponentData) {
        const myBrawler = brawlers.find(b => b.name === selectedBrawler);
        const oppBrawler = brawlers.find(b => b.name === opponentData.brawler);
        if (!myBrawler || !oppBrawler) return;

        const myLevel = profile.brawlers.find(pb => pb.name === selectedBrawler)?.level || 1;
        const oppLevel = opponentData.brawlerLevel || 1;

        const myStats = getBrawlerStats(myBrawler, myLevel);
        const oppStats = getBrawlerStats(oppBrawler, oppLevel);

        battleId = 'battle_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);

        battleData = {
            id: battleId,
            player1Id: currentPlayerId,
            player1Name: profile.name || 'Игрок',
            player1Brawler: selectedBrawler,
            player1HP: myStats.hp,
            player1MaxHP: myStats.hp,
            player1Damage: myStats.damage,
            player1Power: myLevel,
            player2Id: opponentData.playerId,
            player2Name: opponentData.name || 'Противник',
            player2Brawler: opponentData.brawler,
            player2HP: oppStats.hp,
            player2MaxHP: oppStats.hp,
            player2Damage: oppStats.damage,
            player2Power: oppLevel,
            currentTurn: 'player1',
            started: Date.now(),
            finished: false,
            winner: null,
            log: ['⚔️ Бой начался!']
        };

        db.ref('battles/' + battleId).set(battleData);
        battleState = 'fighting';
        renderBattle();

        db.ref('battles/' + battleId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                battleData = data;
                if (battleData.finished) {
                    finishPvpBattle(battleData);
                }
                renderBattle();
            }
        });

        listenForMoves();
    }

    function listenForMoves() {
        db.ref('battles/' + battleId + '/moves').on('child_added', (snapshot) => {
            const move = snapshot.val();
            if (move.playerId === currentPlayerId) return;
            if (battleData && !battleData.finished) {
                processPvpMove(move);
            }
        });
    }

    function makePvpMove(action) {
        if (!battleData || battleData.finished) return;
        const isMyTurn = (battleData.currentTurn === 'player1' && battleData.player1Id === currentPlayerId) ||
            (battleData.currentTurn === 'player2' && battleData.player2Id === currentPlayerId);
        if (!isMyTurn) {
            alert('⏳ Сейчас не ваш ход!');
            return;
        }

        const attackBtn = document.querySelector('.attack');
        const defendBtn = document.querySelector('.defend');
        if (attackBtn) attackBtn.disabled = true;
        if (defendBtn) defendBtn.disabled = true;

        const move = { action: action, timestamp: Date.now(), playerId: currentPlayerId };
        db.ref('battles/' + battleId + '/moves').push(move).then(() => {
            console.log('✅ Ход отправлен:', action);
            setTimeout(() => {
                if (attackBtn) attackBtn.disabled = false;
                if (defendBtn) defendBtn.disabled = false;
            }, 500);
        }).catch(err => {
            console.error('❌ Ошибка отправки хода:', err);
            if (attackBtn) attackBtn.disabled = false;
            if (defendBtn) defendBtn.disabled = false;
        });
    }

    function processPvpMove(move) {
        if (!battleData || battleData.finished) return;
        const isPlayer1 = battleData.currentTurn === 'player1';
        let damage = 0;

        if (move.action === 'attack') {
            damage = Math.floor(isPlayer1 ? battleData.player1Damage * (0.8 + Math.random() * 0.4) : battleData
                .player2Damage * (0.8 + Math.random() * 0.4));
            const attackerName = isPlayer1 ? battleData.player1Name : battleData.player2Name;
            const defenderName = isPlayer1 ? battleData.player2Name : battleData.player1Name;
            battleData.log.push(`💥 ${attackerName} нанёс ${damage} урона ${defenderName}`);
            if (isPlayer1) {
                battleData.player2HP = Math.max(0, battleData.player2HP - damage);
            } else {
                battleData.player1HP = Math.max(0, battleData.player1HP - damage);
            }
        } else if (move.action === 'defend') {
            const heal = Math.floor((isPlayer1 ? battleData.player1MaxHP : battleData.player2MaxHP) * 0.15);
            if (isPlayer1) {
                battleData.player1HP = Math.min(battleData.player1MaxHP, battleData.player1HP + heal);
            } else {
                battleData.player2HP = Math.min(battleData.player2MaxHP, battleData.player2HP + heal);
            }
            const name = isPlayer1 ? battleData.player1Name : battleData.player2Name;
            battleData.log.push(`🛡️ ${name} восстановил ${heal} HP`);
        }

        if (battleData.player1HP <= 0 || battleData.player2HP <= 0) {
            battleData.finished = true;
            battleData.winner = battleData.player1HP > 0 ? 'player1' : 'player2';
            const winnerName = battleData.winner === 'player1' ? battleData.player1Name : battleData.player2Name;
            battleData.log.push(`🏆 ${winnerName} победил!`);

            if ((battleData.winner === 'player1' && battleData.player1Id === currentPlayerId) ||
                (battleData.winner === 'player2' && battleData.player2Id === currentPlayerId)) {
                profile.trophies = (profile.trophies || 0) + 10;
                autoSync();
                alert('🏆 Вы победили! +10 кубков!');
            } else {
                alert('💀 Вы проиграли! Попробуйте снова!');
            }

            db.ref('battles/' + battleId).set(battleData);
            return;
        }

        battleData.currentTurn = isPlayer1 ? 'player2' : 'player1';
        db.ref('battles/' + battleId).set(battleData);
    }

    function finishPvpBattle(data) {
        battleState = 'result';
        renderBattle();
        db.ref('battles/' + battleId).off();
    }

    // ============================================================
    //  МЕНЮ
    // ============================================================
    menuBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            if (tab === 'admin' && !isAdmin) {
                document.getElementById('passwordOverlay').style.display = 'flex';
                return;
            }
            if (tab !== 'brawlers') { selectedBrawlerForDetail = null; }
            if (tab !== 'battle' && battleState !== 'select') {
                if (searchRef) {
                    db.ref('pvp_search/' + searchRef.key).remove();
                    searchRef = null;
                }
                db.ref('pvp_search').off();
                if (searchTimeout) clearTimeout(searchTimeout);
                if (battleId) {
                    db.ref('battles/' + battleId).off();
                }
                battleState = 'select';
                battleData = null;
                battleId = null;
                selectedBrawler = null;
            }
            currentMainTab = tab;
            render();
        });
    });

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    loadServerSettings();

    if (currentPlayerId) {
        const saved = loadLocalProfile();
        if (saved) {
            if (profile.banned) {
                document.getElementById('bannedOverlay').style.display = 'flex';
            } else {
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadGameData();
            }
        } else {
            document.getElementById('authOverlay').style.display = 'flex';
        }
    } else {
        document.getElementById('authOverlay').style.display = 'flex';
    }

    if (currentPlayerId && !profile.name) {
        db.ref('players/' + currentPlayerId).once('value').then((snap) => {
            const p = snap.val();
            if (p) {
                profile = p;
                saveLocalProfile();
                isLoggedIn = true;
                document.getElementById('authOverlay').style.display = 'none';
                loadGameData();
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });
    }

    render();
</script>
</body>
</html>
